<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BasketPro - Basketball Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  
  <style>
    :root {
      --bg-dark: #080c14;
      --bg-card: #0e1420;
      --bg-card-light: #111827;
      --bg-input: #1a2235;
      --accent-cyan: #00d4ff;
      --accent-blue: #3b82f6;
      --accent-green: #00e5a0;
      --accent-yellow: #fbbf24;
      --accent-red: #f87171;
      --accent-orange: #ff6b2c;
      --text: #e2e8f0;
      --text-white: #f8fafc;
      --text-gray: #94a3b8;
      --text-dark: #64748b;
      --border: rgba(255,255,255,0.07);
      --glow-cyan: 0 0 24px rgba(0,212,255,0.25);
    }

    body.light-mode {
      --bg-dark: #f0f4f8;
      --bg-card: #ffffff;
      --bg-card-light: #f8fafc;
      --bg-input: #e8edf5;
      --accent-cyan: #0099cc;
      --text: #1e293b;
      --text-white: #0f172a;
      --text-gray: #475569;
      --border: rgba(0,0,0,0.10);
    }

    @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      background-image: 
        radial-gradient(ellipse at top left, rgba(0,212,255,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at bottom right, rgba(0,229,160,0.05) 0%, transparent 55%);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .header {
      background: rgba(8,12,20,0.96);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(0,212,255,0.12);
      padding: 12px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    
    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent-orange), var(--accent-cyan));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .brand-name {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-orange), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-right { display: flex; align-items: center; gap: 16px; }
    
    .status-bar { display: flex; gap: 12px; }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: var(--text-dark);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dark);
    }

    .status-dot.online { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
    .status-dot.loading { background: var(--accent-yellow); animation: blink 1s infinite; }
    .status-dot.error { background: var(--accent-red); }

    .theme-btn {
      width: 36px;
      height: 36px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.2s;
    }

    .theme-btn:hover { transform: scale(1.05); }

    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .date-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .date-tab {
      padding: 10px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-gray);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .date-tab:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .date-tab.active {
      background: linear-gradient(135deg, rgba(2,132,199,0.12), rgba(59,130,246,0.12));
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      border-width: 2px;
    }

    .league-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .league-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .league-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-orange), var(--accent-cyan));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .league-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-white);
    }

    .league-count {
      margin-left: auto;
      padding: 4px 12px;
      background: var(--bg-input);
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent-cyan);
    }

    .match-item {
      background: var(--bg-card-light);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .match-item:hover {
      background: rgba(0,212,255,0.05);
      border-color: var(--accent-cyan);
      transform: translateX(4px);
    }

    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.75rem;
      color: var(--text-dark);
    }

    .match-time {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .match-status {
      padding: 4px 10px;
      background: var(--bg-input);
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .match-status.live {
      background: var(--accent-red);
      color: white;
      animation: blink 2s infinite;
    }

    .match-teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: center;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .team.away {
      flex-direction: row-reverse;
      text-align: right;
    }

    .team-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .team-score {
      font-size: 1.8rem;
      font-weight: 800;
      min-width: 40px;
      text-align: center;
    }

    .vs {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-gray);
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-light) 50%, var(--bg-card) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 8px;
      height: 100px;
      margin-bottom: 12px;
    }

    .hidden { display: none !important; }

    @media (max-width: 768px) {
      .header-inner { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">🏀</div>
        <div class="brand-name">BASKETPRO</div>
      </div>
      
      <div class="header-right">
        <div class="status-bar">
          <div class="status-item">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connessione...</span>
          </div>
        </div>
        <div class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="date-tabs" id="dateTabs"></div>
    
    <div id="gamesContainer">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>

  <script>
    // === CONFIG ===
    const API = {
      key: 'aeb2864a3d4dbb8395fa53c83a876a93',
      host: 'v1.basketball.api-sports.io',
      base: 'https://v1.basketball.api-sports.io'
    };

    // === STORAGE ===
    const store = {
      get: k => {
        try { return localStorage.getItem(k); }
        catch(e) { return sessionStorage.getItem(k); }
      },
      set: (k, v) => {
        try { localStorage.setItem(k, v); }
        catch(e) {
          try {
            Object.keys(localStorage).forEach(key => {
              if (key.startsWith('basketpro_')) localStorage.removeItem(key);
            });
            localStorage.setItem(k, v);
          } catch(e2) { sessionStorage.setItem(k, v); }
        }
      }
    };

    // === STATE ===
    let state = {
      date: 0,
      games: {},
      loading: false,
      theme: store.get('theme') || 'dark',
      apiCalls: 0
    };

    // === HELPERS ===
    const getDate = offset => {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    };

    const formatTime = str => {
      const d = new Date(str);
      return d.toLocaleTimeString('it', { hour: '2-digit', minute: '2-digit' });
    };

    const formatDateLabel = offset => {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toLocaleDateString('it', { day: '2-digit', month: 'short' });
    };

    // === THEME ===
    function toggleTheme() {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      document.body.classList.toggle('light-mode', state.theme === 'light');
      document.getElementById('themeBtn').textContent = state.theme === 'dark' ? '🌙' : '☀️';
      store.set('theme', state.theme);
    }

    if (state.theme === 'light') {
      document.body.classList.add('light-mode');
      document.getElementById('themeBtn').textContent = '☀️';
    }

    // === API ===
    async function callAPI(endpoint, params = {}) {
      const url = `${API.base}/${endpoint}?${new URLSearchParams(params)}`;
      console.log('🔌 API:', url);
      
      const res = await fetch(url, {
        headers: {
          'x-rapidapi-key': API.key,
          'x-rapidapi-host': API.host
        }
      });
      
      state.apiCalls++;
      console.log(`📊 Calls: ${state.apiCalls}`);
      
      if (!res.ok) throw new Error(`HTTP_${res.status}`);
      
      const data = await res.json();
      console.log('📦 Data:', data);
      return data;
    }

    async function loadGames(offset = 0) {
      state.loading = true;
      state.date = offset;
      state.games = {};
      updateStatus('loading', 'Caricamento...');
      
      try {
        const dateStr = getDate(offset);
        console.log('📅 Date:', dateStr);
        
        // Carico TUTTE le partite del giorno (senza filtro league)
        const data = await callAPI('games', { date: dateStr });
        
        if (data && data.response && Array.isArray(data.response)) {
          // Organizzo per campionato
          data.response.forEach(game => {
            const leagueName = game.league?.name || 'Other';
            if (!state.games[leagueName]) {
              state.games[leagueName] = [];
            }
            state.games[leagueName].push(game);
          });
          
          const total = data.response.length;
          console.log(`✅ ${total} partite caricate`);
          console.log(`🏀 Campionati:`, Object.keys(state.games));
          
          updateStatus('online', `${total} partite`);
        } else {
          updateStatus('online', '0 partite');
        }
        
      } catch(err) {
        console.error('❌ Error:', err);
        updateStatus('error', 'Errore API');
      }
      
      state.loading = false;
      render();
    }

    function updateStatus(status, text) {
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      dot.className = `status-dot ${status}`;
      txt.textContent = text;
    }

    // === RENDER ===
    function render() {
      renderDates();
      renderGames();
    }

    function renderDates() {
      const tabs = [
        { offset: -1, label: 'Ieri' },
        { offset: 0, label: 'Oggi' },
        { offset: 1, label: 'Domani' },
        { offset: 2, label: formatDateLabel(2) },
        { offset: 3, label: formatDateLabel(3) }
      ];
      
      document.getElementById('dateTabs').innerHTML = tabs.map(t => `
        <div class="date-tab ${state.date === t.offset ? 'active' : ''}" onclick="loadGames(${t.offset})">
          ${t.label}
        </div>
      `).join('');
    }

    function renderGames() {
      const container = document.getElementById('gamesContainer');
      
      if (state.loading) {
        container.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
        return;
      }
      
      const leagues = Object.keys(state.games);
      
      if (leagues.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🏀</div>
            <div style="font-size:1.2rem;font-weight:700;margin-bottom:8px;">Nessuna Partita</div>
            <div>Non ci sono partite basket per questa data.</div>
          </div>
        `;
        return;
      }
      
      container.innerHTML = leagues.map(leagueName => {
        const games = state.games[leagueName];
        
        return `
          <div class="league-section">
            <div class="league-header">
              <div class="league-icon">🏀</div>
              <div class="league-name">${leagueName}</div>
              <div class="league-count">${games.length} partite</div>
            </div>
            
            ${games.map(game => {
              const isLive = game.status?.short === '1' || game.status?.short === '2' || 
                            game.status?.short === '3' || game.status?.short === '4';
              const isDone = game.status?.short === 'FT' || game.status?.short === 'AOT';
              const home = game.teams?.home || {};
              const away = game.teams?.away || {};
              const homeScore = game.scores?.home?.total || 0;
              const awayScore = game.scores?.away?.total || 0;
              
              return `
                <div class="match-item">
                  <div class="match-header">
                    <div class="match-time">
                      🕒 ${formatTime(game.date || new Date())}
                    </div>
                    <div class="match-status ${isLive ? 'live' : ''}">
                      ${isLive ? '🔴 LIVE' : game.status?.long || 'Scheduled'}
                    </div>
                  </div>
                  
                  <div class="match-teams">
                    <div class="team">
                      <div class="team-name">${home.name || 'Home'}</div>
                      <div class="team-score" style="color:var(--accent-orange);">
                        ${isDone || isLive ? homeScore : '-'}
                      </div>
                    </div>
                    
                    <div class="vs">VS</div>
                    
                    <div class="team away">
                      <div class="team-name">${away.name || 'Away'}</div>
                      <div class="team-score" style="color:var(--accent-cyan);">
                        ${isDone || isLive ? awayScore : '-'}
                      </div>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('');
    }

    // === INIT ===
    async function init() {
      console.log('🏀 BasketPro FINAL');
      console.log('🔑 API:', API.key.slice(0, 8) + '...');
      console.log('🌐 Host:', API.host);
      
      await loadGames(0);
      
      // Auto-refresh live games
      setInterval(() => {
        const hasLive = Object.values(state.games).some(league => 
          league.some(g => ['1','2','3','4'].includes(g.status?.short))
        );
        
        if (hasLive && !state.loading) {
          console.log('🔄 Refresh');
          loadGames(state.date);
        }
      }, 30000);
    }

    init();
  </script>
</body>
</html>
