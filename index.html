<style>

body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;flex-wrap:wrap}

.layout{display:grid;grid-template-columns:260px 1fr 420px;flex:1;overflow:hidden;min-height:0}

/* GAME CARDS */

.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .5s linear infinite}

<script>
const API_KEY='aeb2864a3d4dbb8395fa53c83a876a93';
const API_BASE='https://v1.basketball.api-sports.io';
const FB_URL='https://basketpro-1a28b-default-rtdb.europe-west1.firebasedatabase.app';
const NBA_API='https://api.server.nbaapi.com';

let ALL=[],stC={},gC={},stndC={},oddC={},nbaC={};
let off=0,selG=null,selL=null,reqs=0;

// ═══ UTILS ═══
const ds=o=>{const d=new Date;d.setDate(d.getDate()+o);return d.toISOString().split('T')[0]};
const n=v=>{const x=parseFloat(v);return isNaN(x)?null:x};
const clamp=(a,v,b)=>Math.max(a,Math.min(b,v));
const fmt=(v,d=1)=>v!=null&&!isNaN(v)?Number(v).toFixed(d):'—';
const ncdf=x=>{const t=1/(1+.2316419*Math.abs(x)),d=.3989423*Math.exp(-x*x/2),p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return x>0?1-p:p};

const FLAGS={'USA':'🇺🇸','Italy':'🇮🇹','Spain':'🇪🇸','France':'🇫🇷','Germany':'🇩🇪','Greece':'🇬🇷','Turkey':'🇹🇷','Australia':'🇦🇺','China':'🇨🇳','Japan':'🇯🇵','Korea':'🇰🇷','Israel':'🇮🇱','Argentina':'🇦🇷','Brazil':'🇧🇷','Serbia':'🇷🇸','Lithuania':'🇱🇹','Philippines':'🇵🇭','Russia':'🇷🇺','Croatia':'🇭🇷','Slovenia':'🇸🇮','Poland':'🇵🇱','Czech Republic':'🇨🇿','Belgium':'🇧🇪','Netherlands':'🇳🇱','Portugal':'🇵🇹','Finland':'🇫🇮','Sweden':'🇸🇪','Denmark':'🇩🇰','Romania':'🇷🇴','Hungary':'🇭🇺','Bulgaria':'🇧🇬','Latvia':'🇱🇻','Estonia':'🇪🇪','Georgia':'🇬🇪','Mexico':'🇲🇽','Canada':'🇨🇦','Chile':'🇨🇱','Uruguay':'🇺🇾','Venezuela':'🇻🇪','Colombia':'🇨🇴','United Kingdom':'🇬🇧','Iran':'🇮🇷','Lebanon':'🇱🇧','New Zealand':'🇳🇿','South Korea':'🇰🇷','Taiwan':'🇹🇼','Indonesia':'🇮🇩','India':'🇮🇳','Egypt':'🇪🇬','Tunisia':'🇹🇳','South Africa':'🇿🇦','Nigeria':'🇳🇬','Euroleague':'🌍','World':'🌍','Europe':'🇪🇺','International':'🌐','Other':'🏀'};
const getFlag=c=>FLAGS[c]||'🏀';

const NBA_ABBR={'Atlanta Hawks':'ATL','Boston Celtics':'BOS','Brooklyn Nets':'BKN','Charlotte Hornets':'CHA','Chicago Bulls':'CHI','Cleveland Cavaliers':'CLE','Dallas Mavericks':'DAL','Denver Nuggets':'DEN','Detroit Pistons':'DET','Golden State Warriors':'GSW','Houston Rockets':'HOU','Indiana Pacers':'IND','Los Angeles Clippers':'LAC','Los Angeles Lakers':'LAL','Memphis Grizzlies':'MEM','Miami Heat':'MIA','Milwaukee Bucks':'MIL','Minnesota Timberwolves':'MIN','New Orleans Pelicans':'NOP','New York Knicks':'NYK','Oklahoma City Thunder':'OKC','Orlando Magic':'ORL','Philadelphia 76ers':'PHI','Phoenix Suns':'PHX','Portland Trail Blazers':'POR','Sacramento Kings':'SAC','San Antonio Spurs':'SAS','Toronto Raptors':'TOR','Utah Jazz':'UTA','Washington Wizards':'WAS'};

function setS(s,m){document.getElementById('sd').className='dot '+s;document.getElementById('st').textContent=m}

// ═══ API ═══
async function api(ep,p={}){
  const u=new URL(API_BASE+ep);Object.entries(p).forEach(([k,v])=>u.searchParams.append(k,v));
  const c=new AbortController,t=setTimeout(()=>c.abort(),15000);
  try{const r=await fetch(u,{headers:{'x-apisports-key':API_KEY},signal:c.signal});clearTimeout(t);reqs++;document.getElementById('rc').textContent=reqs;if(!r.ok)throw Error('HTTP '+r.status);const d=await r.json();if(d.errors&&Object.keys(d.errors).length)throw Error(JSON.stringify(d.errors));return d.response||[]}
  catch(e){clearTimeout(t);throw e}
}

async function getTeamGames(lid,szn,tid){
  const k=`g_${lid}_${szn}_${tid}`;
  if(gC[k])return gC[k];
  try{const r=await api('/games',{league:lid,season:szn,team:tid});gC[k]=r;return r}catch{gC[k]=[];return[]}
}
async function getTeamStats(lid,szn,tid){
  const k=`s_${lid}_${szn}_${tid}`;
  if(stC[k]!==undefined)return stC[k];
  try{const r=await api('/statistics',{league:lid,season:szn,team:tid});stC[k]=r[0]||null;return stC[k]}catch{stC[k]=null;return null}
}
async function getStand(lid,szn){
  const k=`st_${lid}_${szn}`;
  if(stndC[k])return stndC[k];
  try{const r=await api('/standings',{league:lid,season:szn});stndC[k]=r?.[0]||r||[];return stndC[k]}catch{stndC[k]=[];return[]}
}
async function getOdds(gid){
  if(oddC[gid]!==undefined)return oddC[gid];
  try{const r=await api('/odds',{game:gid});oddC[gid]=r||[];return oddC[gid]}catch{oddC[gid]=[];return[]}
}

// ═══ GAMES DATA ENGINE — calcola TUTTO dai risultati reali ═══
function analyzeTeamGames(games, tid){
  const finished=games.filter(g=>['FT','AOT'].includes(g.status?.short)&&g.scores?.home?.total!=null)
    .sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!finished.length) return null;

  let totalPts=0,totalOpp=0,wins=0,homeW=0,homeG=0,awayW=0,awayG=0;
  const margins=[],totals=[],last6=[];
  
  // Weighted recent + full season
  let wPts=0,wOpp=0,wSum=0;
  
  finished.forEach((g,i)=>{
    const isH=g.teams.home.id===tid;
    const my=isH?g.scores.home.total:g.scores.away.total;
    const op=isH?g.scores.away.total:g.scores.home.total;
    
    totalPts+=my; totalOpp+=op;
    margins.push(my-op); totals.push(my+op);
    if(my>op)wins++;
    
    if(isH){homeG++;if(my>op)homeW++}
    else{awayG++;if(my>op)awayW++}
    
    // Exponential weight for recent form
    const w=Math.pow(0.93,i); wPts+=my*w; wOpp+=op*w; wSum+=w;
    
    if(i<6) last6.push(my>op?'W':'L');
  });
  
  const N=finished.length;
  const ppg=totalPts/N, oppPpg=totalOpp/N;
  const wPpg=wPts/wSum, wOppPpg=wOpp/wSum; // weighted recent
  const winPct=wins/N;
  const homeWP=homeG?homeW/homeG:winPct;
  const awayWP=awayG?awayW/awayG:winPct;
  const net=ppg-oppPpg;
  const avgTotal=totals.reduce((s,x)=>s+x,0)/N;
  
  // Trend: last 5 vs season
  const last5=finished.slice(0,5);
  const l5ppg=last5.reduce((s,g)=>{const isH=g.teams.home.id===tid;return s+(isH?g.scores.home.total:g.scores.away.total)},0)/Math.max(last5.length,1);
  const trend=(l5ppg-ppg)/Math.max(ppg,1);
  
  // Consistency (std dev of margins)
  const meanM=margins.reduce((s,x)=>s+x,0)/N;
  const stdM=Math.sqrt(margins.reduce((s,x)=>s+(x-meanM)*(x-meanM),0)/N);
  
  // Streaks
  let streak=0;
  if(last6.length){const first=last6[0];for(const r of last6){if(r===first)streak++;else break}if(first==='L')streak=-streak}
  
  return{ppg,oppPpg,wPpg,wOppPpg,winPct,homeWP,awayWP,net,avgTotal,trend,stdM,form:last6,streak,N,homeG,awayG,wins,margins,totals};
}

function getH2H(games,tid,opp){
  const m=games.filter(g=>['FT','AOT'].includes(g.status?.short)&&
    ((g.teams.home.id===tid&&g.teams.away.id===opp)||(g.teams.home.id===opp&&g.teams.away.id===tid)));
  let w=0,pts=0,opts=0;
  m.forEach(g=>{const isH=g.teams.home.id===tid;const my=isH?g.scores.home.total:g.scores.away.total;const op=isH?g.scores.away.total:g.scores.home.total;if(my>op)w++;pts+=my;opts+=op});
  return{w,total:m.length,avgPts:m.length?pts/m.length:0}
}

// ═══ TRUE ELO from game history ═══
function buildElo(games){
  const elo={},K=20;
  games.filter(g=>['FT','AOT'].includes(g.status?.short)&&g.scores?.home?.total!=null)
    .sort((a,b)=>new Date(a.date)-new Date(b.date))
    .forEach(g=>{
      const h=g.teams.home.id,a=g.teams.away.id;
      if(!elo[h])elo[h]=1500;if(!elo[a])elo[a]=1500;
      const hs=g.scores.home.total,as=g.scores.away.total;
      const exp=1/(1+Math.pow(10,-(elo[h]+75-elo[a])/400));
      const res=hs>as?1:hs<as?0:.5;
      const mov=Math.log(Math.abs(hs-as)+1)*2.2/(Math.abs(elo[h]+75-elo[a])*.001+2.2);
      const adj=K*mov*(res-exp);
      elo[h]+=adj;elo[a]-=adj;
    });
  return elo;
}

// ═══ LOAD + RENDER ═══
async function load(){
  setS('load','Caricamento…');
  document.getElementById('lP').innerHTML='<div class="empty"><div class="spin"></div></div>';
  document.getElementById('gP').innerHTML='<div class="empty"><div class="ic">📋</div><p>Seleziona un campionato</p></div>';
  document.getElementById('aP').innerHTML='<div class="empty"><div class="ic">🧠</div><p>Seleziona una partita</p></div>';
  try{
    ALL=await api('/games',{date:ds(off),timezone:'Europe/Rome'});
    setS('ok','OK');
    if(!ALL.length){document.getElementById('lP').innerHTML='<div class="empty"><div class="ic">📭</div><p>Nessuna partita per questa data</p></div>';return}
    renderLeagues();
  }catch(e){setS('err','Errore');document.getElementById('lP').innerHTML=`<div class="empty"><div class="ic">⚠️</div><p>${e.message}</p><button onclick="load()" style="margin-top:6px;padding:6px 10px;background:var(--accent);color:#000;border:0;border-radius:6px;cursor:pointer;font-weight:700;font-family:inherit">Riprova</button></div>`}
}

function renderLeagues(){
  // Group by COUNTRY then sort alphabetically
  const map=new Map();
  ALL.forEach(g=>{
    const id=g.league.id, country=g.country?.name||g.league?.country||'Altro';
    if(!map.has(id))map.set(id,{id,name:g.league.name,country,count:0,season:g.league?.season||g.season});
    map.get(id).count++;
  });
  const leagues=[...map.values()];
  
  // Group by country
  const byCountry={};
  leagues.forEach(l=>{
    const c=l.country||'Altro';
    if(!byCountry[c])byCountry[c]=[];
    byCountry[c].push(l);
  });
  
  // Sort countries alphabetically, leagues within each country alphabetically
  const countries=Object.keys(byCountry).sort((a,b)=>a.localeCompare(b,'it'));
  countries.forEach(c=>byCountry[c].sort((a,b)=>a.name.localeCompare(b.name,'it')));
  
  document.getElementById('lc').textContent=leagues.length;
  
  let html='';
  countries.forEach(c=>{
    html+=`<div class="cgroup"><div class="cgroup-title">${getFlag(c)} ${c}</div>`;

function selLeague(id){
  selL=id;document.querySelectorAll('.li').forEach(e=>e.classList.toggle('on',+e.dataset.id===id));
  const games=ALL.filter(g=>g.league.id===id);
  const ord={'Q1':0,'Q2':0,'Q3':0,'Q4':0,'OT':0,'HT':0,'BT':0,'NS':1,'FT':2,'AOT':2};
  games.sort((a,b)=>(ord[a.status.short]??1)-(ord[b.status.short]??1));
  document.getElementById('gT').textContent=games[0]?.league?.name||'Partite';
  document.getElementById('gc').textContent=games.length;
  document.getElementById('gP').innerHTML=games.map(g=>{
    const lv=['Q1','Q2','Q3','Q4','OT','HT','BT'].includes(g.status.short),ft=['FT','AOT'].includes(g.status.short);
    const hs=g.scores?.home?.total,as=g.scores?.away?.total;
    const t=new Date(g.date).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    const hw=hs!=null&&as!=null&&hs>as;
    const b=lv?'<span class="badge blv">LIVE</span>':ft?'<span class="badge bft">FT</span>':`<span>${t}</span>`;
    return`<div class="gc${g.id===selG?' sel':''}" onclick="analyze(${g.id})"><div class="gc-top"><span>${g.country?.name||''} · ${g.league.name}</span>${b}</div><div class="gc-row"><div class="gc-name"><img src="${g.teams.home.logo}" width="16" height="16" style="object-fit:contain" onerror="this.style.display='none'">${g.teams.home.name}</div><div class="gc-sc${hw?' w':''}">${hs??''}</div></div><div class="gc-row"><div class="gc-name"><img src="${g.teams.away.logo}" width="16" height="16" style="object-fit:contain" onerror="this.style.display='none'">${g.teams.away.name}</div><div class="gc-sc${!hw&&hs!=null?' w':''}">${as??''}</div></div></div>`;
  }).join('')||'<div class="empty"><div class="ic">📭</div><p>Nessuna</p></div>';
}

// ═══ ANALYZE ═══
async function analyze(gid){
  selG=gid;document.querySelectorAll('.gc').forEach(e=>e.classList.remove('sel'));event?.target?.closest?.('.gc')?.classList.add('sel');
  const P=document.getElementById('aP');P.innerHTML='<div class="empty"><div class="spin"></div><p>Analisi in corso…<br><span style="font-size:.6rem">Caricamento partite stagionali</span></p></div>';
  const g=ALL.find(x=>x.id===gid);if(!g)return;
  const lid=g.league.id,hid=g.teams.home.id,aid=g.teams.away.id;
  // Season: try league.season, then game.season, then derive from date
  let szn=g.league?.season||g.season;
  if(!szn){const y=new Date(g.date).getFullYear();szn=g.date<y+'-07-01'?(y-1)+'-'+(y):y+'-'+(y+1)}
  console.log('[BasketPro] Game:',g.teams.home.name,'vs',g.teams.away.name,'| League:',lid,'| Season:',szn);
  
  // Fetch game histories (PRIMARY DATA SOURCE)
  let hGames=[],aGames=[],hStat=null,aStat=null,stand=[],odds=[];
  try{
    [hGames,aGames,hStat,aStat,stand,odds]=await Promise.all([
      getTeamGames(lid,szn,hid),getTeamGames(lid,szn,aid),
      getTeamStats(lid,szn,hid),getTeamStats(lid,szn,aid),
      getStand(lid,szn),getOdds(gid)
    ]);
  }catch(e){console.warn('[BasketPro] Fetch error:',e)}
  
  console.log('[BasketPro] Results — Home games:',hGames.length,'Away games:',aGames.length,'Stats H:',!!hStat,'Stats A:',!!aStat);
  
  // If zero games, try alternative season formats
  if(!hGames.length&&!aGames.length){
    const alts=[];
    if(typeof szn==='string'&&szn.includes('-')){alts.push(szn.split('-')[0])}
    else if(typeof szn==='number'||/^\d{4}$/.test(szn)){const y=parseInt(szn);alts.push(y+'-'+(y+1));alts.push((y-1)+'-'+y)}
    for(const alt of alts){
      console.log('[BasketPro] Retrying with season:',alt);
      const [h2,a2]=await Promise.all([getTeamGames(lid,alt,hid),getTeamGames(lid,alt,aid)]);
      if(h2.length||a2.length){hGames=h2;aGames=a2;szn=alt;
        [hStat,aStat,stand]=await Promise.all([getTeamStats(lid,alt,hid),getTeamStats(lid,alt,aid),getStand(lid,alt)]);
        console.log('[BasketPro] Alt season worked:',alt,'H:',h2.length,'A:',a2.length);
        break;
      }
    }
  }

  // PRIMARY: Analyze from real game results
  const hData=analyzeTeamGames(hGames,hid);
  const aData=analyzeTeamGames(aGames,aid);

  // CHECK: Do we have enough data?
  const hN=hData?.N||0, aN=aData?.N||0;
  const minGames=5;
  
  if(hN<minGames||aN<minGames){
    P.innerHTML=`<button class="abtn" onclick="selLeague(${selL})">← Partite</button>
      <div style="font-size:.88rem;font-weight:900;margin-bottom:3px">${g.teams.home.name} vs ${g.teams.away.name}</div>
      <div style="font-size:.65rem;color:var(--muted);margin-bottom:12px">${g.country?.name||''} · ${g.league.name}</div>
      <div class="warn">⚠️ DATI INSUFFICIENTI PER PREVISIONE AFFIDABILE</div>
      <div style="background:var(--card);border-radius:var(--r);padding:12px;font-size:.72rem;line-height:1.6;color:var(--muted)">
        <b style="color:var(--text)">${g.teams.home.name}:</b> ${hN} partite trovate (minimo ${minGames})<br>
        <b style="color:var(--text)">${g.teams.away.name}:</b> ${aN} partite trovate (minimo ${minGames})<br><br>
        <span style="font-size:.6rem;color:var(--yellow)">Debug: league=${lid} season=${szn} hid=${hid} aid=${aid}<br>
        Season originale: ${g.league?.season||'null'} / ${g.season||'null'}<br>
        hStat: ${hStat?'OK':'null'} / aStat: ${aStat?'OK':'null'}</span><br><br>
        L'algoritmo <b>rifiuta</b> di fare previsioni con dati insufficienti per evitare risultati casuali.
      </div>`;
    return;
  }
  
  // Build Elo from combined game history
  const allG=[...new Map([...hGames,...aGames].map(x=>[x.id,x])).values()];
  const elo=buildElo(allG);
  
  // Run prediction
  const pred=predict(hData,aData,hStat,aStat,stand,odds,elo,g);
  renderPred(g,pred,P);
}

// ═══ PREDICTION ENGINE ═══
function predict(hD,aD,hStat,aStat,stand,odds,elo,game){
  const hid=game.teams.home.id,aid=game.teams.away.id;
  const hn=game.teams.home.name,an=game.teams.away.name;
  const R=[];
  
  // Use WEIGHTED recent PPG as primary (not season averages which hide trends)
  const hPPG=hD.wPpg, aPPG=aD.wPpg;
  const hDEF=hD.wOppPpg, aDEF=aD.wOppPpg;
  const hHP=hD.homeWP, aAW=aD.awayWP;
  
  // ── MODEL A: Efficiency Crossover (30%) ──
  // Home team: avg of their weighted offense vs opponent's weighted defense
  const HCA=3.0;
  let predH=(hPPG*0.55+aDEF*0.45)+HCA*0.6;
  let predA=(aPPG*0.55+hDEF*0.45)-HCA*0.4;
  
  // Trend adjustment
  predH*=(1+hD.trend*0.35);
  predA*=(1+aD.trend*0.35);
  
  // H2H
  const h2h=getH2H(hD.N>0?Object.values(gC).flat():[],hid,aid);
  if(h2h.total>=2){const r=h2h.w/h2h.total;predH+=(r-.5)*2.5;predA-=(r-.5)*2.5}
  
  // Standings
  const flat=Array.isArray(stand)?stand.flat?.(2)??stand:[];
  const hSt=flat.find(s=>s?.team?.id===hid),aSt=flat.find(s=>s?.team?.id===aid);
  const hPos=hSt?.position||null,aPos=aSt?.position||null;
  if(hPos&&aPos){const adj=clamp(-2,(aPos-hPos)*.2,2);predH+=adj;predA-=adj}
  
  predH=Math.round(clamp(50,predH,170));
  predA=Math.round(clamp(45,predA,165));
  const SD=12;
  const mA=ncdf((predH-predA)/SD)*100;
  
  // ── MODEL B: True Elo (25%) ──
  const hE=elo[hid]||1500, aE=elo[aid]||1500;
  const mB=1/(1+Math.pow(10,-(hE-aE+75)/400))*100;
  
  // ── MODEL C: Log5 (25%) ──
  const hWP=clamp(.08,hHP||hD.winPct,.95);
  const aWP=clamp(.05,aAW||aD.winPct,.92);
  const mC=(hWP*(1-aWP))/(hWP*(1-aWP)+(1-hWP)*aWP)*100;
  
  // ── MODEL D: Momentum (20%) ──
  const hFP=hD.form.length?hD.form.filter(x=>x==='W').length/hD.form.length:.5;
  const aFP=aD.form.length?aD.form.filter(x=>x==='W').length/aD.form.length:.5;
  let mD=50+(hFP-aFP)*35+(hD.trend-aD.trend)*80;
  if(hD.stdM<aD.stdM)mD+=2;else if(aD.stdM<hD.stdM)mD-=2;
  mD+=clamp(-3,(hD.streak-aD.streak)*1.2,3);
  mD=clamp(12,mD,88);
  
  // ── ENSEMBLE ──
  let hProb=mA*.30+mB*.25+mC*.25+mD*.20;
  hProb=clamp(8,Math.round(hProb),92);
  const aProb=100-hProb;
  
  // Predicted scores (blend crossover with recent weighted)
  const fH=Math.round(predH*.5+(hD.wPpg+aD.wOppPpg)/2*.5);
  const fA=Math.round(predA*.5+(aD.wPpg+hD.wOppPpg)/2*.5);
  const predTot=fH+fA;
  const spread=fH-fA;
  
  // O/U
  const pace=(hD.avgTotal+aD.avgTotal)/2;
  const mainLine=Math.round(pace/5)*5||Math.round(predTot/5)*5;
  const SDt=SD*1.4;
  const overP=clamp(8,(1-ncdf((mainLine-predTot)/SDt))*100,92);
  const ouLines=[];
  for(let x=-10;x<=10;x+=5){const l=mainLine+x;if(l<80||l>400)continue;ouLines.push({l,o:Math.round(clamp(5,(1-ncdf((l-predTot)/SDt))*100,95)),m:l===mainLine})}
  
  // Concordance
  const side=p=>p>55?'H':p<45?'A':'X';
  const sides=[side(mA),side(mB),side(mC),side(mD)];
  const conc=Math.max(sides.filter(s=>s==='H').length,sides.filter(s=>s==='A').length)>=3?'high':Math.max(sides.filter(s=>s==='H').length,sides.filter(s=>s==='A').length)>=2?'mid':'low';
  
  // Data quality
  const dq=Math.min(100,Math.round((Math.min(hD.N,30)/30*40)+(Math.min(aD.N,30)/30*40)+(hStat?10:0)+(aStat?10:0)));
  
  // Confidence
  const diff=Math.abs(hProb-aProb);
  const conf=clamp(10,Math.round(diff*.4+dq*.3+(conc==='high'?15:conc==='mid'?5:0)+Math.min(hD.form.length,aD.form.length)*2),95);
  
  // Odds & Value
  let bkH=null,bkA=null,value=null;
  if(odds?.length){odds.forEach(o=>{(o.bookmakers||[]).forEach(b=>{(b.bets||[]).forEach(bt=>{if(bt.name==='Home/Away'||bt.name==='Match Winner'){(bt.values||[]).forEach(v=>{if(v.value==='Home')bkH=n(v.odd);if(v.value==='Away')bkA=n(v.odd)})}})})});
    if(bkH&&bkA){const iH=1/bkH*100,iA=1/bkA*100;const eH=hProb-iH,eA=aProb-iA;
    if(eH>5)value={s:'Casa',e:eH,p:hProb,bp:iH,o:bkH};
    else if(eA>5)value={s:'Ospite',e:eA,p:aProb,bp:iA,o:bkA};
    R.push({t:`Quote: ${hn} @${bkH} (${fmt(iH,0)}%) · ${an} @${bkA} (${fmt(iA,0)}%)`,y:'neu'})}}
  
  // Kelly
  const mainP=Math.max(hProb,aProb)/100;
  const kelly=clamp(0,((1.90-1)*mainP-(1-mainP))/(1.90-1)*100,20);
  
  // Reasons
  R.push({t:`PPG pesato: ${hn} ${fmt(hD.wPpg)} vs ${an} ${fmt(aD.wPpg)}`,y:hD.wPpg>aD.wPpg?'pos':'neg'});
  R.push({t:`Difesa: ${hn} ${fmt(hD.wOppPpg)} subiti vs ${an} ${fmt(aD.wOppPpg)} subiti`,y:hD.wOppPpg<aD.wOppPpg?'pos':'neg'});
  R.push({t:`Net Rating: ${hn} ${fmt(hD.net)} vs ${an} ${fmt(aD.net)}`,y:hD.net>aD.net?'pos':'neg'});
  R.push({t:`Win%: ${hn} ${fmt(hD.winPct*100,0)}% (${hD.wins}W/${hD.N}) vs ${an} ${fmt(aD.winPct*100,0)}% (${aD.wins}W/${aD.N})`,y:hD.winPct>aD.winPct?'pos':'neg'});
  if(Math.abs(hE-aE)>30)R.push({t:`Elo: ${hn} ${Math.round(hE)} vs ${an} ${Math.round(aE)} (Δ${Math.round(hE-aE)})`,y:hE>aE?'pos':'neg'});
  if(hD.form.length>=3)R.push({t:`Forma ${hn}: ${hD.form.join('')} (${(hFP*100).toFixed(0)}%)`,y:hFP>.6?'pos':hFP<.4?'neg':'neu'});
  if(aD.form.length>=3)R.push({t:`Forma ${an}: ${aD.form.join('')} (${(aFP*100).toFixed(0)}%)`,y:aFP>.6?'neg':aFP<.4?'pos':'neu'});
  if(Math.abs(hD.trend)>.03)R.push({t:`Trend ${hn}: ${hD.trend>0?'+':''}${(hD.trend*100).toFixed(1)}%`,y:hD.trend>0?'pos':'neg'});
  if(Math.abs(aD.trend)>.03)R.push({t:`Trend ${an}: ${aD.trend>0?'+':''}${(aD.trend*100).toFixed(1)}%`,y:aD.trend>0?'neg':'pos'});
  if(h2h.total>=2)R.push({t:`H2H: ${hn} ${h2h.w}W su ${h2h.total}`,y:h2h.w>h2h.total/2?'pos':'neg'});
  if(hPos&&aPos)R.push({t:`Classifica: ${hn} #${hPos} vs ${an} #${aPos}`,y:hPos<aPos?'pos':'neg'});
  R.push({t:`Pace media: ${fmt(pace,0)} pts/partita`,y:'neu'});
  R.push({t:`Partite analizzate: ${hn} ${hD.N} · ${an} ${aD.N}`,y:'neu'});
  
  const fav=hProb>50?hn:an;
  return{hProb,aProb,fH,fA,predTot,spread,mA,mB,mC,mD,conc,conf,kelly:kelly.toFixed(1),mainLine,overP:Math.round(overP),ouLines,pace,hD,aD,hE,aE,hPos,aPos,R,fav,bkH,bkA,value,dq};
}

// ═══ RENDER PREDICTION ═══
function renderPred(g,P,panel){
  const ft=['FT','AOT'].includes(g.status.short),hs=g.scores?.home?.total,as=g.scores?.away?.total;

  const stars=n=>('★'.repeat(clamp(1,Math.round(P.conf/20),5))+'☆'.repeat(5-clamp(1,Math.round(P.conf/20),5)));
  const ouPick=P.overP>53?'OVER':P.overP<47?'UNDER':'~';
  
  // Verify finished
  let vfy='';
  if(ft&&hs!=null&&as!=null){const pOk=(P.hProb>=50&&hs>as)||(P.aProb>50&&as>hs);const tot=hs+as;const oOk=(P.overP>50&&tot>P.mainLine)||(P.overP<=50&&tot<=P.mainLine);

  else if(d>18)ins=`Vantaggio chiaro per <b>${P.fav}</b> (${Math.max(P.hProb,P.aProb)}%). ${P.bkH?'Le quote non offrono valore sufficiente.':''} Net rating: ${fmt(P.hD.net)} vs ${fmt(P.aD.net)}.`;

      <div class="bx"><div class="bx-l">A · Efficiency</div><div class="bx-v" style="color:${P.mA>55?'var(--green)':P.mA<45?'var(--blue)':'var(--yellow)'}">${fmt(P.mA,1)}%</div><div class="bx-s">${P.fH}-${P.fA}</div></div>
      <div class="bx"><div class="bx-l">B · Elo (${Math.round(P.hE)}-${Math.round(P.aE)})</div><div class="bx-v" style="color:${P.mB>55?'var(--green)':P.mB<45?'var(--blue)':'var(--yellow)'}">${fmt(P.mB,1)}%</div><div class="bx-s">Δ${Math.round(P.hE-P.aE)}</div></div>
      <div class="bx"><div class="bx-l">C · Log5</div><div class="bx-v" style="color:${P.mC>55?'var(--green)':P.mC<45?'var(--blue)':'var(--yellow)'}">${fmt(P.mC,1)}%</div><div class="bx-s">WP c/t</div></div>
      <div class="bx"><div class="bx-l">D · Momentum</div><div class="bx-v" style="color:${P.mD>55?'var(--green)':P.mD<45?'var(--blue)':'var(--yellow)'}">${fmt(P.mD,1)}%</div><div class="bx-s">Forma+Trend</div></div>
    </div>
    
    <div class="sec">💰 Pronostici</div>
    <div class="g2">
      ${valH}
      <div class="bx${P.value?' val':' hot'}"><div class="bx-l">Pick</div><div class="bx-v">${pick}</div><div class="bx-s">${P.fav.split(' ').pop()}${P.bkH?' @'+(P.hProb>=50?P.bkH:P.bkA):''}</div></div>
      <div class="bx${Math.abs(P.overP-50)>8?' hot':''}"><div class="bx-l">O/U ${P.mainLine}</div><div class="bx-v" style="color:${P.overP>53?'var(--green)':P.overP<47?'var(--blue)':'var(--yellow)'}">${ouPick}</div><div class="bx-s">${Math.max(P.overP,100-P.overP)}%</div></div>
      <div class="bx"><div class="bx-l">Spread</div><div class="bx-v mono" style="font-size:.82rem">${P.spread>0?g.teams.home.name.split(' ').pop():g.teams.away.name.split(' ').pop()} -${Math.abs(P.spread).toFixed(1)}</div></div>
      <div class="bx"><div class="bx-l">Kelly @1.90</div><div class="bx-v mono">${P.kelly}%</div></div>
    </div>
    
    <div class="sec">🎯 Score previsto</div>
    <div style="display:flex;justify-content:center;gap:14px;padding:10px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin-bottom:8px">
      <div style="text-align:center"><div style="font-size:.48rem;color:var(--muted);font-weight:700">${g.teams.home.name.split(' ').pop()}</div><div style="font-size:1.6rem;font-weight:900;color:var(--green)">${P.fH}</div></div>
      <div style="font-size:1rem;color:var(--muted);align-self:center;font-weight:900">–</div>
      <div style="text-align:center"><div style="font-size:.48rem;color:var(--muted);font-weight:700">${g.teams.away.name.split(' ').pop()}</div><div style="font-size:1.6rem;font-weight:900;color:var(--blue)">${P.fA}</div></div>
      <div style="text-align:center;align-self:center;margin-left:6px"><div style="font-size:.42rem;color:var(--muted)">TOT</div><div style="font-size:.95rem;font-weight:900;color:var(--yellow)">${P.predTot}</div></div>
    </div>
    
    <div class="sec">📈 O/U</div>
    ${P.ouLines.map(x=>`<div class="ou-r${x.m?' main':''}"><span class="mono" style="font-weight:800">O/U ${x.l}</span><span style="font-weight:800;color:${x.o>55?'var(--green)':x.o<45?'var(--red)':'var(--yellow)'}">O ${x.o}% · U ${100-x.o}%</span></div>`).join('')}
    
    <div class="sec" style="margin-top:8px">✨ AI Insight</div>
    <div class="aib"><div class="ait">SUPER AI v8</div><div class="aitx">${ins}</div></div>
    
    <div class="sec">📊 Confronto statistiche</div>
    <div style="display:flex;justify-content:space-between;font-size:.55rem;font-weight:700;padding:0 5px;margin-bottom:2px"><span style="color:var(--green)">${g.teams.home.name.split(' ').pop()}</span><span style="color:var(--blue)">${g.teams.away.name.split(' ').pop()}</span></div>
    ${stH}
    
    <div class="sec" style="margin-top:8px">🔥 Forma (ultime 6)</div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:7px;background:var(--card);border-radius:var(--r);margin-bottom:6px">
      <div><div style="font-size:.58rem;font-weight:700;margin-bottom:2px">${g.teams.home.name.split(' ').pop()}</div>${fD(P.hD.form)}</div>
      <div style="text-align:right"><div style="font-size:.58rem;font-weight:700;margin-bottom:2px">${g.teams.away.name.split(' ').pop()}</div>${fD(P.aD.form)}</div>
    </div>
    
    <div class="sec">🧠 Ragionamento (${P.R.length} fattori)</div>
    <div style="background:var(--card);border-radius:var(--r);padding:6px;margin-bottom:6px">${P.R.map(r=>`<div class="reason"><span>${r.y==='pos'?'✅':r.y==='neg'?'⚠️':'📊'}</span><span>${r.t}</span></div>`).join('')}</div>
    
    <button class="sbtn" id="sb" onclick="save(${g.id})">⭐ Salva su Firebase</button>`;
  
  requestAnimationFrame(()=>{const h=document.getElementById('ph'),a=document.getElementById('pa');if(h)h.style.width=P.hProb+'%';if(a)a.style.width=P.aProb+'%'});
}

// ═══ FIREBASE ═══
async function save(gid){
  const g=ALL.find(x=>x.id===gid);if(!g)return;
  const btn=document.getElementById('sb');btn.disabled=1;btn.textContent='Salvataggio…';
  // Re-run cached prediction
  const lid=g.league.id,szn=g.league?.season||g.season||'2024-2025',hid=g.teams.home.id,aid=g.teams.away.id;
  const hG=gC[`g_${lid}_${szn}_${hid}`]||[],aG=gC[`g_${lid}_${szn}_${aid}`]||[];
  const hD=analyzeTeamGames(hG,hid),aD=analyzeTeamGames(aG,aid);
  if(!hD||!aD){btn.textContent='❌ Dati mancanti';return}
  const allG=[...new Map([...hG,...aG].map(x=>[x.id,x])).values()];
  const P=predict(hD,aD,stC[`s_${lid}_${szn}_${hid}`],stC[`s_${lid}_${szn}_${aid}`],stndC[`st_${lid}_${szn}`]||[],oddC[gid]||[],buildElo(allG),g);
  const ft=['FT','AOT'].includes(g.status.short);
  const data={gameId:gid,match:`${g.teams.home.name} vs ${g.teams.away.name}`,league:g.league.name,country:g.country?.name||'',date:g.date,
    pick:P.hProb>=50?'1':'2',pickTeam:P.fav,homeProb:P.hProb,awayProb:P.aProb,
    predScore:`${P.fH}-${P.fA}`,predTotal:P.predTot,ouLine:P.mainLine,ouPick:P.overP>50?'OVER':'UNDER',
    spread:P.spread,confidence:P.conf,concordance:P.conc,kelly:P.kelly,dataQuality:P.dq,
    models:{A:fmt(P.mA),B:fmt(P.mB),C:fmt(P.mC),D:fmt(P.mD)},
    bookOdds:P.bkH?{home:P.bkH,away:P.bkA}:null,
    valueBet:P.value?{side:P.value.s,edge:fmt(P.value.e),odd:P.value.o}:null,
    gamesAnalyzed:{home:P.hD.N,away:P.aD.N},
    savedAt:new Date().toISOString(),
    result:ft&&g.scores?.home?.total!=null?{h:g.scores.home.total,a:g.scores.away.total,tot:g.scores.home.total+g.scores.away.total,pickOK:(P.hProb>=50&&g.scores.home.total>g.scores.away.total)||(P.aProb>50&&g.scores.away.total>g.scores.home.total)}:'pending'};
  try{const r=await fetch(FB_URL+'/picks.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});if(!r.ok)throw Error(r.status);btn.textContent='✅ Salvato!';btn.classList.add('done')}catch(e){btn.textContent='❌ '+e.message;btn.disabled=0}
}

// ═══ NAV ═══
function go(o,el){off=o;selG=null;selL=null;document.querySelectorAll('.dbtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');load()}
document.addEventListener('DOMContentLoaded',load);
</script>
</body>
</html>
