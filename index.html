<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BasketPro — Basketball Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0f;
  --bg-card: #12141c;
  --bg-card2: #181b26;
  --bg-input: #1a1d28;
  --border: rgba(255,255,255,0.06);
  --text: #f0f0f5;
  --text-gray: #8b8fa3;
  --text-dark: #5a5e72;
  --accent-fire: #ff6b2c;
  --accent-orange: #ff8c42;
  --accent-gold: #fbbf24;
  --accent-emerald: #10b981;
  --accent-red: #ef4444;
  --accent-cyan: #06b6d4;
  --accent-purple: #a78bfa;
  --accent-blue: #3b82f6;
  --glow-fire: rgba(255,107,44,0.25);
  --glow-emerald: rgba(16,185,129,0.2);
}
body.light-mode {
  --bg: #f3f4f8; --bg-card: #ffffff; --bg-card2: #f8f9fc; --bg-input: #eef0f5;
  --border: rgba(0,0,0,0.08); --text: #1a1b2e; --text-gray: #6b7085; --text-dark: #9ca0b4;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
}
body::before {
  content:''; position:fixed; top:0; left:0; right:0; height:400px;
  background: radial-gradient(ellipse at 50% -20%, rgba(255,107,44,0.08) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--accent-fire); border-radius: 4px; }

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(180deg, var(--bg) 60%, transparent);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 14px 16px 8px; display: flex; align-items: center; justify-content: space-between;
}
.header-logo {
  font-size: 1.4rem; font-weight: 900; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent-fire), var(--accent-orange), var(--accent-gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-logo span { font-size: 0.6rem; font-weight: 600; vertical-align: super; opacity: 0.7; -webkit-text-fill-color: var(--accent-gold); }
.header-right { display: flex; gap: 8px; align-items: center; }
.header-btn {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 8px 12px; font-size: 0.75rem; font-weight: 600; color: var(--text-gray);
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.header-btn:hover { border-color: var(--accent-fire); color: var(--accent-fire); }
.header-btn.active { background: rgba(255,107,44,0.1); border-color: var(--accent-fire); color: var(--accent-fire); }

/* DATE TABS */
.date-tabs {
  display: flex; gap: 6px; padding: 8px 16px 12px; overflow-x: auto;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.date-tabs::-webkit-scrollbar { display: none; }
.date-tab {
  flex-shrink: 0; padding: 8px 16px; border-radius: 12px; font-size: 0.78rem; font-weight: 700;
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text-gray);
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.date-tab.active {
  background: linear-gradient(135deg, var(--accent-fire), var(--accent-orange));
  color: white; border-color: transparent; box-shadow: 0 4px 15px var(--glow-fire);
}

/* MAIN CONTAINER */
.container { max-width: 520px; margin: 0 auto; padding: 0 12px 100px; position: relative; z-index: 1; }

/* PANEL */
.panel {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
  padding: 16px; margin-bottom: 12px;
}
.panel-title {
  font-size: 0.95rem; font-weight: 800; margin-bottom: 14px;
  color: var(--accent-fire); display: flex; align-items: center; gap: 8px;
}

/* LEAGUE GROUP */
.league-group { margin-bottom: 16px; }
.league-header {
  display: flex; align-items: center; gap: 10px; padding: 12px 14px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
  cursor: pointer; transition: all 0.2s; margin-bottom: 6px;
}
.league-header:hover { border-color: var(--accent-fire); background: var(--bg-card2); }
.league-header.expanded { border-color: var(--accent-fire); background: rgba(255,107,44,0.04); border-radius: 14px 14px 0 0; margin-bottom: 0; }
.league-logo { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; object-fit: contain; }
.league-info { flex: 1; min-width: 0; }
.league-name { font-size: 0.9rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.league-country { font-size: 0.7rem; color: var(--text-dark); font-weight: 500; }
.league-count {
  font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 800;
  color: var(--accent-fire); flex-shrink: 0;
  background: rgba(255,107,44,0.1); padding: 4px 10px; border-radius: 8px;
}
.league-arrow { font-size: 0.7rem; color: var(--text-dark); transition: transform 0.3s; flex-shrink: 0; }
.league-header.expanded .league-arrow { transform: rotate(90deg); color: var(--accent-fire); }

/* MATCHES LIST */
.matches-container {
  border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 14px 14px; overflow: hidden; margin-bottom: 6px;
}
.match-item {
  display: flex; align-items: center; padding: 12px 14px;
  background: var(--bg-card2); border-bottom: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s; gap: 10px;
}
.match-item:last-child { border-bottom: none; }
.match-item:hover { background: rgba(255,107,44,0.04); }
.match-time {
  font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; font-weight: 700;
  color: var(--text-dark); min-width: 44px; text-align: center; flex-shrink: 0;
}
.match-time.live { color: var(--accent-red); animation: pulse 1.5s infinite; }
.match-time.ft { color: var(--accent-emerald); font-weight: 800; }
.match-teams { flex: 1; min-width: 0; }
.match-team {
  display: flex; align-items: center; gap: 8px; padding: 2px 0;
  font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.match-team-logo { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; object-fit: contain; }
.match-score {
  font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 800;
  min-width: 24px; text-align: right; flex-shrink: 0;
}
.match-score.winner { color: var(--accent-emerald); }
.match-score.live { color: var(--accent-red); }
.match-arrow { font-size: 0.65rem; color: var(--text-dark); flex-shrink: 0; margin-left: 4px; }

/* PLAYER NAMES IN MATCH */
.match-players {
  font-size: 0.62rem; color: var(--text-dark); font-weight: 400;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px; padding-left: 28px;
}

/* BACK BUTTON */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px;
  font-size: 0.82rem; font-weight: 700; color: var(--accent-fire); cursor: pointer;
  margin-bottom: 12px; border-radius: 12px; transition: all 0.2s;
}
.back-btn:hover { background: rgba(255,107,44,0.08); }

/* HERO SECTION (Analysis) */
.hero {
  background: linear-gradient(135deg, rgba(255,107,44,0.08), rgba(255,140,66,0.04));
  border: 1px solid rgba(255,107,44,0.15); border-radius: 20px;
  padding: 24px 16px; margin-bottom: 16px; text-align: center; position: relative; overflow: hidden;
}
.hero::before {
  content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
  background: radial-gradient(circle at 50% 50%, rgba(255,107,44,0.06) 0%, transparent 50%);
  animation: heroGlow 8s ease-in-out infinite;
}
@keyframes heroGlow { 0%,100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
.hero-teams { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 16px; position: relative; z-index: 1; }
.hero-team { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.hero-team-logo { width: 56px; height: 56px; border-radius: 12px; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
.hero-team-name { font-size: 0.85rem; font-weight: 700; max-width: 120px; text-align: center; line-height: 1.2; }
.hero-vs {
  font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; font-weight: 800;
  color: var(--text-dark); padding: 8px; border-radius: 12px; background: var(--bg-card);
}
.hero-prediction {
  position: relative; z-index: 1; display: flex; justify-content: center; align-items: center; gap: 12px;
}
.hero-score {
  font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 900;
  background: linear-gradient(135deg, var(--accent-fire), var(--accent-orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-prob {
  font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 700;
  color: var(--accent-gold); background: rgba(251,191,36,0.1); padding: 4px 10px; border-radius: 8px;
}
.hero-info { position: relative; z-index: 1; font-size: 0.72rem; color: var(--text-dark); margin-top: 10px; }

/* ANALYSIS TABS */
.tabs {
  display: flex; gap: 4px; padding: 4px; background: var(--bg-card); border-radius: 14px;
  border: 1px solid var(--border); margin-bottom: 14px; overflow-x: auto;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 1; min-width: 0; padding: 10px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 700;
  text-align: center; cursor: pointer; transition: all 0.2s; color: var(--text-gray); white-space: nowrap;
}
.tab.active {
  background: linear-gradient(135deg, var(--accent-fire), var(--accent-orange));
  color: white; box-shadow: 0 2px 10px var(--glow-fire);
}

/* STAT GRID */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.stat-box {
  background: var(--bg-card2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center;
}
.stat-box-label { font-size: 0.65rem; color: var(--text-dark); text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
.stat-box-value { font-family: 'JetBrains Mono', monospace; font-size: 1.15rem; font-weight: 800; color: var(--accent-fire); }

/* PROBABILITY BAR */
.prob-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.prob-label { width: 90px; font-size: 0.78rem; color: var(--text-gray); font-weight: 600; flex-shrink: 0; }
.prob-bar-wrap { flex: 1; height: 28px; background: var(--bg-input); border-radius: 8px; overflow: hidden; position: relative; }
.prob-bar {
  height: 100%; border-radius: 8px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; align-items: center; justify-content: flex-end; padding-right: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; font-weight: 800; color: white;
}
.prob-bar.home { background: linear-gradient(90deg, var(--accent-fire), var(--accent-orange)); }
.prob-bar.away { background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); }
.prob-bar.over { background: linear-gradient(90deg, var(--accent-emerald), #34d399); }
.prob-bar.under { background: linear-gradient(90deg, var(--accent-purple), #c084fc); }

/* OU TABLE */
.ou-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
.ou-table th {
  font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-dark);
  padding: 6px 8px; text-align: center;
}
.ou-table td {
  padding: 10px 8px; text-align: center; font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 700; background: var(--bg-card2); 
}
.ou-table tr td:first-child { border-radius: 8px 0 0 8px; color: var(--accent-fire); font-weight: 800; }
.ou-table tr td:last-child { border-radius: 0 8px 8px 0; }
.ou-table .best { background: rgba(255,107,44,0.1); color: var(--accent-fire); }
.ou-table .smart { background: rgba(16,185,129,0.1); color: var(--accent-emerald); font-weight: 800; }

/* PLAYER CARD */
.player-card {
  background: var(--bg-card2); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px; margin-bottom: 8px; transition: all 0.2s;
}
.player-card:hover { border-color: rgba(255,107,44,0.2); }
.player-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.player-pos {
  font-size: 0.6rem; font-weight: 800; padding: 3px 8px; border-radius: 6px;
  text-transform: uppercase; flex-shrink: 0;
}
.player-pos.G { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
.player-pos.F { background: rgba(167,139,250,0.15); color: var(--accent-purple); }
.player-pos.C { background: rgba(255,107,44,0.15); color: var(--accent-fire); }
.player-name { font-size: 0.85rem; font-weight: 700; }
.player-team { font-size: 0.68rem; color: var(--text-dark); }
.player-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.player-stat {
  text-align: center; padding: 6px 4px; background: var(--bg-input); border-radius: 8px;
}
.player-stat-label { font-size: 0.58rem; color: var(--text-dark); font-weight: 600; text-transform: uppercase; }
.player-stat-value { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; font-weight: 800; color: var(--text); }

/* HANDICAP TABLE */
.hcap-row {
  display: grid; grid-template-columns: 1fr 2fr 2fr; gap: 4px; margin-bottom: 4px; align-items: center;
}
.hcap-line { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; font-weight: 800; color: var(--accent-fire); text-align: center; }
.hcap-bar {
  height: 32px; border-radius: 6px; display: flex; align-items: center;
  padding: 0 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; font-weight: 700; color: white;
}

/* FORM DISPLAY */
.form-display { display: flex; gap: 3px; }
.form-dot {
  width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; font-weight: 800; color: white;
}
.form-dot.W { background: var(--accent-emerald); }
.form-dot.L { background: var(--accent-red); }
.form-dot.D { background: var(--text-dark); }

/* CONFIDENCE BADGE */
.confidence {
  display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
  border-radius: 8px; font-size: 0.7rem; font-weight: 800;
}
.confidence.alta { background: rgba(16,185,129,0.15); color: var(--accent-emerald); }
.confidence.media { background: rgba(251,191,36,0.15); color: var(--accent-gold); }
.confidence.bassa { background: rgba(248,113,113,0.15); color: var(--accent-red); }

/* BET SLIP */
.bet-slip-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: linear-gradient(135deg, var(--accent-fire), var(--accent-orange));
  padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 -4px 20px rgba(255,107,44,0.3); transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.bet-slip-bar.visible { transform: translateY(0); }
.bet-slip-count { color: white; font-weight: 800; font-size: 0.9rem; }
.bet-slip-odds { font-family: 'JetBrains Mono', monospace; color: white; font-weight: 900; font-size: 1.1rem; }

/* PREDICTIONS GRID */
.pred-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
.pred-card {
  background: var(--bg-card2); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s;
}
.pred-card:hover { border-color: var(--accent-fire); transform: translateY(-2px); }
.pred-card.selected { border-color: var(--accent-fire); background: rgba(255,107,44,0.08); box-shadow: 0 0 15px var(--glow-fire); }
.pred-card-label { font-size: 0.7rem; color: var(--text-dark); font-weight: 600; margin-bottom: 4px; }
.pred-card-value { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 800; }
.pred-card-prob { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; font-weight: 700; color: var(--accent-fire); }

/* SECTION ACCORDION */
.section-acc { margin-bottom: 10px; }
.section-acc-header {
  display: flex; align-items: center; gap: 8px; padding: 12px 14px;
  background: var(--bg-card2); border: 1px solid var(--border); border-radius: 12px;
  cursor: pointer; transition: all 0.2s; font-size: 0.82rem; font-weight: 700;
}
.section-acc-header:hover { border-color: rgba(255,107,44,0.2); }
.section-acc-content { padding: 12px; display: none; }
.section-acc.open .section-acc-content { display: block; }
.section-acc.open .section-acc-header { border-radius: 12px 12px 0 0; background: rgba(255,107,44,0.05); border-color: rgba(255,107,44,0.15); }

/* SKELETON LOADING */
.skeleton { background: linear-gradient(90deg, var(--bg-card2) 25%, var(--bg-input) 50%, var(--bg-card2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

/* EMPTY STATE */
.empty { text-align: center; padding: 40px 20px; color: var(--text-dark); font-size: 0.85rem; }
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }

/* RESPONSIVE */
@media (max-width: 380px) {
  .hero-team-logo { width: 44px; height: 44px; }
  .hero-score { font-size: 1.6rem; }
  .stat-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
}

/* AI ADVICE BOX */
.ai-box {
  background: linear-gradient(135deg, rgba(255,107,44,0.06), rgba(255,140,66,0.03));
  border: 1px solid rgba(255,107,44,0.15); border-radius: 14px; padding: 16px; margin-bottom: 14px;
}
.ai-pick {
  font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 900;
  color: var(--accent-fire); margin-bottom: 6px;
}
.ai-reasoning { font-size: 0.75rem; color: var(--text-gray); line-height: 1.5; }

/* MOTIVATION BADGE */
.motivation-badge {
  display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px;
  border-radius: 6px; font-size: 0.62rem; font-weight: 700;
}
.motivation-badge.gold { background: rgba(217,119,6,0.15); color: #d97706; }
.motivation-badge.silver { background: rgba(148,163,184,0.15); color: #94a3b8; }
.motivation-badge.red { background: rgba(239,68,68,0.15); color: #ef4444; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🏀 BasketPro <span>v2</span></div>
  <div class="header-right">
    <button class="header-btn" id="themeBtn" onclick="toggleTheme()">🌓</button>
    <button class="header-btn" id="apiCount">API: 0</button>
  </div>
</div>

<div id="app" class="container"></div>
<div class="bet-slip-bar" id="betSlipBar">
  <div class="bet-slip-count" id="betSlipCount">0 selezioni</div>
  <div class="bet-slip-odds" id="betSlipOdds">@1.00</div>
</div>

<script>
// =====================================================
// CONFIGURATION
// =====================================================
const CONFIG = {
  API_KEY: 'aeb2864a3d4dbb8395fa53c83a876a93',
  API_HOST: 'v1.basketball.api-sports.io',
  API_BASE: 'https://v1.basketball.api-sports.io',
  FB_URL: 'https://basketpro-1a28b-default-rtdb.europe-west1.firebasedatabase.app',
  CACHE_TTL: 25 * 60 * 1000,
  TOP_LEAGUES: [12, 116, 117, 120, 194, 13, 15, 16, 17, 18, 20, 79, 93, 104, 105, 106, 110, 161, 162, 163, 202, 206, 211, 270],
  // 12=NBA, 116=Euroleague, 117=Eurocup, 120=LBA Italy, 194=ACB Spain
  // 13=NCAA, 202=BBL Germany, 206=Pro A France, 211=BSN Greece
  HOME_ADVANTAGE_PTS: 3.2, // Historical NBA home advantage in points
  LEAGUE_AVG_TOTAL: 224.5, // NBA average total points
};

// =====================================================
// STATE
// =====================================================
const state = {
  view: 'leagues', // leagues | matches | analysis
  selectedDate: 0,
  leagues: [],
  matches: [],
  expandedLeagues: new Set(),
  selectedLeague: null,
  selectedMatch: null,
  analysis: null,
  analysisTab: 'stats',
  betSlip: [],
  loading: false,
  apiCalls: 0,
  theme: localStorage.getItem('bp_theme') || 'dark',
  uid: localStorage.getItem('bp_uid') || ('bp_' + Math.random().toString(36).slice(2, 10)),
  playersCache: new Map(),
  teamsCache: new Map(),
};
localStorage.setItem('bp_uid', state.uid);
if (state.theme === 'light') document.body.classList.add('light-mode');

// =====================================================
// API LAYER
// =====================================================
const apiCache = new Map();

async function callAPI(endpoint, params = {}) {
  const qs = new URLSearchParams(params).toString();
  const url = `${CONFIG.API_BASE}${endpoint}${qs ? '?' + qs : ''}`;
  const cacheKey = url;

  if (apiCache.has(cacheKey)) {
    const c = apiCache.get(cacheKey);
    if (Date.now() - c.ts < CONFIG.CACHE_TTL) return c.data;
  }

  state.apiCalls++;
  document.getElementById('apiCount').textContent = `API: ${state.apiCalls}`;

  const res = await fetch(url, {
    headers: { 'x-apisports-key': CONFIG.API_KEY }
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  const data = await res.json();

  apiCache.set(cacheKey, { data, ts: Date.now() });
  if (apiCache.size > 80) {
    const oldest = apiCache.keys().next().value;
    apiCache.delete(oldest);
  }

  return data;
}

async function callAPIRetry(endpoint, params = {}, retries = 2) {
  for (let i = 0; i <= retries; i++) {
    try {
      return await callAPI(endpoint, params);
    } catch (e) {
      if (i === retries) throw e;
      await new Promise(r => setTimeout(r, 1000 * (i + 1)));
    }
  }
}

// =====================================================
// MATH: NORMAL CDF (for basketball scoring distributions)
// =====================================================
function normalCDF(x, mean, stdDev) {
  const z = (x - mean) / stdDev;
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const d = 0.3989422804014327; // 1/sqrt(2*pi)
  const p = d * Math.exp(-z * z / 2) * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.8212560 + t * 1.3302744))));
  return z > 0 ? 1 - p : p;
}

// Poisson distribution (for low-scoring events like blocks, steals)
function poisson(lambda, k) {
  if (lambda <= 0 || k < 0) return 0;
  let p = Math.exp(-lambda);
  for (let i = 1; i <= k; i++) p *= lambda / i;
  return isNaN(p) ? 0 : p;
}

// =====================================================
// ADVANCED BASKETBALL PREDICTION ENGINE
// Inspired by BettingPro's multi-factor xG model
// Adapted for basketball with Normal distributions
// =====================================================

function calcExpectedPoints(homeData, awayData, h2hData, standings) {
  // ---- BASE: Attack vs Defense (like football xG) ----
  const leagueAvgPPG = homeData.leagueAvg || CONFIG.LEAGUE_AVG_TOTAL / 2;
  
  // Attack strength = team PPG / league average
  const homeAttack = (homeData.ppg || leagueAvgPPG) / leagueAvgPPG;
  const awayAttack = (awayData.ppg || leagueAvgPPG) / leagueAvgPPG;
  
  // Defense weakness = opponent PPG against / league average (higher = worse defense)
  const homeDefWeak = (homeData.oppPpg || leagueAvgPPG) / leagueAvgPPG;
  const awayDefWeak = (awayData.oppPpg || leagueAvgPPG) / leagueAvgPPG;
  
  // Expected points = league_avg × attack_strength × defense_weakness_of_opponent
  let homeExp = leagueAvgPPG * homeAttack * awayDefWeak;
  let awayExp = leagueAvgPPG * awayAttack * homeDefWeak;
  
  // ---- HOME COURT ADVANTAGE (weight: 15%) ----
  homeExp += CONFIG.HOME_ADVANTAGE_PTS * 0.6;
  awayExp -= CONFIG.HOME_ADVANTAGE_PTS * 0.4;
  
  // ---- FORM FACTOR (weight: 20%) — like BettingPro's calculateFormMultiplier ----
  const homeFormMult = calcFormMultiplier(homeData.form);
  const awayFormMult = calcFormMultiplier(awayData.form);
  homeExp = homeExp * 0.80 + homeExp * homeFormMult * 0.20;
  awayExp = awayExp * 0.80 + awayExp * awayFormMult * 0.20;
  
  // ---- WIN RATE FACTOR (weight: 8%) — dominant teams score more ----
  if (homeData.winPct > 65) homeExp *= 1.04;
  else if (homeData.winPct < 35) homeExp *= 0.96;
  if (awayData.winPct > 65) awayExp *= 1.04;
  else if (awayData.winPct < 35) awayExp *= 0.96;
  
  // ---- PACE FACTOR — fast teams inflate totals ----
  const homeAvgPace = homeData.pace || 1.0;
  const awayAvgPace = awayData.pace || 1.0;
  const combinedPace = (homeAvgPace + awayAvgPace) / 2;
  homeExp *= combinedPace;
  awayExp *= combinedPace;
  
  // ---- H2H FACTOR (weight: up to 15%) — like BettingPro's analyzeH2H ----
  if (h2hData && h2hData.games > 2) {
    const h2hWeight = Math.min(0.15, h2hData.games * 0.015);
    const h2hHomeAdj = h2hData.homeAvgPts / ((h2hData.homeAvgPts + h2hData.awayAvgPts) / 2);
    const h2hAwayAdj = h2hData.awayAvgPts / ((h2hData.homeAvgPts + h2hData.awayAvgPts) / 2);
    homeExp = homeExp * (1 - h2hWeight) + homeExp * clamp(0.90, h2hHomeAdj, 1.10) * h2hWeight;
    awayExp = awayExp * (1 - h2hWeight) + awayExp * clamp(0.90, h2hAwayAdj, 1.10) * h2hWeight;
  }
  
  // ---- STANDINGS FACTOR (weight: 10%) — position in league ----
  if (standings && standings.homePos && standings.awayPos) {
    const posDiff = standings.awayPos - standings.homePos; // positive = home ranked higher
    const posAdj = clamp(-3, posDiff * 0.25, 3); // max ±3 points adjustment
    homeExp += posAdj * 0.5;
    awayExp -= posAdj * 0.5;
  }
  
  // ---- FATIGUE / REST DAYS (like BettingPro's calcFatigueMultiplier) ----
  if (homeData.restDays !== undefined) {
    homeExp *= getFatigueMultiplier(homeData.restDays);
  }
  if (awayData.restDays !== undefined) {
    awayExp *= getFatigueMultiplier(awayData.restDays);
  }
  
  // ---- RECENT SCORING TREND (last 5 games vs season average) ----
  if (homeData.recentPpg && homeData.ppg) {
    const trendH = homeData.recentPpg / homeData.ppg;
    homeExp *= clamp(0.95, 0.85 + trendH * 0.15, 1.05);
  }
  if (awayData.recentPpg && awayData.ppg) {
    const trendA = awayData.recentPpg / awayData.ppg;
    awayExp *= clamp(0.95, 0.85 + trendA * 0.15, 1.05);
  }
  
  // Clamp to reasonable basketball scores
  homeExp = clamp(85, homeExp, 140);
  awayExp = clamp(85, awayExp, 140);
  
  return { home: homeExp, away: awayExp, total: homeExp + awayExp };
}

function calcFormMultiplier(form) {
  if (!form || form.length === 0) return 1.0;
  const recent = form.slice(0, 8);
  let score = 0, totalWeight = 0;
  for (let i = 0; i < recent.length; i++) {
    const weight = Math.pow(0.82, i); // Decay: most recent matters more
    totalWeight += weight;
    if (recent[i] === 'W') score += 1.0 * weight;
    else if (recent[i] === 'L') score += 0.0 * weight;
  }
  const avg = totalWeight > 0 ? score / totalWeight : 0.5;
  return 0.88 + avg * 0.24; // Range: 0.88 (all losses) to 1.12 (all wins)
}

function getFatigueMultiplier(restDays) {
  if (restDays === undefined || restDays === null) return 1.0;
  if (restDays === 0) return 0.94; // Back-to-back: -6%
  if (restDays === 1) return 0.98; // 1 day rest: -2%
  if (restDays === 2) return 1.0;  // Normal
  if (restDays >= 3 && restDays <= 5) return 1.01; // Well rested
  if (restDays > 5) return 0.99; // Rust factor
  return 1.0;
}

// ---- MONEYLINE PROBABILITY (logistic function on spread) ----
function calcMoneyline(homeExp, awayExp) {
  const spread = homeExp - awayExp;
  // Basketball: ~30 points per game is std dev of final margin
  // Logistic function maps spread to win probability
  const homeWinProb = 1 / (1 + Math.exp(-spread / 5.5));
  return { home: sp(homeWinProb * 100), away: sp((1 - homeWinProb) * 100) };
}

// ---- OVER/UNDER (Normal CDF based — basketball scoring is approximately normal) ----
function calcOverUnder(totalExp, lines) {
  // Standard deviation of NBA game totals ≈ 18-20 points
  const stdDev = totalExp * 0.085; // ~8.5% of expected total
  const results = {};
  for (const line of lines) {
    const overProb = 1 - normalCDF(line, totalExp, stdDev);
    results[line] = {
      over: sp(overProb * 100),
      under: sp((1 - overProb) * 100)
    };
  }
  return results;
}

// ---- TEAM TOTAL O/U ----
function calcTeamTotal(teamExp, lines) {
  const stdDev = teamExp * 0.10; // ~10% std dev for individual team scoring
  const results = {};
  for (const line of lines) {
    const overProb = 1 - normalCDF(line, teamExp, stdDev);
    results[line] = {
      over: sp(overProb * 100),
      under: sp((1 - overProb) * 100)
    };
  }
  return results;
}

// ---- HANDICAP/SPREAD ----
function calcHandicap(homeExp, awayExp, lines) {
  const spread = homeExp - awayExp;
  const stdDev = 11; // NBA margin std dev ~11 points
  const results = {};
  for (const line of lines) {
    // Home covers if actual margin > -line (for home) 
    const homeCover = 1 - normalCDF(-line, spread, stdDev);
    results[line] = {
      home: sp(homeCover * 100),
      away: sp((1 - homeCover) * 100)
    };
  }
  return results;
}

// ---- QUARTER PREDICTIONS ----
function calcQuarterPredictions(homeExp, awayExp) {
  // Quarter scoring: ~25% of total per quarter, with slight variations
  // Q1 typically slightly lower, Q4 slightly higher
  const qFactors = [0.245, 0.250, 0.250, 0.255];
  return qFactors.map((f, i) => ({
    quarter: i + 1,
    home: Math.round(homeExp * f * 10) / 10,
    away: Math.round(awayExp * f * 10) / 10,
    total: Math.round((homeExp + awayExp) * f * 10) / 10
  }));
}

// ---- HALF PREDICTIONS ----
function calcHalfPredictions(homeExp, awayExp) {
  return {
    h1: { home: Math.round(homeExp * 0.495 * 10) / 10, away: Math.round(awayExp * 0.495 * 10) / 10 },
    h2: { home: Math.round(homeExp * 0.505 * 10) / 10, away: Math.round(awayExp * 0.505 * 10) / 10 }
  };
}

// ---- PLAYER PROPS CALCULATION ----
function calcPlayerProps(player, oppData) {
  if (!player || !player.points) return null;
  
  const props = [];
  const pts = player.points || 0;
  const reb = player.rebounds || 0;
  const ast = player.assists || 0;
  const fg3 = player.threes || 0;
  const stl = player.steals || 0;
  const blk = player.blocks || 0;
  const pra = pts + reb + ast;
  
  // Opponent defensive adjustment
  const oppDefFactor = oppData ? (oppData.oppPpg || 110) / 110 : 1.0;
  
  // Points
  if (pts > 5) {
    const adjPts = pts * oppDefFactor;
    const ptsLine = Math.round(adjPts - 0.5) + 0.5;
    const stdDev = Math.max(pts * 0.30, 4);
    props.push({
      type: 'PTS', line: ptsLine, avg: adjPts, stdDev,
      overProb: sp((1 - normalCDF(ptsLine, adjPts, stdDev)) * 100)
    });
  }
  
  // Rebounds
  if (reb > 2) {
    const rebLine = Math.round(reb - 0.5) + 0.5;
    const stdDev = Math.max(reb * 0.35, 2);
    props.push({
      type: 'REB', line: rebLine, avg: reb, stdDev,
      overProb: sp((1 - normalCDF(rebLine, reb, stdDev)) * 100)
    });
  }
  
  // Assists
  if (ast > 1.5) {
    const astLine = Math.round(ast - 0.5) + 0.5;
    const stdDev = Math.max(ast * 0.35, 1.5);
    props.push({
      type: 'AST', line: astLine, avg: ast, stdDev,
      overProb: sp((1 - normalCDF(astLine, ast, stdDev)) * 100)
    });
  }
  
  // 3-Pointers Made
  if (fg3 > 0.8) {
    const fg3Line = Math.round(fg3 - 0.5) + 0.5;
    const stdDev = Math.max(fg3 * 0.40, 0.8);
    props.push({
      type: '3PT', line: fg3Line, avg: fg3, stdDev,
      overProb: sp((1 - normalCDF(fg3Line, fg3, stdDev)) * 100)
    });
  }
  
  // PRA (Points + Rebounds + Assists)
  if (pra > 12) {
    const praLine = Math.round(pra - 0.5) + 0.5;
    const stdDev = Math.max(pra * 0.22, 5);
    props.push({
      type: 'P+R+A', line: praLine, avg: pra, stdDev,
      overProb: sp((1 - normalCDF(praLine, pra, stdDev)) * 100)
    });
  }
  
  return props;
}

// ---- AI ADVICE GENERATOR (like BettingPro) ----
function generateAIAdvice(expected, moneyline, ou, handicap, homeData, awayData, h2hData, matchInfo) {
  const picks = [];
  const spread = expected.home - expected.away;
  
  // 1. Moneyline pick
  if (moneyline.home > 62) {
    picks.push({ type: '1', label: `${matchInfo.home.name}`, prob: moneyline.home, confidence: moneyline.home > 72 ? 'alta' : 'media', odds: (100 / moneyline.home).toFixed(2) });
  } else if (moneyline.away > 62) {
    picks.push({ type: '2', label: `${matchInfo.away.name}`, prob: moneyline.away, confidence: moneyline.away > 72 ? 'alta' : 'media', odds: (100 / moneyline.away).toFixed(2) });
  }
  
  // 2. Best O/U pick
  let bestOU = null;
  const ouLines = [195.5, 200.5, 205.5, 210.5, 215.5, 220.5, 225.5, 230.5, 235.5, 240.5];
  for (const line of ouLines) {
    if (ou[line]) {
      if (ou[line].over > 62 && (!bestOU || ou[line].over > bestOU.prob)) {
        bestOU = { type: 'over', line, prob: ou[line].over };
      }
      if (ou[line].under > 62 && (!bestOU || ou[line].under > bestOU.prob)) {
        bestOU = { type: 'under', line, prob: ou[line].under };
      }
    }
  }
  if (bestOU) {
    picks.push({
      type: bestOU.type === 'over' ? 'O' : 'U',
      label: `${bestOU.type.toUpperCase()} ${bestOU.line}`,
      prob: bestOU.prob,
      confidence: bestOU.prob > 68 ? 'alta' : 'media',
      odds: (100 / bestOU.prob).toFixed(2)
    });
  }
  
  // 3. Best handicap pick
  let bestHcap = null;
  const hcapLines = [-12.5, -9.5, -6.5, -3.5, -1.5, 1.5, 3.5, 6.5, 9.5, 12.5];
  for (const line of hcapLines) {
    if (handicap[line]) {
      if (handicap[line].home > 62 && (!bestHcap || handicap[line].home > bestHcap.prob)) {
        bestHcap = { side: 'home', line, prob: handicap[line].home };
      }
      if (handicap[line].away > 62 && (!bestHcap || handicap[line].away > bestHcap.prob)) {
        bestHcap = { side: 'away', line, prob: handicap[line].away };
      }
    }
  }
  if (bestHcap) {
    const teamName = bestHcap.side === 'home' ? matchInfo.home.name : matchInfo.away.name;
    const hLine = bestHcap.side === 'home' ? bestHcap.line : -bestHcap.line;
    picks.push({
      type: 'HC',
      label: `${teamName} ${hLine > 0 ? '+' : ''}${hLine}`,
      prob: bestHcap.prob,
      confidence: bestHcap.prob > 68 ? 'alta' : 'media',
      odds: (100 / bestHcap.prob).toFixed(2)
    });
  }
  
  // Sort by probability
  picks.sort((a, b) => b.prob - a.prob);
  
  // Generate reasoning
  const reasons = [];
  if (Math.abs(spread) > 8) reasons.push(`Differenza attesa: ${spread > 0 ? '+' : ''}${sf(spread, 1)} pts`);
  if (homeData.form) {
    const homeWins = (homeData.form.match(/W/g) || []).length;
    const awayWins = (awayData.form?.match(/W/g) || []).length;
    if (homeWins > 5) reasons.push(`${matchInfo.home.name} in grande forma (${homeWins}W ultime 8)`);
    if (awayWins > 5) reasons.push(`${matchInfo.away.name} in grande forma (${awayWins}W ultime 8)`);
  }
  if (h2hData && h2hData.games > 3) reasons.push(`H2H: ${h2hData.games} partite, media totale ${sf(h2hData.avgTotal, 1)} pts`);
  
  return { picks, reasons, topPick: picks[0] || null };
}

function organizeByLeague(games) {
  const leagues = new Map();
  games.forEach(g => {
    const lid = g.league?.id;
    if (!lid) return;
    if (!leagues.has(lid)) {
      leagues.set(lid, {
        id: lid,
        name: g.league.name || 'Unknown',
        country: g.country?.name || '',
        logo: g.league.logo || '',
        season: g.league.season,
        matches: []
      });
    }
    leagues.get(lid).matches.push(g);
  });
  
  // Sort: top leagues first, then by match count
  const sorted = [...leagues.values()].sort((a, b) => {
    const aTop = CONFIG.TOP_LEAGUES.indexOf(a.id);
    const bTop = CONFIG.TOP_LEAGUES.indexOf(b.id);
    if (aTop !== -1 && bTop !== -1) return aTop - bTop;
    if (aTop !== -1) return -1;
    if (bTop !== -1) return 1;
    return b.matches.length - a.matches.length;
  });
  
  return sorted;
}

function extractTeamData(stats) {
  if (!stats) return getDefaultTeamData();
  
  const games = stats.games || {};
  const points = stats.points || {};
  const played = (games.played?.all || 0) || 1;
  const wins = games.wins?.all?.total || 0;
  
  const ppg = points.for?.average?.all ? parseFloat(points.for.average.all) : 105;
  const oppPpg = points.against?.average?.all ? parseFloat(points.against.average.all) : 105;
  
  return {
    played, wins,
    winPct: (wins / played) * 100,
    ppg, oppPpg,
    pace: (ppg + oppPpg) / CONFIG.LEAGUE_AVG_TOTAL,
    homeRecord: `${games.wins?.home?.total || 0}-${games.loses?.home?.total || 0}`,
    awayRecord: `${games.wins?.away?.total || 0}-${games.loses?.away?.total || 0}`,
    form: '', // Will be set from game history
    recentPpg: null,
    leagueAvg: CONFIG.LEAGUE_AVG_TOTAL / 2,
  };
}

function getDefaultTeamData() {
  return { played: 0, wins: 0, winPct: 50, ppg: 105, oppPpg: 105, pace: 1.0, homeRecord: '0-0', awayRecord: '0-0', form: '', recentPpg: null, leagueAvg: 112 };
}

function processH2H(h2hGames, homeTeamId) {
  if (!h2hGames || h2hGames.length === 0) return null;
  
  let homeTotal = 0, awayTotal = 0, totalPts = 0, homeWins = 0;
  
  h2hGames.forEach(g => {
    const hScore = g.scores?.home?.total || 0;
    const aScore = g.scores?.away?.total || 0;
    const isHome = g.teams?.home?.id === homeTeamId;
    
    homeTotal += isHome ? hScore : aScore;
    awayTotal += isHome ? aScore : hScore;
    totalPts += hScore + aScore;
    
    if (isHome && hScore > aScore) homeWins++;
    else if (!isHome && aScore > hScore) homeWins++;
  });
  
  const n = h2hGames.length;
  return {
    games: n,
    homeWins,
    awayWins: n - homeWins,
    homeAvgPts: homeTotal / n,
    awayAvgPts: awayTotal / n,
    avgTotal: totalPts / n,
    lastGames: h2hGames.slice(0, 5)
  };
}

function processForm(games, teamId) {
  if (!games || games.length === 0) return '';
  let form = '';
  let totalPts = 0;
  
  games.forEach(g => {
    const hScore = g.scores?.home?.total || 0;
    const aScore = g.scores?.away?.total || 0;
    const isHome = g.teams?.home?.id === teamId;
    
    totalPts += isHome ? hScore : aScore;
    
    if (isHome) {
      form += hScore > aScore ? 'W' : 'L';
    } else {
      form += aScore > hScore ? 'W' : 'L';
    }
  });
  
  return form;
}

function processPlayers(playersData) {
  if (!playersData || playersData.length === 0) return [];
  
  return playersData
    .filter(p => p.player && p.statistics && p.statistics.length > 0)
    .map(p => {
      const s = p.statistics[0];
      return {
        id: p.player.id,
        name: p.player.name || 'Unknown',
        firstName: p.player.firstname || '',
        lastName: p.player.lastname || '',
        position: s.pos || 'G',
        points: parseFloat(s.points) || 0,
        rebounds: parseFloat(s.totReb) || 0,
        assists: parseFloat(s.assists) || 0,
        steals: parseFloat(s.steals) || 0,
        blocks: parseFloat(s.blocks) || 0,
        threes: parseFloat(s.tpm) || 0,
        minutes: parseFloat(s.min) || 0,
        fgPct: s.fgp ? parseFloat(s.fgp) : null,
        ftPct: s.ftp ? parseFloat(s.ftp) : null,
        gamesPlayed: parseInt(s.games?.appearences) || 0
      };
    })
    .filter(p => p.minutes > 10 && p.gamesPlayed > 3)
    .sort((a, b) => b.points - a.points);
}

async function analyzeMatch(match) {
  state.selectedMatch = match;
  state.view = 'analysis';
  state.analysis = null;
  state.analysisTab = 'stats';
  state.loading = true;
  render();
  
  const homeId = match.teams.home.id;
  const awayId = match.teams.away.id;
  const leagueId = match.league.id;
  const season = match.league.season || 2024;
  
  try {
    // Parallel fetch all data
    const [homeStats, awayStats, h2hGames, standings, homePlayers, awayPlayers] = await Promise.all([
      fetchTeamStats(homeId, leagueId, season),
      fetchTeamStats(awayId, leagueId, season),
      fetchH2H(homeId, awayId),
      fetchStandings(leagueId, season),
      fetchPlayers(homeId, season),
      fetchPlayers(awayId, season)
    ]);
    
    // Process data
    const homeData = extractTeamData(homeStats);
    const awayData = extractTeamData(awayStats);
    const h2hData = processH2H(h2hGames, homeId);
    const homePlayersList = processPlayers(homePlayers);
    const awayPlayersList = processPlayers(awayPlayers);
    
    // Form from last games (try to get from standings or recent games)
    // Get last 8 games for form
    let homeLastGames = [], awayLastGames = [];
    try {
      const [hlg, alg] = await Promise.all([
        callAPIRetry('/games', { team: homeId, league: leagueId, season, last: 8 }),
        callAPIRetry('/games', { team: awayId, league: leagueId, season, last: 8 })
      ]);
      homeLastGames = hlg?.response || [];
      awayLastGames = alg?.response || [];
    } catch {}
    
    homeData.form = processForm(homeLastGames, homeId);
    awayData.form = processForm(awayLastGames, awayId);
    
    // Recent PPG (last 5)
    if (homeLastGames.length > 0) {
      let rPts = 0, cnt = 0;
      homeLastGames.slice(0, 5).forEach(g => {
        const isHome = g.teams?.home?.id === homeId;
        const pts = isHome ? (g.scores?.home?.total || 0) : (g.scores?.away?.total || 0);
        if (pts > 0) { rPts += pts; cnt++; }
      });
      if (cnt > 0) homeData.recentPpg = rPts / cnt;
    }
    if (awayLastGames.length > 0) {
      let rPts = 0, cnt = 0;
      awayLastGames.slice(0, 5).forEach(g => {
        const isHome = g.teams?.home?.id === awayId;
        const pts = isHome ? (g.scores?.home?.total || 0) : (g.scores?.away?.total || 0);
        if (pts > 0) { rPts += pts; cnt++; }
      });
      if (cnt > 0) awayData.recentPpg = rPts / cnt;
    }
    
    // Standings positions
    let standingsInfo = {};
    if (standings && standings.length > 0) {
      const flat = standings.flat ? standings.flat(3) : standings;
      // Find positions (could be nested in groups/conferences)
      function findTeamInStandings(arr, teamId) {
        if (!Array.isArray(arr)) return null;
        for (const item of arr) {
          if (item?.team?.id === teamId) return item;
          if (Array.isArray(item)) {
            const found = findTeamInStandings(item, teamId);
            if (found) return found;
          }
          if (item?.group && Array.isArray(item.group)) {
            const found = findTeamInStandings(item.group, teamId);
            if (found) return found;
          }
        }
        return null;
      }
      const homeStanding = findTeamInStandings(flat, homeId);
      const awayStanding = findTeamInStandings(flat, awayId);
      standingsInfo = {
        homePos: homeStanding?.position || homeStanding?.stage?.rank || null,
        awayPos: awayStanding?.position || awayStanding?.stage?.rank || null,
        homeRecord: homeStanding ? `${homeStanding.games?.win?.total || 0}-${homeStanding.games?.lose?.total || 0}` : homeData.homeRecord,
        awayRecord: awayStanding ? `${awayStanding.games?.win?.total || 0}-${awayStanding.games?.lose?.total || 0}` : awayData.awayRecord,
        homeStreak: homeStanding?.games?.win?.streak || null,
        awayStreak: awayStanding?.games?.win?.streak || null,
      };
    }
    
    // Calculate league average from both teams
    homeData.leagueAvg = (homeData.ppg + awayData.ppg + homeData.oppPpg + awayData.oppPpg) / 4;
    awayData.leagueAvg = homeData.leagueAvg;
    
    // RUN PREDICTION ENGINE
    const expected = calcExpectedPoints(homeData, awayData, h2hData, standingsInfo);
    const moneyline = calcMoneyline(expected.home, expected.away);
    
    // O/U lines
    const ouLines = [];
    const baseTotal = Math.round(expected.total);
    for (let l = baseTotal - 25; l <= baseTotal + 25; l += 5) {
      ouLines.push(l + 0.5);
    }
    const ou = calcOverUnder(expected.total, ouLines);
    
    // Team totals
    const homeTeamLines = [];
    const awayTeamLines = [];
    const baseHome = Math.round(expected.home);
    const baseAway = Math.round(expected.away);
    for (let l = baseHome - 15; l <= baseHome + 15; l += 5) homeTeamLines.push(l + 0.5);
    for (let l = baseAway - 15; l <= baseAway + 15; l += 5) awayTeamLines.push(l + 0.5);
    const homeTeamOU = calcTeamTotal(expected.home, homeTeamLines);
    const awayTeamOU = calcTeamTotal(expected.away, awayTeamLines);
    
    // Handicap lines
    const hcapLines = [-15.5, -12.5, -9.5, -6.5, -4.5, -2.5, -1.5, 1.5, 2.5, 4.5, 6.5, 9.5, 12.5, 15.5];
    const handicap = calcHandicap(expected.home, expected.away, hcapLines);
    
    // Quarter and Half predictions
    const quarters = calcQuarterPredictions(expected.home, expected.away);
    const halves = calcHalfPredictions(expected.home, expected.away);
    
    // AI Advice
    const aiAdvice = generateAIAdvice(expected, moneyline, ou, handicap, homeData, awayData, h2hData, { home: match.teams.home, away: match.teams.away });
    
    state.analysis = {
      match,
      homeData, awayData,
      h2hData,
      standings: standingsInfo,
      expected, moneyline, ou, handicap,
      homeTeamOU, awayTeamOU,
      homeTeamLines, awayTeamLines,
      ouLines, hcapLines,
      quarters, halves,
      homePlayers: homePlayersList,
      awayPlayers: awayPlayersList,
      aiAdvice
    };
    
  } catch (e) {
    console.error('Analysis error:', e);
    state.analysis = { error: e.message };
  }
  
  state.loading = false;
  render();
}

function renderMatchItem(game) {
  const status = game.status?.short || '';
  const isLive = ['Q1','Q2','Q3','Q4','OT','BT','HT'].includes(status);
  const isFT = ['FT','AOT','AP'].includes(status);
  const isNS = ['NS','TBD'].includes(status) || !status;
  
  const homeScore = game.scores?.home?.total;
  const awayScore = game.scores?.away?.total;
  const hasScores = homeScore != null && awayScore != null;
  const homeWon = hasScores && homeScore > awayScore;
  const awayWon = hasScores && awayScore > homeScore;
  
  // Quarter scores for live/finished
  let quarterInfo = '';
  if (hasScores && (isLive || isFT)) {
    const q = [];
    if (game.scores?.home?.quarter_1 != null) q.push(`Q1: ${game.scores.home.quarter_1}-${game.scores.away.quarter_1}`);
    if (game.scores?.home?.quarter_2 != null) q.push(`Q2: ${game.scores.home.quarter_2}-${game.scores.away.quarter_2}`);
    if (q.length) quarterInfo = q.join(' | ');
  }
  
  // Top players (from cached data)
  const homePlayersInfo = getTopPlayersStr(game.teams?.home?.id);
  const awayPlayersInfo = getTopPlayersStr(game.teams?.away?.id);
  
  return `
    <div class="match-item" onclick="analyzeMatch(${JSON.stringify(game).replace(/"/g, '&quot;')})">
      <div class="match-time ${isLive ? 'live' : isFT ? 'ft' : ''}">
        ${isLive ? (game.status?.timer || status) : isFT ? 'FT' : formatTime(game.date)}
      </div>
      <div class="match-teams" style="flex:1;min-width:0;">
        <div class="match-team">
          ${game.teams?.home?.logo ? `<img class="match-team-logo" src="${game.teams.home.logo}" onerror="this.style.display='none'">` : ''}
          <span style="${homeWon ? 'color:var(--accent-emerald);' : ''}">${esc(game.teams?.home?.name || '?')}</span>
        </div>
        ${homePlayersInfo ? `<div class="match-players">${homePlayersInfo}</div>` : ''}
        <div class="match-team">
          ${game.teams?.away?.logo ? `<img class="match-team-logo" src="${game.teams.away.logo}" onerror="this.style.display='none'">` : ''}
          <span style="${awayWon ? 'color:var(--accent-emerald);' : ''}">${esc(game.teams?.away?.name || '?')}</span>
        </div>
        ${awayPlayersInfo ? `<div class="match-players">${awayPlayersInfo}</div>` : ''}
        ${quarterInfo ? `<div style="font-size:0.6rem;color:var(--text-dark);margin-top:3px;padding-left:28px;">${quarterInfo}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
        ${hasScores ? `
          <div class="match-score ${homeWon ? 'winner' : ''} ${isLive ? 'live' : ''}">${homeScore}</div>
          <div class="match-score ${awayWon ? 'winner' : ''} ${isLive ? 'live' : ''}">${awayScore}</div>
        ` : ''}
      </div>
      <div class="match-arrow">▶</div>
    </div>
  `;
}

function getTopPlayersStr(teamId) {
  if (!teamId) return '';
  const season = new Date().getFullYear();
  const cacheKey = `players_${teamId}_${season}`;
  const cached = state.playersCache.get(cacheKey);
  if (!cached || cached.length === 0) {
    // Try previous season
    const prevKey = `players_${teamId}_${season - 1}`;
    const prevCached = state.playersCache.get(prevKey);
    if (!prevCached || prevCached.length === 0) return '';
    const processed = processPlayers(prevCached);
    return processed.slice(0, 3).map(p => p.name.split(' ').pop()).join(', ');
  }
  const processed = processPlayers(cached);
  return processed.slice(0, 3).map(p => p.name.split(' ').pop()).join(', ');
}

            <div class="stat-box-label">${esc(awayName)}</div>
            <div class="stat-box-value">#${a.standings.awayPos}</div>
            <div style="font-size:0.68rem;color:var(--text-dark);margin-top:4px;">${a.standings.awayRecord}</div>
          </div>
        </div>
      </div>
    ` : ''}
    
    <!-- QUARTER/HALF PREDICTIONS -->
    <div class="panel">
      <div class="panel-title">⏱ Previsioni Quarti & Tempi</div>
      <table class="ou-table">
        <thead>
          <tr><th></th><th>${esc(homeName)}</th><th>${esc(awayName)}</th><th>Totale</th></tr>
        </thead>
        <tbody>
          ${a.quarters.map(q => `
            <tr>
              <td>Q${q.quarter}</td>
              <td>${sf(q.home, 1)}</td>
              <td>${sf(q.away, 1)}</td>
              <td style="color:var(--accent-gold);font-weight:800;">${sf(q.total, 1)}</td>
            </tr>
          `).join('')}
          <tr style="border-top:2px solid var(--border);">
            <td>1° T</td>
            <td>${sf(a.halves.h1.home, 1)}</td>
            <td>${sf(a.halves.h1.away, 1)}</td>
            <td style="color:var(--accent-gold);font-weight:800;">${sf(a.halves.h1.home + a.halves.h1.away, 1)}</td>
          </tr>
          <tr>
            <td>2° T</td>
            <td>${sf(a.halves.h2.home, 1)}</td>
            <td>${sf(a.halves.h2.away, 1)}</td>
            <td style="color:var(--accent-gold);font-weight:800;">${sf(a.halves.h2.home + a.halves.h2.away, 1)}</td>
          </tr>
        </tbody>
      </table>
    </div>
  `;
}

function renderOUTab(a) {
  const m = a.match;
  const bestLine = a.ouLines.reduce((best, line) => {
    const diff = Math.abs(a.expected.total - line);
    return diff < best.diff ? { line, diff } : best;
  }, { line: null, diff: Infinity }).line;
  
  return `
    <!-- TOTAL O/U -->
    <div class="panel">
      <div class="panel-title">📈 Over/Under Totale (Atteso: ${sf(a.expected.total, 1)})</div>
      <table class="ou-table">
        <thead>
          <tr><th>Linea</th><th>Over %</th><th>Under %</th></tr>
        </thead>
        <tbody>
          ${a.ouLines.map(line => {
            const d = a.ou[line];
            if (!d) return '';
            const isBest = line === bestLine;
            return `
              <tr>
                <td>${line}</td>
                <td class="${d.over > 55 ? (isBest ? 'smart' : 'best') : ''}">${sf(d.over, 1)}%</td>
                <td class="${d.under > 55 ? (isBest ? 'smart' : 'best') : ''}">${sf(d.under, 1)}%</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
    
    <!-- TEAM TOTALS -->
    <div class="panel">
      <div class="panel-title">🏠 ${esc(m.teams?.home?.name)} Totale (Atteso: ${sf(a.expected.home, 1)})</div>
      <table class="ou-table">
        <thead><tr><th>Linea</th><th>Over %</th><th>Under %</th></tr></thead>
        <tbody>
          ${a.homeTeamLines.map(line => {
            const d = a.homeTeamOU[line];
            if (!d) return '';
            return `<tr><td>${line}</td><td class="${d.over > 55 ? 'best' : ''}">${sf(d.over, 1)}%</td><td class="${d.under > 55 ? 'best' : ''}">${sf(d.under, 1)}%</td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    
    <div class="panel">
      <div class="panel-title">✈️ ${esc(m.teams?.away?.name)} Totale (Atteso: ${sf(a.expected.away, 1)})</div>
      <table class="ou-table">
        <thead><tr><th>Linea</th><th>Over %</th><th>Under %</th></tr></thead>
        <tbody>
          ${a.awayTeamLines.map(line => {
            const d = a.awayTeamOU[line];
            if (!d) return '';
            return `<tr><td>${line}</td><td class="${d.over > 55 ? 'best' : ''}">${sf(d.over, 1)}%</td><td class="${d.under > 55 ? 'best' : ''}">${sf(d.under, 1)}%</td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderPlayersTab(a) {
  const m = a.match;
  
  if (a.homePlayers.length === 0 && a.awayPlayers.length === 0) {
    return `
      <div class="panel">
        <div class="empty">
          <div class="empty-icon">👤</div>
          <div>Statistiche giocatori non disponibili per questa partita.</div>
          <div style="font-size:0.72rem;color:var(--text-dark);margin-top:8px;">Prova ad analizzare una partita di un campionato maggiore (NBA, Euroleague).</div>
        </div>
      </div>
    `;
  }
  
  const renderTeamPlayers = (players, teamName, oppData) => {
    if (!players || players.length === 0) return '';
    
    return `
      <div class="panel">
        <div class="panel-title">🏀 ${esc(teamName)} — Top Giocatori</div>
        ${players.slice(0, 8).map(p => {
          const props = calcPlayerProps(p, oppData);
          return `
            <div class="player-card">
              <div class="player-header">
                <div class="player-pos ${p.position}">${p.position || '?'}</div>
                <div>
                  <div class="player-name">${esc(p.name)}</div>
                  <div class="player-team">${sf(p.minutes, 0)} min/g • ${p.gamesPlayed} partite</div>
                </div>
              </div>
              <div class="player-stats">
                <div class="player-stat">
                  <div class="player-stat-label">PTS</div>
                  <div class="player-stat-value">${sf(p.points, 1)}</div>
                </div>
                <div class="player-stat">
                  <div class="player-stat-label">REB</div>
                  <div class="player-stat-value">${sf(p.rebounds, 1)}</div>
                </div>
                <div class="player-stat">
                  <div class="player-stat-label">AST</div>
                  <div class="player-stat-value">${sf(p.assists, 1)}</div>
                </div>
                <div class="player-stat">
                  <div class="player-stat-label">3PT</div>
                  <div class="player-stat-value">${sf(p.threes, 1)}</div>
                </div>
              </div>
              ${props && props.length > 0 ? `
                <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;">
                  <div style="font-size:0.65rem;font-weight:700;color:var(--accent-fire);margin-bottom:6px;">PROPS PREVISTE</div>
                  <div style="display:flex;flex-wrap:wrap;gap:4px;">
                    ${props.map(pr => `
                      <div style="background:var(--bg-input);border-radius:8px;padding:5px 8px;font-size:0.68rem;display:flex;gap:4px;align-items:center;cursor:pointer;" onclick='addPropToBetSlip("${esc(p.name)}", "${pr.type}", ${pr.line}, ${pr.overProb})'>
                        <span style="font-weight:700;color:var(--text);">${pr.type}</span>
                        <span style="color:var(--text-dark);">O ${pr.line}</span>
                        <span style="font-family:'JetBrains Mono',monospace;font-weight:800;color:${pr.overProb > 55 ? 'var(--accent-emerald)' : pr.overProb < 45 ? 'var(--accent-red)' : 'var(--accent-gold)'};">${sf(pr.overProb, 0)}%</span>
                      </div>
                    `).join('')}
                  </div>
                </div>
              ` : ''}
            </div>
          `;
        }).join('')}
      </div>
    `;
  };
  
  return renderTeamPlayers(a.homePlayers, m.teams?.home?.name, a.awayData) + 
         renderTeamPlayers(a.awayPlayers, m.teams?.away?.name, a.homeData);
}

function renderHandicapTab(a) {
  const m = a.match;
  const spread = a.expected.home - a.expected.away;
  
  return `
    <div class="panel">
      <div class="panel-title">📐 Handicap / Spread (Diff attesa: ${spread > 0 ? '+' : ''}${sf(spread, 1)})</div>
      <div style="display:grid;grid-template-columns:1fr 2fr 2fr;gap:2px;margin-bottom:8px;">
        <div style="font-size:0.65rem;font-weight:700;color:var(--text-dark);text-align:center;padding:6px;">LINEA</div>
        <div style="font-size:0.65rem;font-weight:700;color:var(--text-dark);text-align:center;padding:6px;">${esc(m.teams?.home?.name)}</div>
        <div style="font-size:0.65rem;font-weight:700;color:var(--text-dark);text-align:center;padding:6px;">${esc(m.teams?.away?.name)}</div>
      </div>
      ${a.hcapLines.map(line => {
        const d = a.handicap[line];
        if (!d) return '';
        const homeStrong = d.home > 55;
        const awayStrong = d.away > 55;
        return `
          <div class="hcap-row">
            <div class="hcap-line">${line > 0 ? '+' : ''}${line}</div>
            <div class="hcap-bar" style="background:${homeStrong ? 'linear-gradient(90deg, var(--accent-fire), var(--accent-orange))' : 'var(--bg-input)'};width:${d.home}%;color:${homeStrong ? 'white' : 'var(--text-gray)'};">${sf(d.home, 1)}%</div>
            <div class="hcap-bar" style="background:${awayStrong ? 'linear-gradient(90deg, var(--accent-blue), var(--accent-cyan))' : 'var(--bg-input)'};width:${d.away}%;justify-content:flex-end;color:${awayStrong ? 'white' : 'var(--text-gray)'};">${sf(d.away, 1)}%</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// =====================================================
// BET SLIP
// =====================================================

function addToBetSlip(pick) {
  const exists = state.betSlip.find(b => b.label === pick.label);
  if (exists) {
    state.betSlip = state.betSlip.filter(b => b.label !== pick.label);
  } else {
    state.betSlip.push(pick);
  }
  updateBetSlipBar();
  fbSave('betSlip', state.betSlip);
}

function addPropToBetSlip(playerName, propType, line, prob) {
  const label = `${playerName} ${propType} O${line}`;
  const odds = (100 / prob).toFixed(2);
  addToBetSlip({ label, prob, odds, type: 'PROP' });
}

function updateBetSlipBar() {
  const bar = document.getElementById('betSlipBar');
  const countEl = document.getElementById('betSlipCount');
  const oddsEl = document.getElementById('betSlipOdds');
  
  if (state.betSlip.length > 0) {
    bar.classList.add('visible');
    countEl.textContent = `${state.betSlip.length} selezioni`;
    const totalOdds = state.betSlip.reduce((acc, b) => acc * parseFloat(b.odds || 1), 1);
    oddsEl.textContent = `@${totalOdds.toFixed(2)}`;
  } else {
    bar.classList.remove('visible');
  }
}

// =====================================================
// NAVIGATION & EVENTS
// =====================================================

function toggleLeague(id) {
  if (state.expandedLeagues.has(id)) {
    state.expandedLeagues.delete(id);
  } else {
    state.expandedLeagues.add(id);
    // Pre-fetch players for teams in this league
    const league = state.leagues.find(l => l.id === id);
    if (league) {
      league.matches.forEach(m => {
        const season = m.league?.season || new Date().getFullYear();
        // Fire and forget - don't await
        fetchPlayers(m.teams?.home?.id, season).catch(() => {});
        fetchPlayers(m.teams?.away?.id, season).catch(() => {});
      });
    }
  }
  render();
}

function backToLeagues() {
  state.view = 'leagues';
  state.analysis = null;
  state.selectedMatch = null;
  render();
}

function setAnalysisTab(tab) {
  state.analysisTab = tab;
  const content = document.getElementById('tabContent');
  if (content) content.innerHTML = renderTabContent();
  
  // Update tab styling
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.textContent.toLowerCase().includes(tab === 'stats' ? 'statistiche' : tab === 'ou' ? 'over' : tab === 'players' ? 'giocatori' : 'handicap'));
  });
  // Re-render tabs properly
  render();
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.body.classList.toggle('light-mode', state.theme === 'light');
  localStorage.setItem('bp_theme', state.theme);
}

// =====================================================
// INIT
// =====================================================

async function init() {
  // Load saved bet slip
  const savedSlip = await fbLoad('betSlip');
  if (savedSlip && Array.isArray(savedSlip)) state.betSlip = savedSlip;
  
  // Load today's games
  await loadGamesForDate(0);
}

init();
</script>
