<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BasketPro — Basketball Intelligence v3</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0b0f;--bg-card:#12141c;--bg-card2:#181b26;--bg-input:#1a1d28;
  --border:rgba(255,255,255,0.06);--text:#f0f0f5;--text-gray:#8b8fa3;--text-dark:#5a5e72;
  --fire:#ff6b2c;--orange:#ff8c42;--gold:#fbbf24;--emerald:#10b981;--red:#ef4444;
  --cyan:#06b6d4;--purple:#a78bfa;--blue:#3b82f6;
  --glow-fire:rgba(255,107,44,0.25);--glow-green:rgba(16,185,129,0.2);
}
body.light-mode {
  --bg:#f3f4f8;--bg-card:#fff;--bg-card2:#f8f9fc;--bg-input:#eef0f5;
  --border:rgba(0,0,0,0.08);--text:#1a1b2e;--text-gray:#6b7085;--text-dark:#9ca0b4;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:400px;background:radial-gradient(ellipse at 50% -20%,rgba(255,107,44,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--fire);border-radius:4px}

.header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--bg) 60%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:14px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.header-logo{font-size:1.4rem;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--fire),var(--orange),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-logo span{font-size:0.6rem;font-weight:600;vertical-align:super;opacity:0.7;-webkit-text-fill-color:var(--gold)}
.header-right{display:flex;gap:8px;align-items:center}
.hbtn{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:0.72rem;font-weight:600;color:var(--text-gray);cursor:pointer;transition:all 0.2s;font-family:inherit}
.hbtn:hover{border-color:var(--fire);color:var(--fire)}

.date-tabs{display:flex;gap:6px;padding:8px 16px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.date-tabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;padding:8px 16px;border-radius:12px;font-size:0.78rem;font-weight:700;background:var(--bg-card);border:1px solid var(--border);color:var(--text-gray);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.dtab.active{background:linear-gradient(135deg,var(--fire),var(--orange));color:#fff;border-color:transparent;box-shadow:0 4px 15px var(--glow-fire)}

.container{max-width:520px;margin:0 auto;padding:0 12px 100px;position:relative;z-index:1}
.panel{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.ptitle{font-size:0.92rem;font-weight:800;margin-bottom:14px;color:var(--fire);display:flex;align-items:center;gap:8px}

/* LEAGUE GROUP */
.lg{margin-bottom:8px}
.lh{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:all 0.2s;margin-bottom:0}
.lh:hover{border-color:var(--fire);background:var(--bg-card2)}
.lh.exp{border-color:var(--fire);background:rgba(255,107,44,0.04);border-radius:14px 14px 0 0}
.lh img{width:28px;height:28px;border-radius:6px;flex-shrink:0;object-fit:contain}
.lh .li{flex:1;min-width:0}
.lh .ln{font-size:0.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lh .lc{font-size:0.68rem;color:var(--text-dark);font-weight:500}
.lh .cnt{font-family:'JetBrains Mono',monospace;font-size:0.82rem;font-weight:800;color:var(--fire);background:rgba(255,107,44,0.1);padding:4px 10px;border-radius:8px;flex-shrink:0}
.lh .arr{font-size:0.7rem;color:var(--text-dark);transition:transform 0.3s;flex-shrink:0}
.lh.exp .arr{transform:rotate(90deg);color:var(--fire)}

.mc{border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;overflow:hidden;margin-bottom:6px}
.mi{display:flex;align-items:stretch;padding:10px 12px;background:var(--bg-card2);border-bottom:1px solid var(--border);cursor:pointer;transition:all 0.15s;gap:8px}
.mi:last-child{border-bottom:none}
.mi:hover{background:rgba(255,107,44,0.04)}
.mi-time{font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:700;color:var(--text-dark);min-width:42px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.mi-time.live{color:var(--red);animation:pulse 1.5s infinite}
.mi-time.ft{color:var(--emerald);font-weight:800}
.mi-teams{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.mi-team{display:flex;align-items:center;gap:7px;font-size:0.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-team img{width:18px;height:18px;border-radius:3px;flex-shrink:0;object-fit:contain}
.mi-team .tn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.mi-team .sc{font-family:'JetBrains Mono',monospace;font-size:0.82rem;font-weight:800;flex-shrink:0;min-width:22px;text-align:right}
.mi-team .sc.w{color:var(--emerald)}
.mi-team .sc.lv{color:var(--red)}
.mi-players{font-size:0.6rem;color:var(--text-dark);font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:25px;line-height:1.4}
.mi-arr{font-size:0.6rem;color:var(--text-dark);flex-shrink:0;display:flex;align-items:center}

/* HERO */
.hero{background:linear-gradient(135deg,rgba(255,107,44,0.08),rgba(255,140,66,0.04));border:1px solid rgba(255,107,44,0.15);border-radius:20px;padding:24px 16px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 50%,rgba(255,107,44,0.06) 0%,transparent 50%);animation:heroGlow 8s ease-in-out infinite}
@keyframes heroGlow{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.hero-teams{display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:16px;position:relative;z-index:1}
.hero-team{display:flex;flex-direction:column;align-items:center;gap:8px}
.hero-team img{width:54px;height:54px;border-radius:12px;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3))}
.hero-team-name{font-size:0.82rem;font-weight:700;max-width:110px;text-align:center;line-height:1.2}
.hero-vs{font-family:'JetBrains Mono',monospace;font-size:0.9rem;font-weight:800;color:var(--text-dark);padding:8px;border-radius:12px;background:var(--bg-card)}
.hero-score{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--fire),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:1}
.hero-prob{font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;color:var(--gold);background:rgba(251,191,36,0.1);padding:4px 10px;border-radius:8px;position:relative;z-index:1}
.hero-info{position:relative;z-index:1;font-size:0.7rem;color:var(--text-dark);margin-top:10px}

/* VERDICT BOX — like BettingPro Oracle */
.verdict{background:linear-gradient(135deg,rgba(255,107,44,0.06),rgba(16,185,129,0.04));border:2px solid rgba(255,107,44,0.2);border-radius:20px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
.verdict::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--fire),var(--orange),var(--emerald))}
.verdict-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.verdict-title{font-size:0.78rem;font-weight:800;color:var(--fire);text-transform:uppercase;letter-spacing:0.5px}
.verdict-kpis{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.kpi{flex:1;min-width:70px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center}
.kpi-value{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:900}
.kpi-label{font-size:0.58rem;color:var(--text-dark);text-transform:uppercase;margin-top:3px;font-weight:600}
.kpi.best{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.05)}
.kpi.best .kpi-value{color:var(--emerald)}
.verdict-reasoning{font-size:0.75rem;color:var(--text-gray);line-height:1.6;padding:10px 12px;background:rgba(16,185,129,0.04);border:1px solid rgba(16,185,129,0.12);border-radius:10px;margin-bottom:12px}
.verdict-warning{font-size:0.72rem;color:var(--gold);padding:8px 12px;background:rgba(251,191,36,0.05);border:1px solid rgba(251,191,36,0.15);border-radius:10px;margin-bottom:10px}

/* PREDICTION CARDS */
.pred-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px;margin-top:12px}
.pcard{background:var(--bg-input);border:2px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.pcard:hover{border-color:var(--fire);transform:translateY(-2px);box-shadow:0 4px 12px rgba(255,107,44,0.15)}
.pcard.sel{border-color:var(--emerald);background:rgba(16,185,129,0.08);box-shadow:0 4px 12px var(--glow-green)}
.pcard.sel::after{content:'✓';position:absolute;top:6px;right:6px;width:18px;height:18px;background:var(--emerald);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;color:#fff}
.pcard-rank{position:absolute;top:6px;left:6px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.55rem;font-weight:900}
.pcard-rank.r1{background:rgba(255,107,44,0.2);color:var(--fire)}
.pcard-rank.r2{background:rgba(6,182,212,0.15);color:var(--cyan)}
.pcard-rank.r3{background:rgba(167,139,250,0.15);color:var(--purple)}
.pcard-mkt{font-size:0.6rem;color:var(--text-dark);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:4px;font-weight:600}
.pcard-val{font-size:1rem;font-weight:800;margin-bottom:6px}
.pcard-prob{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700}
.pcard-prob.hi{background:rgba(16,185,129,0.15);color:var(--emerald)}
.pcard-prob.md{background:rgba(251,191,36,0.15);color:var(--gold)}
.pcard-prob.lo{background:rgba(239,68,68,0.15);color:var(--red)}
.pcard-ss{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--text-dark);margin-top:4px}
.pcard-signals{display:flex;gap:2px;justify-content:center;margin-top:4px}
.sig-dot{width:6px;height:6px;border-radius:50%}
.sig-dot.on{background:var(--emerald)}
.sig-dot.off{background:var(--border)}

/* TABS */
.tabs{display:flex;gap:4px;padding:4px;background:var(--bg-card);border-radius:14px;border:1px solid var(--border);margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:0;padding:10px 8px;border-radius:10px;font-size:0.7rem;font-weight:700;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--text-gray);white-space:nowrap}
.tab.active{background:linear-gradient(135deg,var(--fire),var(--orange));color:#fff;box-shadow:0 2px 10px var(--glow-fire)}

/* STAT */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sbox{background:var(--bg-card2);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.sbox-l{font-size:0.62rem;color:var(--text-dark);text-transform:uppercase;font-weight:600;margin-bottom:4px}
.sbox-v{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:800;color:var(--fire)}

.prob-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.prob-lbl{width:85px;font-size:0.75rem;color:var(--text-gray);font-weight:600;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prob-bw{flex:1;height:28px;background:var(--bg-input);border-radius:8px;overflow:hidden;position:relative}
.prob-bar{height:100%;border-radius:8px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-family:'JetBrains Mono',monospace;font-size:0.7rem;font-weight:800;color:#fff;min-width:40px}
.pb-h{background:linear-gradient(90deg,var(--fire),var(--orange))}
.pb-a{background:linear-gradient(90deg,var(--blue),var(--cyan))}

/* O/U TABLE */
.otbl{width:100%;border-collapse:separate;border-spacing:0 3px}
.otbl th{font-size:0.62rem;font-weight:700;text-transform:uppercase;color:var(--text-dark);padding:5px 6px;text-align:center}
.otbl td{padding:8px 6px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:700;background:var(--bg-card2)}
.otbl tr td:first-child{border-radius:8px 0 0 8px;color:var(--fire);font-weight:800}
.otbl tr td:last-child{border-radius:0 8px 8px 0}
.otbl .best{background:rgba(255,107,44,0.1);color:var(--fire)}
.otbl .smart{background:rgba(16,185,129,0.1);color:var(--emerald);font-weight:800}

/* PLAYER */
.plcard{background:var(--bg-card2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;transition:all 0.2s}
.plcard:hover{border-color:rgba(255,107,44,0.2)}
.plhdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.plpos{font-size:0.58rem;font-weight:800;padding:3px 8px;border-radius:6px;text-transform:uppercase;flex-shrink:0}
.plpos.G{background:rgba(59,130,246,0.15);color:var(--blue)}
.plpos.F{background:rgba(167,139,250,0.15);color:var(--purple)}
.plpos.C{background:rgba(255,107,44,0.15);color:var(--fire)}
.plname{font-size:0.82rem;font-weight:700}
.plsub{font-size:0.65rem;color:var(--text-dark)}
.plstats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.plst{text-align:center;padding:5px 3px;background:var(--bg-input);border-radius:7px}
.plst-l{font-size:0.55rem;color:var(--text-dark);font-weight:600;text-transform:uppercase}
.plst-v{font-family:'JetBrains Mono',monospace;font-size:0.78rem;font-weight:800;color:var(--text)}
.plprops{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.plprops-title{font-size:0.62rem;font-weight:700;color:var(--fire);margin-bottom:6px}
.plprops-row{display:flex;flex-wrap:wrap;gap:4px}
.plprop{background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-size:0.65rem;display:flex;gap:4px;align-items:center;cursor:pointer;transition:all 0.15s}
.plprop:hover{border-color:var(--fire)}
.plprop .pt{font-weight:700;color:var(--text)}
.plprop .pl{color:var(--text-dark)}
.plprop .pp{font-family:'JetBrains Mono',monospace;font-weight:800}

/* FORM */
.form-d{display:flex;gap:3px}
.fd{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:800;color:#fff}
.fd.W{background:var(--emerald)}.fd.L{background:var(--red)}

/* HCAP */
.hrow{display:grid;grid-template-columns:60px 1fr 1fr;gap:3px;margin-bottom:3px;align-items:center}
.hline{font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:800;color:var(--fire);text-align:center}
.hbar{height:30px;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-family:'JetBrains Mono',monospace;font-size:0.7rem;font-weight:700;color:#fff;transition:width 0.5s}

/* BACK BTN */
.back{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;font-size:0.82rem;font-weight:700;color:var(--fire);cursor:pointer;margin-bottom:12px;border-radius:12px;transition:all 0.2s}
.back:hover{background:rgba(255,107,44,0.08)}

/* BET SLIP */
.bsbar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:linear-gradient(135deg,var(--fire),var(--orange));padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -4px 20px rgba(255,107,44,0.3);transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1)}
.bsbar.vis{transform:translateY(0)}

.empty{text-align:center;padding:40px 20px;color:var(--text-dark);font-size:0.85rem}
.skeleton{background:linear-gradient(90deg,var(--bg-card2) 25%,var(--bg-input) 50%,var(--bg-card2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🏀 BasketPro <span>v3</span></div>
  <div class="header-right">
    <button class="hbtn" onclick="toggleTheme()">🌓</button>
    <button class="hbtn" id="apiC">API: 0</button>
  </div>
</div>
<div id="app" class="container"></div>
<div class="bsbar" id="bsBar">
  <div style="color:#fff;font-weight:800;font-size:0.9rem" id="bsCnt">0 selezioni</div>
  <div style="font-family:'JetBrains Mono',monospace;color:#fff;font-weight:900;font-size:1.1rem" id="bsOdds">@1.00</div>
</div>

<script>
const C={
  KEY:'aeb2864a3d4dbb8395fa53c83a876a93',BASE:'https://v1.basketball.api-sports.io',
  FB:'https://basketpro-1a28b-default-rtdb.europe-west1.firebasedatabase.app',
  TTL:25*60*1000,HA:3.2,AVG:224.5,
  TOP:[12,116,117,120,194,13,15,16,17,18,20,79,93,104,105,106,110,161,162,163,202,206,211,270]
};

const S={
  view:'leagues',date:0,leagues:[],matches:[],exp:new Set(),selMatch:null,
  analysis:null,tab:'pronostici',betSlip:[],loading:false,apiN:0,
  theme:localStorage.getItem('bp_theme')||'dark',
  uid:localStorage.getItem('bp_uid')||('bp_'+Math.random().toString(36).slice(2,10)),
  playersCache:new Map(),teamsCache:new Map(),nameCache:new Map()
};
localStorage.setItem('bp_uid',S.uid);
if(S.theme==='light')document.body.classList.add('light-mode');

// ===== API =====
const cache=new Map();
async function api(ep,p={}){
  const qs=new URLSearchParams(p).toString();
  const url=`${C.BASE}${ep}${qs?'?'+qs:''}`;
  if(cache.has(url)){const c=cache.get(url);if(Date.now()-c.t<C.TTL)return c.d}
  S.apiN++;document.getElementById('apiC').textContent=`API: ${S.apiN}`;
  const r=await fetch(url,{headers:{'x-apisports-key':C.KEY}});
  if(!r.ok)throw new Error(`API ${r.status}`);
  const d=await r.json();
  cache.set(url,{d,t:Date.now()});
  if(cache.size>80){const k=cache.keys().next().value;cache.delete(k)}
  return d;
}
async function apiR(ep,p={},n=2){
  for(let i=0;i<=n;i++){try{return await api(ep,p)}catch(e){if(i===n)throw e;await new Promise(r=>setTimeout(r,1000*(i+1)))}}
}

// ===== FIREBASE =====
async function fbS(p,d){try{await fetch(`${C.FB}/users/${S.uid}/${p}.json`,{method:'PUT',body:JSON.stringify(d)})}catch(e){}}
async function fbL(p){try{const r=await fetch(`${C.FB}/users/${S.uid}/${p}.json`);return await r.json()}catch{return null}}

// ===== UTILS =====
const sf=(v,d=1)=>{const n=parseFloat(v);return isNaN(n)?'0':n.toFixed(d)};
const sp=v=>Math.max(0,Math.min(100,isNaN(v)?50:v));
const cl=(a,v,b)=>Math.max(a,Math.min(b,v));
const esc=s=>s?String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
function ds(o=0){const d=new Date();d.setDate(d.getDate()+o);return d.toISOString().split('T')[0]}
function ft(d){try{return new Date(d).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}catch{return'--:--'}}
function fd(d){try{return new Date(d).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})}catch{return''}}
function dl(o){if(o===-1)return'Ieri';if(o===0)return'Oggi';if(o===1)return'Domani';const d=new Date();d.setDate(d.getDate()+o);return d.toLocaleDateString('it-IT',{weekday:'short',day:'numeric'})}
function normalCDF(x,m,s){const z=(x-m)/s;const t=1/(1+0.2316419*Math.abs(z));const d=0.3989422804;const p=d*Math.exp(-z*z/2)*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.3302744))));return z>0?1-p:p}

async function fetchLastGames(tid,lid,szn,n=10){
  try{
    const r=await apiR('/games',{team:tid,league:lid,season:szn});
    const all=r?.response||[];
    // Filter only finished games with scores, sort by date desc
    const finished=all.filter(g=>{
      const st=g.status?.short||'';
      return['FT','AOT','AP'].includes(st)&&g.scores?.home?.total!=null;
    }).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
    return finished.slice(0,n);
  }catch{return[]}
}

// ===== DATA PROCESSING =====
function organizeByLeague(games){
  const m=new Map();
  games.forEach(g=>{
    const id=g.league?.id;if(!id)return;
    if(!m.has(id))m.set(id,{id,name:g.league.name||'?',country:g.country?.name||'',logo:g.league.logo||'',season:g.league.season,matches:[]});
    m.get(id).matches.push(g);
  });
  return[...m.values()].sort((a,b)=>{
    const ai=C.TOP.indexOf(a.id),bi=C.TOP.indexOf(b.id);
    if(ai!==-1&&bi!==-1)return ai-bi;if(ai!==-1)return-1;if(bi!==-1)return 1;return b.matches.length-a.matches.length;
  });
}

function extractTeamData(stats){
  if(!stats||!stats.games?.played?.all)return{played:0,wins:0,winPct:50,ppg:0,oppPpg:0,pace:1,homeRec:'0-0',awayRec:'0-0',form:'',recentPpg:null,leagueAvg:0,hasData:false};
  const g=stats.games||{},p=stats.points||{},pl=(g.played?.all||1)||1,w=g.wins?.all?.total||0;
  const ppg=p.for?.average?.all?parseFloat(p.for.average.all):0;
  const opp=p.against?.average?.all?parseFloat(p.against.average.all):0;
  return{played:pl,wins:w,winPct:(w/pl)*100,ppg,oppPpg:opp,pace:ppg&&opp?(ppg+opp)/C.AVG:1,
    homeRec:`${g.wins?.home?.total||0}-${g.loses?.home?.total||0}`,awayRec:`${g.wins?.away?.total||0}-${g.loses?.away?.total||0}`,
    form:'',recentPpg:null,leagueAvg:0,hasData:ppg>0&&opp>0};
}

function processH2H(games,hid){
  if(!games||!games.length)return null;
  let ht=0,at=0,tp=0,hw=0;
  games.forEach(g=>{
    const h=g.scores?.home?.total||0,a=g.scores?.away?.total||0,ih=g.teams?.home?.id===hid;
    ht+=ih?h:a;at+=ih?a:h;tp+=h+a;if((ih&&h>a)||(!ih&&a>h))hw++;
  });
  const n=games.length;
  return{games:n,homeWins:hw,awayWins:n-hw,homeAvg:ht/n,awayAvg:at/n,avgTotal:tp/n,last:games.slice(0,5)};
}

function processForm(games,tid){
  if(!games||!games.length)return'';
  let f='',tp=0,n=0;
  games.forEach(g=>{
    const h=g.scores?.home?.total||0,a=g.scores?.away?.total||0,ih=g.teams?.home?.id===tid;
    tp+=ih?h:a;n++;
    if(ih)f+=h>a?'W':'L';else f+=a>h?'W':'L';
  });
  return f;
}

function processPlayers(data){
  if(!data||!data.length)return[];
  return data.filter(p=>p.player&&p.statistics?.length>0).map(p=>{
    const s=p.statistics[0];
    return{id:p.player.id,name:p.player.name||'?',pos:s.pos||'G',
      points:parseFloat(s.points)||0,rebounds:parseFloat(s.totReb)||0,assists:parseFloat(s.assists)||0,
      steals:parseFloat(s.steals)||0,blocks:parseFloat(s.blocks)||0,threes:parseFloat(s.tpm)||0,
      minutes:parseFloat(s.min)||0,gp:parseInt(s.games?.appearences)||0};
  }).filter(p=>p.minutes>10&&p.gp>3).sort((a,b)=>b.points-a.points);
}

function calcRecentPpg(games,tid){
  let t=0,n=0;
  games.slice(0,5).forEach(g=>{
    const ih=g.teams?.home?.id===tid;const pts=ih?(g.scores?.home?.total||0):(g.scores?.away?.total||0);
    if(pts>0){t+=pts;n++}
  });
  return n>0?t/n:null;
}

function findStandingPos(standings,tid){
  if(!standings||!Array.isArray(standings))return null;
  for(const item of standings){
    if(item?.team?.id===tid)return item;
    if(Array.isArray(item)){const f=findStandingPos(item,tid);if(f)return f}
    if(item?.group&&Array.isArray(item.group)){const f=findStandingPos(item.group,tid);if(f)return f}
  }
  return null;
}

// ===== PREDICTION ENGINE (ADVANCED) =====
function formMult(form){
  if(!form||!form.length)return 1;
  let s=0,tw=0;
  for(let i=0;i<Math.min(form.length,8);i++){
    const w=Math.pow(0.82,i);tw+=w;
    if(form[i]==='W')s+=w;
  }
  return tw>0?0.88+(s/tw)*0.24:1;
}

function fatigueMult(rd){
  if(rd===undefined||rd===null)return 1;
  if(rd===0)return 0.94;if(rd===1)return 0.98;if(rd===2)return 1;
  if(rd>=3&&rd<=5)return 1.01;return 0.99;
}

function calcExpected(hd,ad,h2h,stInfo){
  let hPPG=hd.ppg, aPPG=ad.ppg, hOPP=hd.oppPpg, aOPP=ad.oppPpg;
  
  // If no team data at all, try H2H as last resort
  if(!hPPG&&h2h&&h2h.homeAvg){hPPG=h2h.homeAvg;hOPP=h2h.awayAvg}
  if(!aPPG&&h2h&&h2h.awayAvg){aPPG=h2h.awayAvg;aOPP=h2h.homeAvg}
  
  // Absolute last resort: use a neutral low value (signals "no data")
  if(!hPPG)hPPG=82;if(!aPPG)aPPG=80;
  if(!hOPP)hOPP=80;if(!aOPP)aOPP=82;
  
  // League average from actual data of these two teams
  const lavg=(hPPG+aPPG+hOPP+aOPP)/4;
  hd.leagueAvg=lavg;ad.leagueAvg=lavg;
  hd.pace=(hPPG+hOPP)/(lavg*2);ad.pace=(aPPG+aOPP)/(lavg*2);
  
  // Expected points via attack×defense model
  const hAtt=hPPG/lavg,aAtt=aPPG/lavg;
  const hDefW=hOPP/lavg,aDefW=aOPP/lavg;
  let hE=lavg*hAtt*aDefW, aE=lavg*aAtt*hDefW;
  
  // Home court advantage scaled to league scoring level
  const haAdj=lavg/112*C.HA;
  hE+=haAdj*0.6;aE-=haAdj*0.4;
  
  // Form (20%) — only if real form data
  if(hd.form.length>=3){hE=hE*0.80+hE*formMult(hd.form)*0.20}
  if(ad.form.length>=3){aE=aE*0.80+aE*formMult(ad.form)*0.20}
  
  // Win rate adjustment (only with real data)
  if(hd.hasData){
    if(hd.winPct>65)hE*=1.04;else if(hd.winPct<35)hE*=0.96;
  }
  if(ad.hasData){
    if(ad.winPct>65)aE*=1.04;else if(ad.winPct<35)aE*=0.96;
  }
  
  // Pace
  const cp=(hd.pace+ad.pace)/2;
  hE*=cp;aE*=cp;
  
  // H2H (up to 15%)
  if(h2h&&h2h.games>2){
    const w=Math.min(0.15,h2h.games*0.015);
    const avg=(h2h.homeAvg+h2h.awayAvg)/2;
    if(avg>0){
      const hAdj=cl(0.90,h2h.homeAvg/avg,1.10);
      const aAdj=cl(0.90,h2h.awayAvg/avg,1.10);
      hE=hE*(1-w)+hE*hAdj*w;aE=aE*(1-w)+aE*aAdj*w;
    }
  }
  
  // Standings (10%)
  if(stInfo?.hPos>0&&stInfo?.aPos>0){
    const pd=stInfo.aPos-stInfo.hPos;
    const adj=cl(-3,pd*0.25,3);
    hE+=adj*0.5;aE-=adj*0.5;
  }
  
  // Recent scoring trend
  if(hd.recentPpg&&hPPG){const t=hd.recentPpg/hPPG;hE*=cl(0.95,0.85+t*0.15,1.05)}
  if(ad.recentPpg&&aPPG){const t=ad.recentPpg/aPPG;aE*=cl(0.95,0.85+t*0.15,1.05)}
  
  // Clamp to reasonable range based on league level
  const lo=lavg*0.65,hi=lavg*1.40;
  hE=cl(lo,hE,hi);aE=cl(lo,aE,hi);
  
  return{home:hE,away:aE,total:hE+aE};
}

function moneyline(h,a){const s=h-a;const p=1/(1+Math.exp(-s/5.5));return{home:sp(p*100),away:sp((1-p)*100)}}
function ouCalc(tot,lines){const sd=tot*0.085;const r={};for(const l of lines){const o=1-normalCDF(l,tot,sd);r[l]={over:sp(o*100),under:sp((1-o)*100)}}return r}
function ttCalc(exp,lines){const sd=exp*0.10;const r={};for(const l of lines){const o=1-normalCDF(l,exp,sd);r[l]={over:sp(o*100),under:sp((1-o)*100)}}return r}
function hcCalc(h,a,lines){const s=h-a,sd=11;const r={};for(const l of lines){const c=1-normalCDF(-l,s,sd);r[l]={home:sp(c*100),away:sp((1-c)*100)}}return r}
function quarterPred(h,a){return[0.245,0.250,0.250,0.255].map((f,i)=>({q:i+1,h:h*f,a:a*f,t:(h+a)*f}))}
function halfPred(h,a){return{h1:{h:h*0.495,a:a*0.495},h2:{h:h*0.505,a:a*0.505}}}

// ===== SUPER ALGORITHM v2 — RELATIVE SIGNALS =====
function runSuperAlgo(exp,ml,ou,hcap,hd,ad,h2h,stInfo,ouLines,hcLines,match){
  const spread=exp.home-exp.away;
  const absSpread=Math.abs(spread);
  const hForm=hd.form||'';const aForm=ad.form||'';
  const hFS=hForm.slice(0,5).split('').reduce((s,c)=>s+(c==='W'?1:0),0);
  const aFS=aForm.slice(0,5).split('').reduce((s,c)=>s+(c==='W'?1:0),0);
  const hasRealData=hd.hasData&&ad.hasData;
  const hasForm=hForm.length>=3&&aForm.length>=3;
  const hasH2H=h2h&&h2h.games>=3;
  const hasStand=stInfo?.hPos>0&&stInfo?.aPos>0;
  const hName=match?.teams?.home?.name||'Casa';
  const aName=match?.teams?.away?.name||'Ospite';
  
  // Data quality score (0-1)
  let dataQ=0;
  if(hasRealData)dataQ+=0.4;if(hasForm)dataQ+=0.2;if(hasH2H)dataQ+=0.2;if(hasStand)dataQ+=0.2;
  
  function build(market,value,icon,prob,signals,ctxMult,hiT,mdT){
    const sigs=Object.values(signals);
    const on=sigs.filter(Boolean).length,tot=sigs.length;
    const conv=tot>0?on/tot:0;
    // SuperScore includes data quality
    const raw=(prob/100)*conv*(ctxMult||1)*(.5+dataQ*.5);
    const ss=raw*100;
    let conf='bassa';
    if(prob>=(hiT?.p||70)&&conv>=(hiT?.c||0.65)&&dataQ>=0.4)conf='alta';
    else if(prob>=(mdT?.p||55)&&conv>=(mdT?.c||0.50)&&dataQ>=0.2)conf='media';
    return{market,value,icon,prob:Math.round(prob*10)/10,signals,on,tot,conv,ss,conf,odds:prob>5?(100/prob).toFixed(2):'—'};
  }
  
  const cands=[];
  
  // ======= MONEYLINE =======
  // Signals are ALL RELATIVE — compare teams against each other
  cands.push(build('Moneyline',`1 ${hName}`,'🏠',ml.home,{
    prob_forte:ml.home>ml.away+5,             // Home prob > Away by 5%+
    spread_favorevole:spread>1.5,              // Expected spread favors home
    ppg_superiore:hd.ppg>ad.ppg,              // Home scores more
    difesa_migliore:hd.oppPpg<ad.oppPpg,      // Home concedes less
    forma_migliore:hFS>aFS,                    // Home better recent form
    winpct_superiore:hd.winPct>ad.winPct+5,   // Home better win rate
    h2h_favorevole:hasH2H&&h2h.homeWins>h2h.awayWins, // Wins more H2H
    classifica_sopra:hasStand&&stInfo.hPos<stInfo.aPos, // Higher in standings
    casa_col_fattore:spread>0,                 // Home court gives edge
  },spread>8?1.15:spread>4?1.05:spread<0?0.85:1,{p:60,c:0.6},{p:52,c:0.45}));
  
  cands.push(build('Moneyline',`2 ${aName}`,'✈️',ml.away,{
    prob_forte:ml.away>ml.home+5,
    spread_favorevole:spread<-1.5,
    ppg_superiore:ad.ppg>hd.ppg,
    difesa_migliore:ad.oppPpg<hd.oppPpg,
    forma_migliore:aFS>hFS,
    winpct_superiore:ad.winPct>hd.winPct+5,
    h2h_favorevole:hasH2H&&h2h.awayWins>h2h.homeWins,
    classifica_sopra:hasStand&&stInfo.aPos<stInfo.hPos,
    trasferta_forte:spread<-3,
  },spread<-8?1.15:spread<-4?1.05:spread>0?0.85:1,{p:56,c:0.6},{p:48,c:0.45}));
  
  // ======= OVER/UNDER — multiple lines =======
  const bestOULine=ouLines.reduce((b,l)=>{const d=Math.abs(exp.total-l);return d<b.d?{l,d}:b},{l:ouLines[0],d:Infinity}).l;
  
  // Generate O/U for 3 different lines: best, best+5, best-5
  const ouLinesToCheck=[bestOULine-5,bestOULine,bestOULine+5].filter(l=>ou[l]);
  
  ouLinesToCheck.forEach(line=>{
    const d=ou[line];if(!d)return;
    const isBest=line===bestOULine;
    const diffFromExp=exp.total-line;
    
    // OVER
    cands.push(build('Over/Under',`Over ${line}`,diffFromExp>5?'🔥':'📈',d.over,{
      totale_sopra_linea:exp.total>line,          // Expected total > line
      entrambi_segnano_tanto:hd.ppg>hd.leagueAvg&&ad.ppg>ad.leagueAvg, // Both teams above avg
      difese_deboli:hd.oppPpg>hd.leagueAvg&&ad.oppPpg>ad.leagueAvg,   // Both defenses weak
      pace_alto:hd.pace+ad.pace>2.02,             // Combined pace above normal
      h2h_alto:hasH2H&&h2h.avgTotal>line,         // H2H avg above line
      forme_offensive:hFS+aFS>=5,                  // Both in good form
      trend_scoring:hd.recentPpg>hd.ppg||ad.recentPpg>ad.ppg,         // Recent scoring up
    },diffFromExp>8?1.12:diffFromExp>3?1.05:diffFromExp<-5?0.82:1,{p:62,c:0.6},{p:52,c:0.45}));
    
    // UNDER
    cands.push(build('Over/Under',`Under ${line}`,diffFromExp<-5?'🛡️':'📉',d.under,{
      totale_sotto_linea:exp.total<line,
      entrambi_difendono:hd.oppPpg<hd.leagueAvg&&ad.oppPpg<ad.leagueAvg,
      difese_forti:hd.oppPpg<hd.leagueAvg||ad.oppPpg<ad.leagueAvg,
      pace_basso:hd.pace+ad.pace<1.98,
      h2h_basso:hasH2H&&h2h.avgTotal<line,
      forme_difensive:hFS+aFS<=3,
      trend_calo:hd.recentPpg<hd.ppg||ad.recentPpg<ad.ppg,
    },diffFromExp<-8?1.12:diffFromExp<-3?1.05:diffFromExp>5?0.82:1,{p:62,c:0.6},{p:52,c:0.45}));
  });
  
  // ======= TEAM TOTALS =======
  if(hasRealData){
    const hLine=Math.round(exp.home-0.5)+0.5;
    const aLine=Math.round(exp.away-0.5)+0.5;
    const hTSD=exp.home*0.10;
    const aTSD=exp.away*0.10;
    
    cands.push(build('Team Total',`${hName} Over ${hLine}`,'🏠📈',sp((1-normalCDF(hLine,exp.home,hTSD))*100),{
      ppg_alto:hd.ppg>hd.leagueAvg,
      opp_difesa_debole:ad.oppPpg>ad.leagueAvg,
      forma_attacco:hFS>=3,
      trend_up:hd.recentPpg>hd.ppg,
      h2h_segna:hasH2H&&h2h.homeAvg>hLine,
    },1,{p:60,c:0.6},{p:50,c:0.4}));
    
    cands.push(build('Team Total',`${aName} Over ${aLine}`,'✈️📈',sp((1-normalCDF(aLine,exp.away,aTSD))*100),{
      ppg_alto:ad.ppg>ad.leagueAvg,
      opp_difesa_debole:hd.oppPpg>hd.leagueAvg,
      forma_attacco:aFS>=3,
      trend_up:ad.recentPpg>ad.ppg,
      h2h_segna:hasH2H&&h2h.awayAvg>aLine,
    },1,{p:60,c:0.6},{p:50,c:0.4}));
  }
  
  // ======= HANDICAP — find the meaningful line =======
  // Best handicap = the one closest to the expected spread
  const bestHcLine=hcLines.reduce((b,l)=>{const d=Math.abs(spread-(-l));return d<b.d?{l,d}:b},{l:0,d:Infinity}).l;
  
  // Also check a wider handicap for "safer" bet
  const widerHcLines=[bestHcLine];
  if(spread>0){
    const wider=hcLines.find(l=>l>bestHcLine&&l<=bestHcLine+6);
    if(wider)widerHcLines.push(wider);
  }else{
    const wider=hcLines.find(l=>l<bestHcLine&&l>=bestHcLine-6);
    if(wider)widerHcLines.push(wider);
  }
  
  widerHcLines.forEach(line=>{
    if(!hcap[line])return;
    const isWider=line!==bestHcLine;
    
    // Favorite covers
    const favSide=spread>=0?'home':'away';
    const favProb=hcap[line][favSide];
    const favName=spread>=0?hName:aName;
    const displayLine=favSide==='home'?line:-line;
    
    cands.push(build(isWider?'Handicap Sicuro':'Handicap',`${favName} ${displayLine>0?'+':''}${displayLine}`,isWider?'🔒':'📐',favProb,{
      prob_copre:favProb>52,
      spread_coerente:favSide==='home'?spread>-line:spread<line,
      forma_favorita:(favSide==='home'?hFS:aFS)>=(favSide==='home'?aFS:hFS),
      ppg_favorita:(favSide==='home'?hd:ad).ppg>(favSide==='home'?ad:hd).ppg,
      classifica_favorita:hasStand&&(favSide==='home'?stInfo.hPos<stInfo.aPos:stInfo.aPos<stInfo.hPos),
      h2h_favorita:hasH2H&&(favSide==='home'?h2h.homeWins>h2h.awayWins:h2h.awayWins>h2h.homeWins),
    },isWider?0.95:1,{p:62,c:0.6},{p:52,c:0.5}));
    
    // Underdog covers
    const udSide=spread>=0?'away':'home';
    const udProb=hcap[line][udSide];
    const udName=spread>=0?aName:hName;
    const udLine=udSide==='home'?line:-line;
    
    if(udProb>45){
      cands.push(build('Handicap',`${udName} ${udLine>0?'+':''}${udLine}`,'📐',udProb,{
        prob_copre:udProb>48,
        sfavorita_vicina:absSpread<6,
        forma_decente:(udSide==='home'?hFS:aFS)>=2,
        h2h_competitiva:hasH2H&&Math.abs(h2h.homeWins-h2h.awayWins)<=2,
        classifica_vicina:hasStand&&Math.abs(stInfo.hPos-stInfo.aPos)<=5,
      },absSpread<3?1.08:1,{p:58,c:0.6},{p:48,c:0.45}));
    }
  });
  
  // ======= 1° TEMPO O/U =======
  if(hasRealData){
    const h1Tot=(exp.home+exp.away)*0.495;
    const h1Line=Math.round(h1Tot/5)*5+0.5;
    const h1SD=h1Tot*0.10;
    const h1Over=sp((1-normalCDF(h1Line,h1Tot,h1SD))*100);
    cands.push(build('1° Tempo',`Over ${h1Line} (1T)`,'⏱️',h1Over,{
      totale_alto_1t:h1Tot>h1Line,
      entrambi_partono_forte:hd.ppg>hd.leagueAvg&&ad.ppg>ad.leagueAvg,
      pace_alto:hd.pace+ad.pace>2.02,
    },1,{p:58,c:0.6},{p:48,c:0.4}));
  }
  
  // ======= SORT & DEDUPLICATE =======
  // Remove candidates with prob < 35% or prob > 92% (unrealistic)
  const filtered=cands.filter(c=>c.prob>=35&&c.prob<=92);
  
  // Remove contradictions: can't have Over X and Under X both high
  // Keep only the better one for same line
  const deduped=[];
  const seenLines=new Set();
  filtered.sort((a,b)=>b.ss-a.ss);
  
  filtered.forEach(c=>{
    // Check for O/U contradiction on same line
    const ouMatch=c.value.match(/^(Over|Under) (\d+\.?\d*)/);
    if(ouMatch){
      const lineKey=ouMatch[2];
      const dir=ouMatch[1];
      const oppKey=`${dir==='Over'?'Under':'Over'}_${lineKey}`;
      if(seenLines.has(oppKey))return; // Skip the weaker direction
      seenLines.add(`${dir}_${lineKey}`);
    }
    deduped.push(c);
  });
  
  return{
    picks:deduped.slice(0,12), // Max 12 best picks
    topPick:deduped[0],
    top3:deduped.slice(0,3),
    dataQuality:dataQ,
    hasRealData
  };
}
  
// ===== GENERATE COHERENT REASONING =====
function genReasoning(exp,ml,hd,ad,h2h,stInfo,match){
  const r=[];
  const spread=exp.home-exp.away;
  const hN=match.teams?.home?.name||'Casa';
  const aN=match.teams?.away?.name||'Ospite';
  
  // Scoring assessment
  if(hd.hasData&&ad.hasData){
    if(Math.abs(hd.ppg-ad.ppg)>8)r.push(`${hd.ppg>ad.ppg?hN:aN} segna molto di più (${sf(Math.max(hd.ppg,ad.ppg),1)} vs ${sf(Math.min(hd.ppg,ad.ppg),1)} PPG)`);
    if(Math.abs(hd.oppPpg-ad.oppPpg)>8)r.push(`${hd.oppPpg<ad.oppPpg?hN:aN} difende molto meglio (${sf(Math.min(hd.oppPpg,ad.oppPpg),1)} vs ${sf(Math.max(hd.oppPpg,ad.oppPpg),1)} subiti)`);
    if(Math.abs(hd.winPct-ad.winPct)>20)r.push(`Divario Win%: ${hN} ${sf(hd.winPct,0)}% vs ${aN} ${sf(ad.winPct,0)}%`);
  }
  
  // Spread assessment
  if(Math.abs(spread)>8)r.push(`${spread>0?hN:aN} netto favorita (spread ${spread>0?'+':''}${sf(spread,1)})`);
  else if(Math.abs(spread)>3)r.push(`${spread>0?hN:aN} favorita (spread ${spread>0?'+':''}${sf(spread,1)})`);
  else r.push(`Partita equilibrata (spread ${sf(Math.abs(spread),1)} pts)`);
  
  // Form
  const hW=(hd.form||'').slice(0,5).split('').filter(c=>c==='W').length;
  const aW=(ad.form||'').slice(0,5).split('').filter(c=>c==='W').length;
  const hFL=(hd.form||'').length,aFL=(ad.form||'').length;
  if(hFL>=3&&aFL>=3){
    if(hW>aW+2)r.push(`${hN} in forma migliore (${hW}/${hFL}W vs ${aW}/${aFL}W)`);
    else if(aW>hW+2)r.push(`${aN} in forma migliore (${aW}/${aFL}W vs ${hW}/${hFL}W)`);
    if(hW<=1&&hFL>=4)r.push(`⚠️ ${hN} in crisi (solo ${hW}W su ${hFL})`);
    if(aW<=1&&aFL>=4)r.push(`⚠️ ${aN} in crisi (solo ${aW}W su ${aFL})`);
  }
  
  // H2H
  if(h2h&&h2h.games>=3){
    const diff=Math.abs(h2h.homeWins-h2h.awayWins);
    if(diff>=2)r.push(`H2H: ${h2h.homeWins>h2h.awayWins?hN:aN} domina ${Math.max(h2h.homeWins,h2h.awayWins)}-${Math.min(h2h.homeWins,h2h.awayWins)} su ${h2h.games}g`);
    r.push(`H2H media totale: ${sf(h2h.avgTotal,1)} pts`);
  }
  
  // Standings
  if(stInfo?.hPos>0&&stInfo?.aPos>0){
    const diff=Math.abs(stInfo.hPos-stInfo.aPos);
    if(diff>=3)r.push(`Classifica: #${stInfo.hPos} vs #${stInfo.aPos}`);
  }
  
  // Total assessment
  if(exp.total>hd.leagueAvg*2.1)r.push('🔥 Atteso punteggio alto: partita da Over');
  else if(exp.total<hd.leagueAvg*1.9)r.push('🛡️ Atteso punteggio basso: partita da Under');
  
  if(!hd.hasData||!ad.hasData)r.push('⚠️ Statistiche stagionali parziali — previsioni basate su ultime partite');
  
  return r;
}

// ===== PLAYER PROPS =====
function calcPProps(p,oppData){
  if(!p||p.points<5)return[];
  const props=[],odf=oppData?(oppData.oppPpg||110)/110:1;
  const add=(type,avg,sd,adj)=>{if(avg>0){const a2=avg*(adj||1);const line=Math.round(a2-0.5)+0.5;const stdDev=Math.max(sd,1.5);props.push({type,line,avg:a2,over:sp((1-normalCDF(line,a2,stdDev))*100)})}};
  add('PTS',p.points,Math.max(p.points*0.30,4),odf);
  if(p.rebounds>2)add('REB',p.rebounds,Math.max(p.rebounds*0.35,2));
  if(p.assists>1.5)add('AST',p.assists,Math.max(p.assists*0.35,1.5));
  if(p.threes>0.8)add('3PT',p.threes,Math.max(p.threes*0.40,0.8));
  const pra=p.points+p.rebounds+p.assists;
  if(pra>12)add('P+R+A',pra,Math.max(pra*0.22,5));
  return props;
}

// ===== BUILD TEAM PROFILE FROM GAME RESULTS (PRIMARY) =====
function buildTeamProfile(tid,games,seasonStats){
  const profile={played:0,wins:0,winPct:50,ppg:0,oppPpg:0,pace:1,
    homeRec:'0-0',awayRec:'0-0',form:'',recentPpg:null,leagueAvg:0,hasData:false,
    dataSource:'none',gamesAnalyzed:0};
  
  // --- 1) Try game results first (most reliable) ---
  if(games&&games.length>=2){
    let totalFor=0,totalAg=0,wins=0,n=0;
    let recentFor=0,recentN=0;
    let form='';
    
    games.forEach((g,i)=>{
      const hs=g.scores?.home?.total,as=g.scores?.away?.total;
      if(hs==null||as==null||(hs===0&&as===0))return;
      
      const isHome=g.teams?.home?.id===tid;
      const myPts=isHome?hs:as;
      const oppPts=isHome?as:hs;
      
      totalFor+=myPts;totalAg+=oppPts;n++;
      if(myPts>oppPts)wins++;
      form+=(myPts>oppPts)?'W':'L';
      if(i<5){recentFor+=myPts;recentN++}
    });
    
    if(n>=2){
      profile.ppg=totalFor/n;
      profile.oppPpg=totalAg/n;
      profile.winPct=(wins/n)*100;
      profile.wins=wins;
      profile.played=n;
      profile.form=form;
      profile.recentPpg=recentN>0?recentFor/recentN:null;
      profile.hasData=true;
      profile.dataSource='games';
      profile.gamesAnalyzed=n;
    }
  }
  
  // --- 2) Supplement with season stats if game results are weak ---
  if(!profile.hasData&&seasonStats&&seasonStats.hasData){
    profile.ppg=seasonStats.ppg;
    profile.oppPpg=seasonStats.oppPpg;
    profile.winPct=seasonStats.winPct;
    profile.wins=seasonStats.wins;
    profile.played=seasonStats.played;
    profile.homeRec=seasonStats.homeRec;
    profile.awayRec=seasonStats.awayRec;
    profile.hasData=true;
    profile.dataSource='season';
  }
  
  return profile;
}

async function analyzeMatch(g){
  S.selMatch=g;S.view='analysis';S.analysis=null;S.tab='pronostici';S.loading=true;render();
  const hid=g.teams.home.id,aid=g.teams.away.id,lid=g.league.id,szn=g.league.season||'2024-2025';
  try{
    // Phase 1: Season stats + H2H + standings + players
    const[hs,as,h2hG,stand,hP,aP]=await Promise.all([
      fetchStats(hid,lid,szn),fetchStats(aid,lid,szn),
      fetchH2H(hid,aid),fetchStandings(lid,szn),
      fetchPlayers(hid,szn),fetchPlayers(aid,szn)
    ]);
    
    // Phase 2: Last games (PRIMARY data)
    let[hlg,alg]=await Promise.all([fetchLastGames(hid,lid,szn),fetchLastGames(aid,lid,szn)]);
    if(hlg.length<3){const fb=await fetchLastGamesAny(hid,szn);if(fb.length>hlg.length)hlg=fb}
    if(alg.length<3){const fb=await fetchLastGamesAny(aid,szn);if(fb.length>alg.length)alg=fb}
    
    console.log(`\u{1F4CA} ${g.teams.home.name}: ${hlg.length} games | ${g.teams.away.name}: ${alg.length} games`);
    
    // Phase 3: Build team profiles from actual results
    const hd=buildTeamProfile(hid,hlg,extractTeamData(hs));
    const ad=buildTeamProfile(aid,alg,extractTeamData(as));
    
    console.log(`\u{1F4CA} ${g.teams.home.name}: PPG=${hd.ppg.toFixed(1)} OPP=${hd.oppPpg.toFixed(1)} W%=${hd.winPct.toFixed(0)} src=${hd.dataSource}(${hd.gamesAnalyzed}g)`);
    console.log(`\u{1F4CA} ${g.teams.away.name}: PPG=${ad.ppg.toFixed(1)} OPP=${ad.oppPpg.toFixed(1)} W%=${ad.winPct.toFixed(0)} src=${ad.dataSource}(${ad.gamesAnalyzed}g)`);
    
    const h2h=processH2H(h2hG,hid);
    const hPl=processPlayers(hP),aPl=processPlayers(aP);
    
    if(hPl.length)S.nameCache.set(hid,hPl.slice(0,5).map(p=>p.name.split(' ').pop()).join(', '));
    if(aPl.length)S.nameCache.set(aid,aPl.slice(0,5).map(p=>p.name.split(' ').pop()).join(', '));
    
    // Standings
    const flat=Array.isArray(stand)?stand.flat(3):[];
    const hSt=findStandingPos(flat,hid),aSt=findStandingPos(flat,aid);
    const stInfo={
      hPos:hSt?.position||hSt?.stage?.rank||null,aPos:aSt?.position||aSt?.stage?.rank||null,
      hRec:hSt?`${hSt.games?.win?.total||0}-${hSt.games?.lose?.total||0}`:hd.homeRec,
      aRec:aSt?`${aSt.games?.win?.total||0}-${aSt.games?.lose?.total||0}`:ad.awayRec
    };
    
    // Phase 4: Predictions
    const exp=calcExpected(hd,ad,h2h,stInfo);
    const ml=moneyline(exp.home,exp.away);
    
    console.log(`\u{1F3AF} Expected: ${exp.home.toFixed(1)} - ${exp.away.toFixed(1)} tot=${exp.total.toFixed(1)} ML=${ml.home.toFixed(1)}/${ml.away.toFixed(1)}`);
    
    const ouLines=[];const bt=Math.round(exp.total);
    for(let l=bt-25;l<=bt+25;l+=5)ouLines.push(l+0.5);
    const ou=ouCalc(exp.total,ouLines);
    
    const hTL=[],aTL=[];const bh=Math.round(exp.home),ba=Math.round(exp.away);
    for(let l=bh-15;l<=bh+15;l+=5)hTL.push(l+0.5);
    for(let l=ba-15;l<=ba+15;l+=5)aTL.push(l+0.5);
    const hTOU=ttCalc(exp.home,hTL),aTOU=ttCalc(exp.away,aTL);
    
    const hcLines=[-15.5,-12.5,-9.5,-6.5,-4.5,-2.5,-1.5,1.5,2.5,4.5,6.5,9.5,12.5,15.5];
    const hcap=hcCalc(exp.home,exp.away,hcLines);
    const qtrs=quarterPred(exp.home,exp.away);
    const halvs=halfPred(exp.home,exp.away);
    
    const superAlgo=runSuperAlgo(exp,ml,ou,hcap,hd,ad,h2h,stInfo,ouLines,hcLines,g);
    const reasoning=genReasoning(exp,ml,hd,ad,h2h,stInfo,g);
    
    console.log(`\u{1F3C6} Top: ${superAlgo.topPick?.value} ${superAlgo.topPick?.prob?.toFixed(1)}% SS=${superAlgo.topPick?.ss?.toFixed(1)} DQ=${superAlgo.dataQuality}`);
    
    S.analysis={match:g,hd,ad,h2h,stInfo,exp,ml,ou,hcap,hTOU,aTOU,hTL,aTL,ouLines,hcLines,
      qtrs,halvs,hPl,aPl,superAlgo,reasoning,hlg,alg};
  }catch(e){
    console.error('Analysis error:',e);
    S.analysis={error:e.message};
  }
  S.loading=false;render();
}

      ${dq<0.4?`<div class="verdict-warning">⚠️ Dati limitati (${dqLabel}): le previsioni per questa partita sono meno affidabili. ${!sa.hasRealData?'Statistiche stagionali non disponibili, calcolate dalle ultime partite.':''}</div>`:''}
      ${top.conf==='bassa'&&dq>=0.4?`<div class="verdict-warning">⚠️ Confidenza bassa: partita molto equilibrata, nessun pick forte emerge dai segnali.</div>`:''}
    </div>
    
    <!-- RANKING PRONOSTICI (like BettingPro prediction cards) -->
    <div class="panel">
      <div class="ptitle">🏆 Ranking Pronostici (${sa.picks.length} mercati analizzati)</div>
      <div style="display:flex;justify-content:center;gap:14px;margin-bottom:12px;font-size:0.65rem">
        <span style="display:flex;align-items:center;gap:3px"><span class="sig-dot on"></span> Alta</span>
        <span style="display:flex;align-items:center;gap:3px"><span style="width:6px;height:6px;border-radius:50%;background:var(--gold)"></span> Media</span>
        <span style="display:flex;align-items:center;gap:3px"><span class="sig-dot off"></span> Bassa</span>
      </div>
      <div class="pred-grid">
        ${sa.picks.map((p,i)=>{
          const isSel=S.betSlip.find(b=>b.label===p.value);
          const probCls=p.conf==='alta'?'hi':p.conf==='media'?'md':'lo';
          const rankCls=i<3?`r${i+1}`:'';
          return`<div class="pcard ${isSel?'sel':''}" onclick="addPickBS('${p.value.replace(/'/g,"\\'")}',${p.prob},'${p.odds}','${p.market.replace(/'/g,"\\'")}')">            ${i<3?`<div class="pcard-rank ${rankCls}">${i+1}</div>`:''}
            <div class="pcard-mkt">${esc(p.market)}</div>
            <div class="pcard-val">${esc(p.value)}</div>
            <div class="pcard-prob ${probCls}">${sf(p.prob,1)}%</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-dark);margin-top:2px">@${p.odds}</div>
            <div class="pcard-signals">${Object.values(p.signals).map(s=>`<div class="sig-dot ${s?'on':'off'}"></div>`).join('')}</div>
            <div class="pcard-ss">SS: ${sf(p.ss,1)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    
    <!-- TOP 3 PICKS DETTAGLIATI -->
    <div class="panel">
      <div class="ptitle">🎯 Top 3 — Dettaglio Segnali</div>
      ${sa.top3.map((p,i)=>{
        const sigEntries=Object.entries(p.signals);
        const confCol2=p.conf==='alta'?'var(--emerald)':p.conf==='media'?'var(--gold)':'var(--red)';
        return`
        <div style="padding:14px;background:var(--bg-card2);border:1px solid ${i===0?'rgba(16,185,129,0.25)':'var(--border)'};border-radius:14px;margin-bottom:8px;${i===0?'box-shadow:0 0 15px var(--glow-green)':''}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:1.1rem">${p.icon}</span>
              <div>
                <div style="font-size:0.92rem;font-weight:800">${esc(p.value)}</div>
                <div style="font-size:0.65rem;color:var(--text-dark)">${esc(p.market)}</div>
              </div>
            </div>
            <div style="text-align:right">
              <div style="font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:900;color:${confCol2}">${sf(p.prob,1)}%</div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--text-dark)">@${p.odds}</div>
            </div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">
            ${sigEntries.map(([k,v])=>`<span style="font-size:0.6rem;padding:3px 6px;border-radius:6px;font-weight:600;background:${v?'rgba(16,185,129,0.1)':'rgba(239,68,68,0.06)'};color:${v?'var(--emerald)':'var(--text-dark)'}">${v?'✓':'✗'} ${k.replace(/_/g,' ')}</span>`).join('')}
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
            <span style="font-size:0.65rem;color:var(--text-dark)">Convergenza: ${sf(p.conv*100,0)}% (${p.on}/${p.tot})</span>
            <span style="font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:6px;background:${p.conf==='alta'?'rgba(16,185,129,0.12)':p.conf==='media'?'rgba(251,191,36,0.12)':'rgba(239,68,68,0.12)'};color:${confCol2}">${p.conf.toUpperCase()}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  
  return html;
}

// ===== O/U TAB =====
function renderOU(a){
  const m=a.match;
  const bestL=a.ouLines.reduce((b,l)=>{const d=Math.abs(a.exp.total-l);return d<b.d?{l,d}:b},{l:null,d:Infinity}).l;
  return`
    <div class="panel"><div class="ptitle">📈 O/U Totale (Atteso: ${sf(a.exp.total,1)})</div>
      <table class="otbl"><thead><tr><th>Linea</th><th>Over</th><th>Under</th></tr></thead><tbody>
      ${a.ouLines.map(l=>{const d=a.ou[l];if(!d)return'';const ib=l===bestL;
        return`<tr><td>${l}</td><td class="${d.over>55?(ib?'smart':'best'):''}">${sf(d.over,1)}%</td><td class="${d.under>55?(ib?'smart':'best'):''}">${sf(d.under,1)}%</td></tr>`}).join('')}
      </tbody></table></div>
    <div class="panel"><div class="ptitle">🏠 ${esc(m.teams?.home?.name)} (Atteso: ${sf(a.exp.home,1)})</div>
      <table class="otbl"><thead><tr><th>Linea</th><th>Over</th><th>Under</th></tr></thead><tbody>
      ${a.hTL.map(l=>{const d=a.hTOU[l];if(!d)return'';return`<tr><td>${l}</td><td class="${d.over>55?'best':''}">${sf(d.over,1)}%</td><td class="${d.under>55?'best':''}">${sf(d.under,1)}%</td></tr>`}).join('')}
      </tbody></table></div>
    <div class="panel"><div class="ptitle">✈️ ${esc(m.teams?.away?.name)} (Atteso: ${sf(a.exp.away,1)})</div>
      <table class="otbl"><thead><tr><th>Linea</th><th>Over</th><th>Under</th></tr></thead><tbody>
      ${a.aTL.map(l=>{const d=a.aTOU[l];if(!d)return'';return`<tr><td>${l}</td><td class="${d.over>55?'best':''}">${sf(d.over,1)}%</td><td class="${d.under>55?'best':''}">${sf(d.under,1)}%</td></tr>`}).join('')}
      </tbody></table></div>`;
}

// ===== PLAYERS TAB =====
function renderPlayers(a){
  const m=a.match;
  if(!a.hPl.length&&!a.aPl.length)return'<div class="panel"><div class="empty"><div style="font-size:2.5rem;margin-bottom:12px;opacity:0.5">👤</div>Stats giocatori non disponibili.<div style="font-size:0.7rem;color:var(--text-dark);margin-top:8px">Disponibili per NBA, Euroleague e campionati maggiori.</div></div></div>';
  
  const renderTeam=(pls,tName,oppD)=>{
    if(!pls.length)return'';
    return`<div class="panel"><div class="ptitle">🏀 ${esc(tName)}</div>
      ${pls.slice(0,8).map(p=>{
        const props=calcPProps(p,oppD);
        return`<div class="plcard"><div class="plhdr">
          <div class="plpos ${p.pos}">${p.pos||'?'}</div>
          <div><div class="plname">${esc(p.name)}</div><div class="plsub">${sf(p.minutes,0)} min/g • ${p.gp} partite</div></div>
        </div>
        <div class="plstats">
          <div class="plst"><div class="plst-l">PTS</div><div class="plst-v">${sf(p.points,1)}</div></div>
          <div class="plst"><div class="plst-l">REB</div><div class="plst-v">${sf(p.rebounds,1)}</div></div>
          <div class="plst"><div class="plst-l">AST</div><div class="plst-v">${sf(p.assists,1)}</div></div>
          <div class="plst"><div class="plst-l">3PT</div><div class="plst-v">${sf(p.threes,1)}</div></div>
        </div>
        ${props.length?`<div class="plprops"><div class="plprops-title">PROPS PREVISTE</div><div class="plprops-row">
          ${props.map(pr=>`<div class="plprop" onclick="addPropBS('${p.name.replace(/'/g,"\\'")}','${pr.type}',${pr.line},${pr.over})">
            <span class="pt">${pr.type}</span><span class="pl">O${pr.line}</span>
            <span class="pp" style="color:${pr.over>55?'var(--emerald)':pr.over<45?'var(--red)':'var(--gold)'}">${sf(pr.over,0)}%</span>
          </div>`).join('')}
        </div></div>`:''}
        </div>`;
      }).join('')}</div>`;
  };
  
  return renderTeam(a.hPl,m.teams?.home?.name,a.ad)+renderTeam(a.aPl,m.teams?.away?.name,a.hd);
}

// ===== HANDICAP TAB =====
function renderHcap(a){
  const m=a.match,s=a.exp.home-a.exp.away;
  return`<div class="panel"><div class="ptitle">📐 Handicap (Diff: ${s>0?'+':''}${sf(s,1)})</div>
    <div style="display:grid;grid-template-columns:60px 1fr 1fr;gap:2px;margin-bottom:8px">
      <div style="font-size:0.6rem;font-weight:700;color:var(--text-dark);text-align:center;padding:6px">LINEA</div>
      <div style="font-size:0.6rem;font-weight:700;color:var(--text-dark);text-align:center;padding:6px">${esc(m.teams?.home?.name)}</div>
      <div style="font-size:0.6rem;font-weight:700;color:var(--text-dark);text-align:center;padding:6px">${esc(m.teams?.away?.name)}</div>
    </div>
    ${a.hcLines.map(l=>{const d=a.hcap[l];if(!d)return'';const hs=d.home>55,as=d.away>55;
      return`<div class="hrow">
        <div class="hline">${l>0?'+':''}${l}</div>
        <div class="hbar" style="background:${hs?'linear-gradient(90deg,var(--fire),var(--orange))':'var(--bg-input)'};width:${d.home}%;color:${hs?'#fff':'var(--text-gray)'}">${sf(d.home,1)}%</div>
        <div class="hbar" style="background:${as?'linear-gradient(90deg,var(--blue),var(--cyan))':'var(--bg-input)'};width:${d.away}%;justify-content:flex-end;color:${as?'#fff':'var(--text-gray)'}">${sf(d.away,1)}%</div>
      </div>`}).join('')}
  </div>`;
}

// ===== BET SLIP =====
function addPickBS(label,prob,odds,market){
  addBS({label,prob,odds,type:market});
}
function addPropBS(name,type,line,prob){
  addBS({label:name+' '+type+' O'+line,prob,odds:(100/prob).toFixed(2),type:'PROP'});
}
function addBS(pick){
  if(typeof pick==='string')pick=JSON.parse(pick);
  const ex=S.betSlip.findIndex(b=>b.label===pick.label);
  if(ex>=0)S.betSlip.splice(ex,1);else S.betSlip.push(pick);
  updateBS();fbS('betSlip',S.betSlip);
  // Re-render prediction cards to show selection
  if(S.view==='analysis'&&S.tab==='pronostici'){const tc=document.getElementById('tc');if(tc)tc.innerHTML=renderTC()}
}
function updateBS(){
  const bar=document.getElementById('bsBar'),cnt=document.getElementById('bsCnt'),odd=document.getElementById('bsOdds');
  if(S.betSlip.length>0){
    bar.classList.add('vis');cnt.textContent=`${S.betSlip.length} selezioni`;
    const to=S.betSlip.reduce((a,b)=>a*parseFloat(b.odds||1),1);
    odd.textContent=`@${to.toFixed(2)}`;
  }else bar.classList.remove('vis');
}

// ===== NAV =====
function togLg(id){
  if(S.exp.has(id))S.exp.delete(id);
  else{
    S.exp.add(id);
    // Pre-fetch player names for this league
    const lg=S.leagues.find(l=>l.id===id);
    if(lg)lg.matches.forEach(m=>{
      const szn=m.league?.season||new Date().getFullYear();
      const hid=m.teams?.home?.id,aid=m.teams?.away?.id;
      if(hid&&!S.nameCache.has(hid))loadPlayerNames(hid,szn).then(()=>reRenderLg(id));
      if(aid&&!S.nameCache.has(aid))loadPlayerNames(aid,szn).then(()=>reRenderLg(id));
    });
  }
  render();
}

function reRenderLg(lgId){
  // Re-render only the specific league group when player names arrive
  if(S.view!=='leagues'||!S.exp.has(lgId))return;
  render(); // Simple full re-render since it's fast
}

function backLg(){S.view='leagues';S.analysis=null;S.selMatch=null;render()}
function setTab(t){S.tab=t;render()}
function toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';document.body.classList.toggle('light-mode',S.theme==='light');localStorage.setItem('bp_theme',S.theme)}

// ===== INIT =====
async function init(){
  const sl=await fbL('betSlip');if(sl&&Array.isArray(sl))S.betSlip=sl;
  await loadGames(0);
}
init();
</script>
