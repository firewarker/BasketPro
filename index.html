<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BasketPro PRO - NBA Real-Time</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #11151f;
      --card-hover: #161b28;
      --input: #1c2333;
      --orange: #ff6b2c;
      --orange-light: #ff8956;
      --blue: #4a9eff;
      --green: #00e676;
      --yellow: #ffd93d;
      --red: #ff5252;
      --text: #e8edf5;
      --text-light: #f8fafc;
      --text-gray: #9ca3af;
      --border: rgba(255,255,255,0.08);
    }

    body.light-mode {
      --bg: #f5f7fa;
      --card: #ffffff;
      --card-hover: #fafbfc;
      --input: #f0f2f5;
      --orange: #f56624;
      --blue: #2563eb;
      --green: #00c853;
      --red: #d32f2f;
      --text: #1e293b;
      --text-light: #0f172a;
      --text-gray: #64748b;
      --border: rgba(0,0,0,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .header {
      background: rgba(10,14,26,0.98);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
    }

    .brand-name {
      font-size: 1.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--orange), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-nav {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      padding: 10px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-btn:hover {
      background: var(--card-hover);
    }

    .nav-btn.active {
      background: var(--orange);
      color: white;
      border-color: transparent;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .api-badge {
      padding: 8px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .status-dot.loading { background: var(--yellow); }
    .status-dot.error { background: var(--red); }

    .theme-btn {
      width: 44px;
      height: 44px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.3rem;
      transition: all 0.2s;
    }

    .theme-btn:hover {
      transform: scale(1.05);
    }

    .main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    .info-banner {
      background: linear-gradient(135deg, rgba(255,107,44,0.1), rgba(74,158,255,0.05));
      border: 1px solid rgba(255,107,44,0.3);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .info-banner.error {
      background: linear-gradient(135deg, rgba(255,82,82,0.15), rgba(255,82,82,0.05));
      border-color: rgba(255,82,82,0.3);
    }

    .banner-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .banner-text {
      font-size: 0.9rem;
      color: var(--text-gray);
      line-height: 1.6;
    }

    .date-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .date-tab {
      padding: 12px 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .date-tab:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
    }

    .date-tab.active {
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      color: white;
      border-color: transparent;
    }

    .games {
      display: grid;
      gap: 16px;
    }

    .game {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.3s;
    }

    .game:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: var(--text-gray);
    }

    .game-status {
      padding: 4px 12px;
      background: var(--input);
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .game-status.live {
      background: var(--red);
      color: white;
      animation: pulse 2s infinite;
    }

    .game-teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }

    .team {
      flex: 1;
      text-align: center;
    }

    .team-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 12px;
      background: var(--input);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .team-name {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    .team-score {
      font-size: 2.5rem;
      font-weight: 800;
    }

    .vs {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-gray);
    }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-gray);
    }

    .empty-icon {
      font-size: 5rem;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .empty-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .empty-subtitle {
      font-size: 1rem;
      line-height: 1.6;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, var(--card-hover) 50%, var(--card) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
      height: 120px;
      border-radius: 16px;
      margin-bottom: 16px;
    }

    @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }

    .hidden { display: none !important; }

    @media (max-width: 768px) {
      .header-inner { flex-direction: column; }
      .header-nav { width: 100%; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">🏀</div>
        <div class="brand-name">BASKETPRO PRO</div>
      </div>
      
      <div class="header-nav">
        <div class="nav-btn active" data-page="games">📊 Partite</div>
        <div class="nav-btn" data-page="tracking">📈 Tracking</div>
        <div class="nav-btn" data-page="stats">📉 Stats</div>
      </div>
      
      <div class="header-right">
        <div class="api-badge">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">Connessione...</span>
        </div>
        <div class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div id="infoBanner" class="hidden"></div>
    
    <div id="gamesPage">
      <div class="date-tabs" id="dateTabs"></div>
      <div class="games" id="gamesList">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>

    <div id="trackingPage" class="hidden">
      <h2 style="margin-bottom:24px;">📈 Tracking Pronostici</h2>
      <div id="trackingContent"></div>
    </div>

    <div id="statsPage" class="hidden">
      <h2 style="margin-bottom:24px;">📉 Statistiche</h2>
      <div id="statsContent"></div>
    </div>
  </div>

  <script>
    // === CONFIG ===
    const API = {
      key: 'aeb2864a3d4dbb8395fa53c83a876a93',
      host: 'api-nba-v1.p.rapidapi.com',
      base: 'https://api-nba-v1.p.rapidapi.com'
    };

    const FIREBASE = {
      url: 'https://basketpro-1a28b-default-rtdb.europe-west1.firebasedatabase.app/'
    };

    // === STORAGE ===
    const store = {
      get: k => {
        try { return localStorage.getItem(k); }
        catch(e) { return sessionStorage.getItem(k); }
      },
      set: (k, v) => {
        try { localStorage.setItem(k, v); }
        catch(e) {
          try {
            Object.keys(localStorage).forEach(key => {
              if (key.startsWith('basketpro_')) localStorage.removeItem(key);
            });
            localStorage.setItem(k, v);
          } catch(e2) { sessionStorage.setItem(k, v); }
        }
      }
    };

    // === STATE ===
    let state = {
      page: 'games',
      date: 0,
      games: [],
      loading: false,
      error: null,
      theme: store.get('theme') || 'dark',
      season: '2024',  // Stagione NBA corrente
      apiCalls: 0
    };

    // === USER ID ===
    let uid = store.get('uid');
    if (!uid) {
      uid = 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
      store.set('uid', uid);
    }

    // === FIREBASE ===
    let db = null;
    try {
      firebase.initializeApp({ databaseURL: FIREBASE.url });
      db = firebase.database();
      console.log('✅ Firebase OK');
    } catch(e) { console.warn('⚠️ Firebase skip'); }

    // === HELPERS ===
    const getDate = offset => {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    };

    const formatTime = str => new Date(str).toLocaleTimeString('it', { hour: '2-digit', minute: '2-digit' });
    
    const formatDateLabel = offset => {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toLocaleDateString('it', { day: '2-digit', month: 'short' });
    };

    // === THEME ===
    function toggleTheme() {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      document.body.classList.toggle('light-mode', state.theme === 'light');
      document.getElementById('themeBtn').textContent = state.theme === 'dark' ? '🌙' : '☀️';
      store.set('theme', state.theme);
    }

    if (state.theme === 'light') {
      document.body.classList.add('light-mode');
      document.getElementById('themeBtn').textContent = '☀️';
    }

    // === NAV ===
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => switchPage(btn.dataset.page));
    });

    function switchPage(page) {
      state.page = page;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-page="${page}"]`).classList.add('active');
      
      document.getElementById('gamesPage').classList.toggle('hidden', page !== 'games');
      document.getElementById('trackingPage').classList.toggle('hidden', page !== 'tracking');
      document.getElementById('statsPage').classList.toggle('hidden', page !== 'stats');
      
      if (page === 'tracking') renderTracking();
      if (page === 'stats') renderStats();
    }

    // === API ===
    async function callAPI(endpoint, params = {}) {
      const url = `${API.base}/${endpoint}?${new URLSearchParams(params)}`;
      console.log('🔌 API Call:', url);
      
      const res = await fetch(url, {
        headers: {
          'X-RapidAPI-Key': API.key,
          'X-RapidAPI-Host': API.host
        }
      });
      
      state.apiCalls++;
      console.log(`📊 API Calls: ${state.apiCalls}`);
      
      if (res.status === 403) throw new Error('QUOTA');
      if (res.status === 429) throw new Error('RATE_LIMIT');
      if (!res.ok) throw new Error(`HTTP_${res.status}`);
      
      return await res.json();
    }

    async function loadGames(offset = 0) {
      state.loading = true;
      state.date = offset;
      state.error = null;
      hideBanner();
      updateStatus('loading', 'Caricamento...');
      
      try {
        const dateStr = getDate(offset);
        console.log('📅 Loading games for:', dateStr);
        
        const data = await callAPI('games', { date: dateStr });
        
        console.log('📦 API Response:', data);
        
        if (data && data.response && Array.isArray(data.response)) {
          state.games = data.response;
          console.log(`✅ ${state.games.length} games loaded`);
          
          if (state.games.length === 0) {
            showBanner('info', 'Nessuna Partita', `Non ci sono partite NBA programmate per ${dateStr}. Prova un'altra data!`);
            updateStatus('ok', 'Nessuna partita');
          } else {
            updateStatus('ok', `${state.games.length} partite`);
          }
        } else {
          state.games = [];
          showBanner('error', 'Formato Risposta Non Valido', 'L\'API ha restituito dati in un formato inatteso. Controlla la console per dettagli.');
          updateStatus('error', 'Errore formato');
        }
        
      } catch(err) {
        console.error('❌ Error:', err);
        state.error = err;
        state.games = [];
        
        if (err.message === 'QUOTA') {
          showBanner('error', '🚫 Quota API Esaurita', 'Hai raggiunto il limite giornaliero. Piano PRO: controlla il tuo account RapidAPI per verificare i limiti. La quota si resetta ogni 24 ore.');
          updateStatus('error', 'Quota esaurita');
        } else if (err.message === 'RATE_LIMIT') {
          showBanner('error', '⏱️ Rate Limit', 'Troppe richieste in poco tempo. Aspetta qualche secondo.');
          updateStatus('error', 'Rate limit');
        } else {
          showBanner('error', '❌ Errore Connessione', `Impossibile connettersi all'API: ${err.message}. Verifica la connessione internet.`);
          updateStatus('error', 'Errore');
        }
      }
      
      state.loading = false;
      render();
    }

    function updateStatus(status, text) {
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      dot.className = `status-dot ${status}`;
      txt.textContent = text;
    }

    function showBanner(type, title, text) {
      const banner = document.getElementById('infoBanner');
      banner.className = `info-banner ${type}`;
      banner.innerHTML = `
        <div class="banner-title">${title}</div>
        <div class="banner-text">${text}</div>
      `;
      banner.classList.remove('hidden');
    }

    function hideBanner() {
      document.getElementById('infoBanner').classList.add('hidden');
    }

    // === RENDER ===
    function render() {
      renderDates();
      renderGames();
    }

    function renderDates() {
      const tabs = [
        { offset: -1, label: 'Ieri' },
        { offset: 0, label: 'Oggi' },
        { offset: 1, label: 'Domani' },
        { offset: 2, label: formatDateLabel(2) }
      ];
      
      document.getElementById('dateTabs').innerHTML = tabs.map(t => `
        <div class="date-tab ${state.date === t.offset ? 'active' : ''}" onclick="loadGames(${t.offset})">
          ${t.label}
        </div>
      `).join('');
    }

    function renderGames() {
      const container = document.getElementById('gamesList');
      
      if (state.loading) {
        container.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
        return;
      }
      
      if (!state.games || state.games.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🏀</div>
            <div class="empty-title">Nessuna Partita</div>
            <div class="empty-subtitle">
              Non ci sono partite NBA per questa data.<br>
              La stagione NBA va da Ottobre a Giugno.<br>
              Prova un'altra data!
            </div>
          </div>
        `;
        return;
      }
      
      container.innerHTML = state.games.map(g => {
        const isLive = ['Q1','Q2','Q3','Q4','HT','OT'].includes(g.status?.short);
        const isDone = g.status?.short === 'FT' || g.status?.short === '3';
        const home = g.teams?.home || {};
        const away = g.teams?.away || {};
        const homeScore = g.scores?.home?.total || 0;
        const awayScore = g.scores?.away?.total || 0;
        
        return `
          <div class="game">
            <div class="game-header">
              <span>🕒 ${formatTime(g.date?.start || new Date())}</span>
              <span class="game-status ${isLive ? 'live' : ''}">${isLive ? '🔴 LIVE' : g.status?.long || 'Scheduled'}</span>
            </div>
            <div class="game-teams">
              <div class="team">
                <div class="team-logo">🏀</div>
                <div class="team-name">${home.name || home.nickname || 'Home'}</div>
                <div class="team-score" style="color:var(--orange);">${isDone || isLive ? homeScore : '-'}</div>
              </div>
              <div class="vs">VS</div>
              <div class="team">
                <div class="team-logo">🏀</div>
                <div class="team-name">${away.name || away.nickname || 'Away'}</div>
                <div class="team-score" style="color:var(--blue);">${isDone || isLive ? awayScore : '-'}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderTracking() {
      document.getElementById('trackingContent').innerHTML = `
        <div class="empty">
          <div class="empty-icon">📊</div>
          <div class="empty-title">Tracking Pronostici</div>
          <div class="empty-subtitle">Funzionalità in arrivo! Potrai tracciare i tuoi pronostici e monitorare l'accuracy.</div>
        </div>
      `;
    }

    function renderStats() {
      document.getElementById('statsContent').innerHTML = `
        <div class="empty">
          <div class="empty-icon">📈</div>
          <div class="empty-title">Statistiche</div>
          <div class="empty-subtitle">Funzionalità in arrivo! Vedrai grafici dettagliati delle tue performance.</div>
        </div>
      `;
    }

    // === INIT ===
    async function init() {
      console.log('🏀 BasketPro PRO v3.0');
      console.log('🔑 API Key:', API.key.slice(0, 8) + '...');
      console.log('👤 User:', uid);
      
      await loadGames(0);
      
      // Auto-refresh live games ogni 30s
      setInterval(() => {
        const hasLive = state.games.some(g => ['Q1','Q2','Q3','Q4','HT','OT'].includes(g.status?.short));
        if (hasLive && state.page === 'games' && !state.loading) {
          console.log('🔄 Auto-refresh live games');
          loadGames(state.date);
        }
      }, 30000);
    }

    init();
  </script>
</body>
</html>
