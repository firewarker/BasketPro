<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>BasketPro AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--sf:#161b22;--sf2:#1c2333;--sf3:#21293a;
  --br:#30363d;--br2:#3d4555;
  --teal:#2dd4bf;--teal2:#14b8a6;--teal-bg:rgba(45,212,191,.07);--teal-br:rgba(45,212,191,.25);--teal-glow:0 0 20px rgba(45,212,191,.15);
  --gold:#fbbf24;--gold-bg:rgba(251,191,36,.06);--gold-br:rgba(251,191,36,.2);
  --green:#34d399;--green-bg:rgba(52,211,153,.07);--green-br:rgba(52,211,153,.2);
  --red:#fb7185;--red-bg:rgba(251,113,133,.06);--red-br:rgba(251,113,133,.18);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.06);--blue-br:rgba(96,165,250,.18);
  --violet:#a78bfa;--violet-bg:rgba(167,139,250,.05);--violet-br:rgba(167,139,250,.12);
  --w:#f0f6fc;--w2:#c9d1d9;--w3:#8b949e;--w4:#6e7681;--w5:#484f58;
  --r:14px;--rs:10px;--mx:680px;
  --f:'DM Sans',system-ui,sans-serif;--fm:'Space Mono',monospace
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--w);font-family:var(--f);min-height:100dvh;-webkit-font-smoothing:antialiased;font-size:15px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 800px 500px at 50% -10%,rgba(45,212,191,.04),transparent);pointer-events:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--br);border-radius:4px}
.W{max-width:var(--mx);margin:0 auto;position:relative;z-index:1}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}

/* в•җв•җв•җ HEADER в•җв•җв•җ */
header{position:sticky;top:0;z-index:100;background:rgba(13,17,23,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--br);padding:0 20px}
.hdr{max-width:var(--mx);margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--teal),var(--teal2));border-radius:10px;display:grid;place-items:center;font-size:1rem;box-shadow:var(--teal-glow)}
.logo-txt{font-size:1.2rem;font-weight:900;letter-spacing:-.03em}.logo-txt b{color:var(--teal)}
.logo-v{font-size:.55rem;font-weight:700;color:var(--teal);background:var(--teal-bg);border:1px solid var(--teal-br);padding:2px 8px;border-radius:12px;margin-left:4px}
.pills{display:flex;gap:3px;background:var(--sf);border:1px solid var(--br);padding:3px;border-radius:12px}
.pill{padding:7px 14px;border:none;background:0;color:var(--w3);font-size:.8rem;font-weight:700;cursor:pointer;border-radius:9px;transition:.2s;font-family:var(--f)}
.pill:hover{color:var(--w2);background:var(--sf2)}.pill.on{background:var(--teal);color:#000}
.sts{font-size:.65rem;color:var(--w3);font-family:var(--fm);display:flex;align-items:center;gap:5px}
.sdot{width:6px;height:6px;border-radius:50%}.sdot.ok{background:var(--green)}.sdot.ld{background:var(--gold);animation:pulse .5s infinite}.sdot.er{background:var(--red)}

/* в•җв•җв•җ SCREENS в•җв•җв•җ */
.scr{display:none;padding:16px 20px 100px}.scr.on{display:block}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.topbar h2{font-size:.85rem;font-weight:800;color:var(--w3);text-transform:uppercase;letter-spacing:1px}
.topbar .cnt{font-size:.75rem;color:var(--w4);font-family:var(--fm)}
.back{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;background:var(--sf);border:1px solid var(--br);border-radius:var(--rs);color:var(--w2);font-size:.85rem;font-weight:700;cursor:pointer;font-family:var(--f);transition:.15s}
.back:hover{border-color:var(--teal);color:var(--teal)}.back svg{width:14px;height:14px}

/* в•җв•җв•җ LEAGUES в•җв•җв•җ */
.country{margin-bottom:20px;animation:fadeUp .4s ease both}
.country-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.country-flag{font-size:1.1rem}
.country-name{font-size:.8rem;font-weight:800;color:var(--w3);text-transform:uppercase;letter-spacing:.8px}
.country-line{flex:1;height:1px;background:var(--br);margin-left:8px}
.lg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:560px){.lg-grid{grid-template-columns:1fr 1fr 1fr}}
.lg-card{padding:16px;background:var(--sf);border:1px solid var(--br);border-radius:var(--r);cursor:pointer;transition:all .2s}
.lg-card:hover{border-color:var(--teal-br);box-shadow:var(--teal-glow);transform:translateY(-2px)}.lg-card:active{transform:scale(.97)}
.lg-name{font-size:.95rem;font-weight:800;line-height:1.3;margin-bottom:8px}
.lg-count{display:inline-block;font-size:.7rem;font-weight:700;color:var(--teal);background:var(--teal-bg);border:1px solid var(--teal-br);padding:3px 10px;border-radius:8px;font-family:var(--fm)}

/* в•җв•җв•җ MATCHES в•җв•җв•җ */
.m-title{font-size:1.2rem;font-weight:900;margin-bottom:14px}
.m-grid{display:grid;gap:8px}
@media(min-width:560px){.m-grid{grid-template-columns:1fr 1fr}}
.mc{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:16px;cursor:pointer;transition:.15s}
.mc:hover{border-color:var(--br2);box-shadow:0 4px 20px rgba(0,0,0,.2)}.mc:active{transform:scale(.98)}
.mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mc-meta{font-size:.75rem;color:var(--w3)}
.mc-badge{font-size:.6rem;font-weight:800;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
.mc-badge.live{background:var(--red);color:#fff;animation:pulse .7s infinite}.mc-badge.ft{background:var(--sf2);color:var(--w3)}.mc-badge.ns{background:var(--sf2);color:var(--w3)}
.mc-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.mc-team{display:flex;align-items:center;gap:10px;font-size:1rem;font-weight:700;min-width:0}
.mc-team img{width:24px;height:24px;object-fit:contain;border-radius:4px;flex-shrink:0}
.mc-team span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-score{font-size:1.2rem;font-weight:900;font-family:var(--fm);min-width:32px;text-align:right;color:var(--w4)}.mc-score.w{color:var(--teal)}

/* в•җв•җв•җ ANALYSIS в•җв•җв•җ */

/* Hero */
.a-hero{text-align:center;padding:24px 0 20px;border-bottom:1px solid var(--br);margin-bottom:20px}
.a-league{font-size:.8rem;color:var(--w3);margin-bottom:16px}
.a-vs{display:flex;align-items:center;justify-content:center;gap:20px}
.a-tm{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:90px}
.a-tm img{width:52px;height:52px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3))}
.a-tm .nm{font-size:.9rem;font-weight:800;text-align:center;line-height:1.2}
.a-sc{display:flex;align-items:center;gap:5px}
.a-sn{width:44px;height:52px;background:var(--sf2);border:2px solid var(--br2);border-radius:12px;display:grid;place-items:center;font-size:1.4rem;font-weight:900;font-family:var(--fm)}
.a-sn.w{border-color:var(--teal-br);color:var(--teal);background:var(--teal-bg)}
.a-vl{font-size:.6rem;font-weight:800;color:var(--w4)}

/* Verify */
.vfy{padding:12px 16px;border-radius:var(--rs);text-align:center;font-weight:800;font-size:.9rem;margin-bottom:16px;border:1.5px solid}
.vfy.ok{background:var(--green-bg);border-color:var(--green-br);color:var(--green)}
.vfy.ko{background:var(--red-bg);border-color:var(--red-br);color:var(--red)}
.vfy small{display:block;font-size:.7rem;font-weight:600;margin-top:3px;opacity:.8}

/* в•җв•җв•җв•җв•җв•җ 4 BET CARDS вҖ” Main feature в•җв•җв•җв•җв•җв•җ */
.bets-title{font-size:.75rem;font-weight:800;color:var(--w3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.bets-title::after{content:'';flex:1;height:1px;background:var(--br)}

.bet-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}

.bet-card{background:var(--sf);border:2px solid var(--br);border-radius:var(--r);padding:18px 14px;position:relative;overflow:hidden;transition:.15s}
.bet-card:hover{border-color:var(--br2)}
.bet-card.best{border-color:var(--teal-br);background:linear-gradient(160deg,var(--teal-bg),transparent 60%)}
.bet-card.best::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--teal2))}

/* Card header */
.bc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.bc-icon{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:.85rem}
.bc-icon.w{background:var(--teal-bg);border:1px solid var(--teal-br)}
.bc-icon.ou{background:var(--gold-bg);border:1px solid var(--gold-br)}
.bc-icon.mg{background:var(--blue-bg);border:1px solid var(--blue-br)}
.bc-icon.hc{background:var(--violet-bg);border:1px solid var(--violet-br)}
.bc-label{font-size:.6rem;font-weight:800;color:var(--w4);text-transform:uppercase;letter-spacing:.5px}

/* Card body */
.bc-pick{font-size:1.5rem;font-weight:900;line-height:1.1;margin-bottom:4px}
.bc-pct{font-size:1.1rem;font-weight:800;margin-bottom:8px}
.bc-reason{font-size:.75rem;color:var(--w3);line-height:1.4}

/* Rec badge */
.bc-rec{position:absolute;top:10px;right:10px;font-size:.5rem;font-weight:800;color:var(--teal);background:var(--teal-bg);border:1px solid var(--teal-br);padding:2px 7px;border-radius:6px;letter-spacing:.3px}

/* Score previsto */
.pred{display:flex;justify-content:center;margin:16px 0}
.pred-box{text-align:center;background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:16px 36px}
.pred-lbl{font-size:.65rem;font-weight:800;color:var(--w4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.pred-val{font-size:2rem;font-weight:900;font-family:var(--fm)}
.pred-sub{font-size:.75rem;color:var(--w3);margin-top:4px}

/* Value */
.val-card{border-radius:var(--r);padding:16px;margin:14px 0;text-align:center;border:1.5px solid}
.val-card.yes{background:var(--green-bg);border-color:var(--green-br)}
.val-tag{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.val-main{font-size:1.1rem;font-weight:900;margin-bottom:3px}
.val-sub{font-size:.75rem;color:var(--w2)}

/* AI */
.ai{background:linear-gradient(160deg,var(--violet-bg),rgba(96,165,250,.04));border:1px solid var(--violet-br);border-radius:var(--r);padding:16px 18px;margin:14px 0}
.ai-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ai-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--violet),var(--blue));display:grid;place-items:center;font-size:.75rem}
.ai-name{font-size:.65rem;font-weight:800;color:var(--violet);text-transform:uppercase;letter-spacing:.5px}
.ai-badge{font-size:.55rem;font-weight:700;color:var(--w3);background:var(--sf);padding:3px 8px;border-radius:6px;border:1px solid var(--br);margin-left:auto}
.ai-txt{font-size:.9rem;line-height:1.7;color:var(--w2)}

/* Collapsible */
.sec{margin:8px 0}
.sec-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--sf);border:1px solid var(--br);border-radius:var(--rs);cursor:pointer;font-size:.8rem;font-weight:800;color:var(--w2);font-family:var(--f);transition:.15s}
.sec-btn:hover{border-color:var(--br2);background:var(--sf2)}
.sec-arr{font-size:.6rem;color:var(--w4);transition:transform .25s}.sec-arr.open{transform:rotate(180deg)}
.sec-body{overflow:hidden;max-height:0;transition:max-height .35s}.sec-body.open{max-height:3000px}
.sec-inner{padding:12px 0}

/* Models */
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mod{background:var(--sf);border:1px solid var(--br);border-radius:var(--rs);padding:12px;text-align:center}
.mod-name{font-size:.55rem;font-weight:800;color:var(--w4);text-transform:uppercase;margin-bottom:4px}
.mod-val{font-size:1.1rem;font-weight:900}

/* Stats */
.st-r{display:grid;grid-template-columns:1fr 60px 1fr;gap:3px;margin-bottom:3px}
.st-v{font-size:.85rem;font-weight:700;padding:6px 8px;border-radius:6px;background:var(--sf)}.st-v.l{text-align:right}.st-v.r{text-align:left}
.st-v.hi{color:var(--teal);background:var(--teal-bg)}
.st-lab{font-size:.55rem;font-weight:800;color:var(--w4);text-transform:uppercase;display:grid;place-items:center}

/* Form */
.fm-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.fm-name{font-size:.85rem;font-weight:700;min-width:70px}
.fdot{width:22px;height:22px;border-radius:6px;display:inline-grid;place-items:center;font-size:.5rem;font-weight:900;color:#fff}.fdot.W{background:var(--green)}.fdot.L{background:var(--red)}
.fm-pct{font-size:.7rem;color:var(--w3);margin-left:auto;font-family:var(--fm)}

/* Save */
.save-btn{display:block;width:100%;padding:16px;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--teal),var(--teal2));color:#000;font-weight:800;font-size:1rem;cursor:pointer;font-family:var(--f);box-shadow:var(--teal-glow);transition:.15s;margin-top:18px}
.save-btn:hover{transform:translateY(-1px);box-shadow:0 0 30px rgba(45,212,191,.2)}.save-btn:active{transform:scale(.97)}
.save-btn.done{background:var(--sf);color:var(--green);border:2px solid var(--green-br);box-shadow:none}

/* Utils */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--w3);text-align:center;gap:8px}
.empty .ico{font-size:2.5rem}.empty p{font-size:.95rem}
.spin{width:24px;height:24px;border:2.5px solid var(--br);border-top-color:var(--teal);border-radius:50%;animation:spin .5s linear infinite}
.warn{padding:14px;background:var(--gold-bg);border:1px solid var(--gold-br);border-radius:var(--r);font-size:.9rem;color:var(--gold);text-align:center;font-weight:700;margin:14px 0}
.retry{margin-top:8px;padding:10px 24px;background:var(--teal);color:#000;border:0;border-radius:var(--rs);cursor:pointer;font-weight:800;font-family:var(--f);font-size:.9rem}

@media(max-width:480px){
  body{font-size:14px}
  header{padding:0 14px}.hdr{height:50px}
  .logo-icon{width:28px;height:28px}.logo-txt{font-size:1.05rem}
  .pill{padding:6px 11px;font-size:.72rem}
  .scr{padding:12px 14px 80px}
  .a-tm img{width:42px;height:42px}.a-sn{width:38px;height:44px;font-size:1.15rem}
  .bet-cards{gap:8px}.bc-pick{font-size:1.3rem}.bc-pct{font-size:1rem}
  .lg-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header><div class="hdr">
  <div class="logo">
    <div class="logo-icon">рҹҸҖ</div>
    <span class="logo-txt">Basket<b>Pro</b></span>
    <span class="logo-v">AI</span>
  </div>
  <div class="pills">
    <button class="pill" onclick="goD(-1,this)">Ieri</button>
    <button class="pill on" onclick="goD(0,this)">Oggi</button>
    <button class="pill" onclick="goD(1,this)">Dom</button>
    <button class="pill" onclick="goD(2,this)">+2</button>
  </div>
  <div class="sts"><span id="rC">0</span> <span class="sdot ld" id="sD"></span> <span id="sT">вҖҰ</span></div>
</div></header>

<div class="scr on" id="s-leagues"><div class="W">
  <div class="topbar"><h2>Campionati</h2><span class="cnt" id="lC"></span></div>
  <div id="lL"><div class="empty"><div class="spin"></div></div></div>
</div></div>

<div class="scr" id="s-matches"><div class="W">
  <div class="topbar"><button class="back" onclick="go('leagues')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>Indietro</button><span class="cnt" id="mC"></span></div>
  <div class="m-title" id="mT"></div>
  <div class="m-grid" id="mL"></div>
</div></div>

<div class="scr" id="s-analysis"><div class="W">
  <div class="topbar"><button class="back" onclick="go('matches')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>Partite</button></div>
  <div id="aB"><div class="empty"><div class="spin"></div></div></div>
</div></div>

<script>
const WK='https://basketproai.lucalagan.workers.dev';
const FB='https://basketpro-1a28b-default-rtdb.europe-west1.firebasedatabase.app';
const FL={'USA':'рҹҮәрҹҮё','Italy':'рҹҮ®рҹҮ№','Spain':'рҹҮӘрҹҮё','France':'рҹҮ«рҹҮ·','Germany':'рҹҮ©рҹҮӘ','Greece':'рҹҮ¬рҹҮ·','Turkey':'рҹҮ№рҹҮ·','Australia':'рҹҮҰрҹҮә','China':'рҹҮЁрҹҮі','Japan':'рҹҮҜрҹҮө','Korea':'рҹҮ°рҹҮ·','South Korea':'рҹҮ°рҹҮ·','Israel':'рҹҮ®рҹҮұ','Argentina':'рҹҮҰрҹҮ·','Brazil':'рҹҮ§рҹҮ·','Serbia':'рҹҮ·рҹҮё','Lithuania':'рҹҮұрҹҮ№','Philippines':'рҹҮөрҹҮӯ','Russia':'рҹҮ·рҹҮә','Croatia':'рҹҮӯрҹҮ·','Slovenia':'рҹҮёрҹҮ®','Poland':'рҹҮөрҹҮұ','Czech Republic':'рҹҮЁрҹҮҝ','Belgium':'рҹҮ§рҹҮӘ','Netherlands':'рҹҮірҹҮұ','Portugal':'рҹҮөрҹҮ№','Finland':'рҹҮ«рҹҮ®','Sweden':'рҹҮёрҹҮӘ','Denmark':'рҹҮ©рҹҮ°','Romania':'рҹҮ·рҹҮҙ','Hungary':'рҹҮӯрҹҮә','Bulgaria':'рҹҮ§рҹҮ¬','Latvia':'рҹҮұрҹҮ»','Estonia':'рҹҮӘрҹҮӘ','Georgia':'рҹҮ¬рҹҮӘ','Mexico':'рҹҮІрҹҮҪ','Canada':'рҹҮЁрҹҮҰ','Chile':'рҹҮЁрҹҮұ','Uruguay':'рҹҮәрҹҮҫ','Venezuela':'рҹҮ»рҹҮӘ','Colombia':'рҹҮЁрҹҮҙ','United Kingdom':'рҹҮ¬рҹҮ§','Iran':'рҹҮ®рҹҮ·','Lebanon':'рҹҮұрҹҮ§','New Zealand':'рҹҮірҹҮҝ','Kazakhstan':'рҹҮ°рҹҮҝ','Belarus':'рҹҮ§рҹҮҫ','Europe':'рҹҮӘрҹҮә','Euroleague':'рҹҢҚ','World':'рҹҢҚ','International':'рҹҢҗ'};
let ALL=[],off=0,reqs=0;
const $={g:{},s:{},st:{},o:{}};
const ds=o=>{const d=new Date;d.setDate(d.getDate()+o);return d.toISOString().split('T')[0]};
const cl=(a,v,b)=>Math.max(a,Math.min(b,v));
const fm=(v,d=1)=>v!=null&&!isNaN(v)?Number(v).toFixed(d):'вҖ”';
const fg=c=>FL[c]||'рҹҸҖ';
const sn=n=>n.length>15?n.split(' ').pop():n;
function ss(s,m){document.getElementById('sD').className='sdot '+s;document.getElementById('sT').textContent=m}

async function gG(l,s,t){const k=`${l}_${s}_${t}`;if($.g[k])return $.g[k];try{const r=await api('/games',{league:l,season:s,team:t});$.g[k]=r;return r}catch{$.g[k]=[];return[]}}
async function gS(l,s,t){const k=`${l}_${s}_${t}`;if($.s[k]!==undefined)return $.s[k];try{const r=await api('/statistics',{league:l,season:s,team:t});$.s[k]=r[0]||null;return $.s[k]}catch{$.s[k]=null;return null}}
async function gSt(l,s){const k=`${l}_${s}`;if($.st[k])return $.st[k];try{const r=await api('/standings',{league:l,season:s});$.st[k]=r?.[0]||r||[];return $.st[k]}catch{$.st[k]=[];return[]}}
async function gO(g){if($.o[g]!==undefined)return $.o[g];try{const r=await api('/odds',{game:g});$.o[g]=r||[];return $.o[g]}catch{$.o[g]=[];return[]}}
async function askAI(p){try{const r=await fetch(WK+'/api/groq',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p})});return(await r.json()).text||null}catch{return null}}

async function load(){
  ss('ld','вҖҰ');document.getElementById('lL').innerHTML='<div class="empty"><div class="spin"></div></div>';
  try{ALL=await api('/games',{date:ds(off),timezone:'Europe/Rome'});ss('ok','OK');
    if(!ALL.length){document.getElementById('lL').innerHTML='<div class="empty"><div class="ico">рҹ“ӯ</div><p>Nessuna partita per questa data</p></div>';document.getElementById('lC').textContent='';return}
    renderL();}catch(e){ss('er','!');document.getElementById('lL').innerHTML=`<div class="empty"><div class="ico">вҡ пёҸ</div><p>${e.message}</p><button class="retry" onclick="load()">Riprova</button></div>`}
}
function renderL(){
  const m=new Map();ALL.forEach(g=>{const id=g.league.id,c=g.country?.name||'Altro';if(!m.has(id))m.set(id,{id,name:g.league.name,country:c,count:0});m.get(id).count++});
  const ls=[...m.values()],bc={};ls.forEach(l=>{if(!bc[l.country])bc[l.country]=[];bc[l.country].push(l)});
  const cs=Object.keys(bc).sort();cs.forEach(c=>bc[c].sort((a,b)=>a.name.localeCompare(b.name)));
  document.getElementById('lC').textContent=ls.length+' campionati';
  let h='',di=0;cs.forEach(c=>{
    h+=`<div class="country" style="animation-delay:${di*.03}s"><div class="country-hd"><span class="country-flag">${fg(c)}</span><span class="country-name">${c}</span><span class="country-line"></span></div><div class="lg-grid">`;
    bc[c].forEach(l=>{h+=`<div class="lg-card" onclick="openL(${l.id})"><div class="lg-name">${l.name}</div><span class="lg-count">${l.count}</span></div>`;di++});
    h+=`</div></div>`});
  document.getElementById('lL').innerHTML=h;
}

  const gs=ALL.filter(g=>g.league.id===lid),i=gs[0];
  document.getElementById('mT').textContent=(i?.country?.name?fg(i.country.name)+' ':'')+i?.league?.name;

  gs.sort((a,b)=>(ord[a.status.short]??1)-(ord[b.status.short]??1)||new Date(a.date)-new Date(b.date));

// в•җв•җв•җ ANALYSIS в•җв•җв•җ
async function openM(gid){
  go('analysis');const el=document.getElementById('aB');
  el.innerHTML='<div class="empty"><div class="spin"></div><p>Analisi in corsoвҖҰ</p></div>';
  const g=ALL.find(x=>x.id===gid);if(!g)return;
  const lid=g.league.id,hid=g.teams.home.id,aid=g.teams.away.id;
  let szn=g.league?.season||g.season;if(!szn){const y=new Date(g.date).getFullYear();szn=(y-1)+'-'+y}
  let hG=[],aG=[],hS=null,aS=null,stand=[],odds=[];
  try{[hG,aG,hS,aS,stand,odds]=await Promise.all([gG(lid,szn,hid),gG(lid,szn,aid),gS(lid,szn,hid),gS(lid,szn,aid),gSt(lid,szn),gO(gid)])}catch{}
  if(!hG.length&&!aG.length){const alts=[];if(typeof szn==='string'&&szn.includes('-'))alts.push(szn.split('-')[0]);else{const y=parseInt(szn);alts.push(y+'-'+(y+1),(y-1)+'-'+y)}
    for(const a of alts){const[h2,a2]=await Promise.all([gG(lid,a,hid),gG(lid,a,aid)]);if(h2.length||a2.length){hG=h2;aG=a2;szn=a;[hS,aS,stand]=await Promise.all([gS(lid,a,hid),gS(lid,a,aid),gSt(lid,a)]);break}}}
  const hD=anG(hG,hid),aD=anG(aG,aid);
  if(!hD||hD.N<5||!aD||aD.N<5){el.innerHTML=`<div class="a-hero"><div class="a-league">${g.league.name}</div><div style="font-size:1.1rem;font-weight:900;text-align:center">${g.teams.home.name} vs ${g.teams.away.name}</div></div><div class="warn">вҡ пёҸ Dati insufficienti (${hD?.N||0} + ${aD?.N||0} partite, minimo 5)</div>`;return}
  const allG=[...new Map([...hG,...aG].map(x=>[x.id,x])).values()];
  const R=pred(hD,aD,hS,aS,stand,odds,bElo(allG),g);
  renderA(g,R,el,'ai'+gid);
  askAI(`Analizza ${g.teams.home.name} vs ${g.teams.away.name} (${g.league.name}). Casa: ${hD.N}g ${fm(hD.wp*100,0)}%W PPG ${fm(hD.ppg)} ult10 ${fm(hD.rP)}. Ospite: ${aD.N}g ${fm(aD.wp*100,0)}%W PPG ${fm(aD.ppg)} ult10 ${fm(aD.rP)}. Elo ${Math.round(R.hE)} vs ${Math.round(R.aE)}. Net ${fm(hD.net)} vs ${fm(aD.net)}. Forma ${hD.form.join('')} vs ${aD.form.join('')}. Dammi un pronostico chiaro.`).then(t=>{const e=document.getElementById('ai'+gid);if(e)e.innerHTML=t||'Non disponibile.'});
}

// в•җв•җв•җ ENGINE v2 STABLE в•җв•җв•җ
function anG(games,tid){
  const fin=games.filter(g=>['FT','AOT'].includes(g.status?.short)&&g.scores?.home?.total!=null).sort((a,b)=>new Date(a.date)-new Date(b.date)||(a.id-b.id));
  if(!fin.length)return null;
  let tP=0,tO=0,w=0,hW=0,hN=0,aW=0,aN=0;const mg=[],tt=[];
  fin.forEach(g=>{const isH=g.teams.home.id===tid,my=isH?g.scores.home.total:g.scores.away.total,op=isH?g.scores.away.total:g.scores.home.total;tP+=my;tO+=op;mg.push(my-op);tt.push(my+op);if(my>op)w++;if(isH){hN++;if(my>op)hW++}else{aN++;if(my>op)aW++}});
  const f6=fin.slice(-6).reverse().map(g=>{const isH=g.teams.home.id===tid,my=isH?g.scores.home.total:g.scores.away.total,op=isH?g.scores.away.total:g.scores.home.total;return my>op?'W':'L'});
  const l10=fin.slice(-10);let r10=0,r10o=0;l10.forEach(g=>{const isH=g.teams.home.id===tid;r10+=(isH?g.scores.home.total:g.scores.away.total);r10o+=(isH?g.scores.away.total:g.scores.home.total)});
  // PPG casa e trasferta separati
  let hPts=0,hOpp=0,hCnt=0,aPts=0,aOpp=0,aCnt=0;
  fin.forEach(g=>{const isH=g.teams.home.id===tid,my=isH?g.scores.home.total:g.scores.away.total,op=isH?g.scores.away.total:g.scores.home.total;if(isH){hPts+=my;hOpp+=op;hCnt++}else{aPts+=my;aOpp+=op;aCnt++}});
  const N=fin.length,ppg=tP/N,opg=tO/N,mm=mg.reduce((s,x)=>s+x,0)/N;
  let str=0;if(f6.length){const f=f6[0];for(const r of f6){if(r===f)str++;else break}if(f==='L')str=-str}
  return{ppg,opg,rP:r10/l10.length,rO:r10o/l10.length,wp:w/N,hWP:hN>=3?hW/hN:w/N,aWP:aN>=3?aW/aN:w/N,net:ppg-opg,avgT:tt.reduce((s,x)=>s+x,0)/N,hPpg:hCnt?hPts/hCnt:ppg,hOpg:hCnt?hOpp/hCnt:opg,aPpg:aCnt?aPts/aCnt:ppg,aOpg:aCnt?aOpp/aCnt:opg,std:Math.sqrt(mg.reduce((s,x)=>s+(x-mm)*(x-mm),0)/N),form:f6,streak:str,N,w}
}
function h2h(t,o){const all=Object.values($.g).flat();const m=all.filter(g=>['FT','AOT'].includes(g.status?.short)&&((g.teams.home.id===t&&g.teams.away.id===o)||(g.teams.home.id===o&&g.teams.away.id===t)));let w=0;m.forEach(g=>{const h=g.teams.home.id===t,my=h?g.scores.home.total:g.scores.away.total,op=h?g.scores.away.total:g.scores.home.total;if(my>op)w++});return{w,n:m.length}}
function bElo(games){const elo={},K=20;games.filter(g=>['FT','AOT'].includes(g.status?.short)&&g.scores?.home?.total!=null).sort((a,b)=>new Date(a.date)-new Date(b.date)||(a.id-b.id)).forEach(g=>{const h=g.teams.home.id,a=g.teams.away.id;if(!elo[h])elo[h]=1500;if(!elo[a])elo[a]=1500;const hs=g.scores.home.total,as=g.scores.away.total,exp=1/(1+Math.pow(10,-(elo[h]+75-elo[a])/400)),res=hs>as?1:hs<as?0:.5,mov=Math.log(Math.abs(hs-as)+1)*2.2/(Math.abs(elo[h]+75-elo[a])*.001+2.2),adj=K*mov*(res-exp);elo[h]+=adj;elo[a]-=adj});return elo}

function pred(hD,aD,hS,aS,stand,odds,elo,game){
  const hid=game.teams.home.id,aid=game.teams.away.id;
  const hE=elo[hid]||1500,aE=elo[aid]||1500;
  // 4 modelli
  const m1=1/(1+Math.pow(10,-(hE-aE+75)/400))*100;
  const hwp=cl(.15,hD.hWP,.90),awp=cl(.10,aD.aWP,.85);
  const m2=(hwp*(1-awp))/(hwp*(1-awp)+(1-hwp)*awp)*100;
  const m3=100/(1+Math.pow(10,-(hD.net-aD.net+3)/12));
  const hFW=hD.form.length?hD.form.filter(x=>x==='W').length/hD.form.length:.5;
  const aFW=aD.form.length?aD.form.filter(x=>x==='W').length/aD.form.length:.5;
  let m4=50+(hFW-aFW)*25+cl(-3,(hD.streak-aD.streak)*.8,3);m4=cl(25,m4,75);
  let hP=m1*.35+m2*.25+m3*.25+m4*.15;
  const hh=h2h(hid,aid);if(hh.n>=3)hP+=(hh.w/hh.n-.5)*5;
  const flat=Array.isArray(stand)?stand.flat?.(2)??stand:[];
  const hSt=flat.find(s=>s?.team?.id===hid),aSt=flat.find(s=>s?.team?.id===aid);
  if(hSt?.position&&aSt?.position)hP+=cl(-2,(aSt.position-hSt.position)*.12,2);
  hP=Math.round(cl(30,hP,70));const aP=100-hP;

  // Score
  const fH=Math.round((hD.rP*.6+hD.ppg*.4)*.55+(aD.rO*.6+aD.opg*.4)*.45+1.5);
  const fA=Math.round((aD.rP*.6+aD.ppg*.4)*.55+(hD.rO*.6+hD.opg*.4)*.45-1.5);
  const pT=fH+fA,sp=fH-fA;

  // O/U
  const avgT=(hD.avgT+aD.avgT)/2,mL=Math.round(avgT/5)*5;
  const oP=Math.round(cl(15,100/(1+Math.pow(10,-(pT-mL)/15))*100,85));

  // Multigol Casa/Ospite
  const overH=cl(20,Math.round(100/(1+Math.pow(10,-(fH-hD.ppg*.95)/8))*100),80);
  const overA=cl(20,Math.round(100/(1+Math.pow(10,-(fA-aD.ppg*.95)/8))*100),80);
  const mgH=fH>=hD.ppg?`Over ${Math.round(hD.ppg-3)}.5`:`Under ${Math.round(hD.ppg+2)}.5`;
  const mgA=fA>=aD.ppg?`Over ${Math.round(aD.ppg-3)}.5`:`Under ${Math.round(aD.ppg+2)}.5`;
  const mgHP=fH>=hD.ppg?overH:100-overH;
  const mgAP=fA>=aD.ppg?overA:100-overA;

  // Handicap
  const hcL=Math.max(1.5,Math.round(Math.abs(sp)*2)/2);
  const hcT=sp>=0?game.teams.home.name:game.teams.away.name;
  const hcC=cl(40,50+Math.abs(sp)*2,72);

  // Concordance
  const sv=p=>p>55?'H':p<45?'A':'X',sides=[sv(m1),sv(m2),sv(m3),sv(m4)];
  const conc=Math.max(sides.filter(x=>x==='H').length,sides.filter(x=>x==='A').length);
  const conf=cl(25,Math.round(80-(Math.max(m1,m2,m3,m4)-Math.min(m1,m2,m3,m4))*.5+(conc>=3?10:0)),82);
  const confL=conf>=65?'Alta':conf>=45?'Media':'Bassa';

  // Odds
  let bkH=null,bkA=null,value=null;
  if(odds?.length){odds.forEach(o=>{(o.bookmakers||[]).forEach(b=>{(b.bets||[]).forEach(bt=>{if(bt.name==='Home/Away'||bt.name==='Match Winner')(bt.values||[]).forEach(v=>{if(v.value==='Home'&&!bkH)bkH=parseFloat(v.odd);if(v.value==='Away'&&!bkA)bkA=parseFloat(v.odd)})})})});
    if(bkH&&bkA){const iH=1/bkH*100,iA=1/bkA*100,eH=hP-iH,eA=aP-iA;if(eH>5)value={e:eH,p:hP,bp:iH,o:bkH,t:game.teams.home.name};else if(eA>5)value={e:eA,p:aP,bp:iA,o:bkA,t:game.teams.away.name}}}

  const fav=hP>=50?game.teams.home.name:game.teams.away.name,favP=Math.max(hP,aP);
  const pick=hP>=50?'1':'2';
  const ouPick=oP>55?'OVER':'UNDER';
  const ouL=[];for(let x=-10;x<=10;x+=5){const l=mL+x;if(l<80||l>400)continue;ouL.push({l,o:Math.round(cl(10,100/(1+Math.pow(10,-(pT-l)/15))*100,90)),m:x===0})}

  // Reasons
  const reas=[];
  if(Math.abs(hE-aE)>80)reas.push(`Elo ${Math.round(hE)} vs ${Math.round(aE)}: ${hE>aE?game.teams.home.name:game.teams.away.name} nettamente superiore`);
  else reas.push(`Elo equilibrato (${Math.round(hE)} vs ${Math.round(aE)})`);
  if(Math.abs(hD.net-aD.net)>3)reas.push(`Net rating ${fav} +${fm(Math.abs(hD.net-aD.net),1)} punti/partita`);
  reas.push(`Forma: ${game.teams.home.name} ${(hFW*100).toFixed(0)}%W, ${game.teams.away.name} ${(aFW*100).toFixed(0)}%W`);
  if(hh.n>=2)reas.push(`H2H: ${hh.n} scontri, ${game.teams.home.name} ${hh.w}V`);

  return{hP,aP,fH,fA,pT,sp,m1:Math.round(m1*10)/10,m2:Math.round(m2*10)/10,m3:Math.round(m3*10)/10,m4:Math.round(m4*10)/10,conc,conf,confL,mL,oP,ouL,ouPick,hD,aD,hE,aE,fav,favP,bkH,bkA,value,pick,hcT,hcL,hcC,reas,hh,hFW,aFW,mgH,mgA,mgHP,mgAP}
}

        ${Math.abs(R.oP-50)>8?'<span class="bc-rec">CONSIGLIATO</span>':''}
        <div class="bc-hd"><div class="bc-icon ou">рҹ“Ҳ</div><span class="bc-label">Over/Under ${R.mL}</span></div>
        <div class="bc-pick" style="color:${R.oP>55?'var(--green)':'var(--blue)'}">${R.ouPick}</div>
        <div class="bc-pct" style="color:${R.oP>55?'var(--green)':'var(--blue)'}">O ${R.oP}% В· U ${100-R.oP}%</div>
        <div class="bc-reason">Totale previsto ${R.pT} punti. Media storica ${Math.round((R.hD.avgT+R.aD.avgT)/2)}</div>
      </div>

      <!-- CARD 3: Multigol Casa/Ospite -->
      <div class="bet-card">
        <div class="bc-hd"><div class="bc-icon mg">рҹҺҜ</div><span class="bc-label">Punti squadra</span></div>
        <div style="margin-bottom:8px">
          <div style="font-size:.9rem;font-weight:800;color:var(--blue)">${sn(hn)}: ${R.mgH}</div>
          <div style="font-size:.85rem;color:var(--w3)">${R.mgHP}% confidenza</div>
        </div>
        <div>
          <div style="font-size:.9rem;font-weight:800;color:var(--blue)">${sn(an)}: ${R.mgA}</div>
          <div style="font-size:.85rem;color:var(--w3)">${R.mgAP}% confidenza</div>
        </div>
      </div>

      <!-- CARD 4: Handicap -->
      <div class="bet-card${R.hcC>=58?' best':''}">
        ${R.hcC>=58?'<span class="bc-rec">CONSIGLIATO</span>':''}
        <div class="bc-hd"><div class="bc-icon hc">вҡ–пёҸ</div><span class="bc-label">Handicap</span></div>
        <div class="bc-pick" style="color:var(--violet)">${sn(R.hcT)} -${R.hcL}</div>
        <div class="bc-pct" style="color:var(--violet)">${R.hcC}%</div>
        <div class="bc-reason">Spread previsto: ${R.sp>0?'+':''}${R.sp} punti</div>
      </div>
    </div>

    <div class="pred"><div class="pred-box"><div class="pred-lbl">рҹҸҖ Risultato Previsto</div><div class="pred-val">${R.fH} <span style="color:var(--w4)">вҖ“</span> ${R.fA}</div><div class="pred-sub">Totale: ${R.pT} В· Spread: ${R.sp>0?'+':''}${R.sp}</div></div></div>

    ${R.value?`<div class="val-card yes"><div class="val-tag" style="color:var(--green)">рҹ’° VALUE BET TROVATA</div><div class="val-main" style="color:var(--green)">${R.value.t} @${R.value.o}</div><div class="val-sub">Nostra: ${fm(R.value.p,1)}% В· Book: ${fm(R.value.bp,1)}% В· Edge: +${fm(R.value.e,1)}%</div></div>`:''}

    <div class="ai"><div class="ai-hd"><div class="ai-icon">рҹӨ–</div><span class="ai-name">Analisi AI</span><span class="ai-badge">Groq LLM</span></div><div class="ai-txt" id="${aiId}"><em style="color:var(--w4)">Analisi in corsoвҖҰ</em></div></div>

    <div class="sec"><button class="sec-btn" onclick="tS(this)">рҹ“Ҳ Over/Under dettaglio <span class="sec-arr">в–ј</span></button><div class="sec-body"><div class="sec-inner"><div class="ou-grid">${R.ouL.map(x=>`<div class="ou-item${x.m?' main':''}"><div class="ou-val" style="color:${x.o>55?'var(--green)':x.o<45?'var(--blue)':'var(--w3)'}">O/U ${x.l}</div><div class="ou-lbl">Over ${x.o}% В· Under ${100-x.o}%</div></div>`).join('')}</div></div></div></div>

    <div class="sec"><button class="sec-btn" onclick="tS(this)">рҹ”¬ 4 Modelli indipendenti <span class="sec-arr">в–ј</span></button><div class="sec-body"><div class="sec-inner"><div class="mod-grid">
      <div class="mod"><div class="mod-name">Elo 35%</div><div class="mod-val" style="color:${R.m1>55?'var(--teal)':R.m1<45?'var(--blue)':'var(--w3)'}">${fm(R.m1,1)}%</div></div>
      <div class="mod"><div class="mod-name">Log5 25%</div><div class="mod-val" style="color:${R.m2>55?'var(--teal)':R.m2<45?'var(--blue)':'var(--w3)'}">${fm(R.m2,1)}%</div></div>
      <div class="mod"><div class="mod-name">Efficiency 25%</div><div class="mod-val" style="color:${R.m3>55?'var(--teal)':R.m3<45?'var(--blue)':'var(--w3)'}">${fm(R.m3,1)}%</div></div>
      <div class="mod"><div class="mod-name">Forma 15%</div><div class="mod-val" style="color:${R.m4>55?'var(--teal)':R.m4<45?'var(--blue)':'var(--w3)'}">${fm(R.m4,1)}%</div></div>
    </div><div style="text-align:center;font-size:.75rem;color:var(--w4);margin-top:8px">Concordanza: ${R.conc}/4 modelli В· Confidenza: ${R.conf}% (${R.confL})</div></div></div></div>

    <div class="sec"><button class="sec-btn" onclick="tS(this)">рҹ“Ҡ Statistiche a confronto <span class="sec-arr">в–ј</span></button><div class="sec-body"><div class="sec-inner"><div style="display:flex;justify-content:space-between;font-size:.7rem;font-weight:800;padding:0 8px;margin-bottom:4px"><span style="color:var(--teal)">${sn(hn)}</span><span style="color:var(--blue)">${sn(an)}</span></div>${stH}</div></div></div>

    <div class="sec"><button class="sec-btn" onclick="tS(this)">рҹ”Ҙ Forma recente <span class="sec-arr">в–ј</span></button><div class="sec-body"><div class="sec-inner">
      <div class="fm-row"><span class="fm-name" style="color:var(--teal)">${sn(hn)}</span><div style="display:flex;gap:3px">${fD(R.hD.form)}</div><span class="fm-pct">${(R.hFW*100).toFixed(0)}%</span></div>
      <div class="fm-row"><span class="fm-name" style="color:var(--blue)">${sn(an)}</span><div style="display:flex;gap:3px">${fD(R.aD.form)}</div><span class="fm-pct">${(R.aFW*100).toFixed(0)}%</span></div>
      ${R.hh.n?`<div style="font-size:.8rem;color:var(--w3);margin-top:6px">H2H: ${R.hh.n} scontri В· ${sn(hn)} ${R.hh.w}V</div>`:''}</div></div></div>

    <button class="save-btn" id="sBtn" onclick="saveP(${g.id})">вӯҗ Salva pronostico</button>`;
}
function tS(b){const body=b.nextElementSibling;body.classList.toggle('open');const arr=b.querySelector('.sec-arr');if(arr)arr.classList.toggle('open')}

// в•җв•җв•җ SAVE вҖ” Direct Firebase в•җв•җв•җ
async function saveP(gid){
  const btn=document.getElementById('sBtn');btn.disabled=true;btn.textContent='SalvataggioвҖҰ';
  const g=ALL.find(x=>x.id===gid);if(!g){btn.textContent='вқҢ';return}
  const lid=g.league.id,szn=g.league?.season||g.season||'2024-2025',hid=g.teams.home.id,aid=g.teams.away.id;
  const hG=$.g[`${lid}_${szn}_${hid}`]||[],aG=$.g[`${lid}_${szn}_${aid}`]||[];
  const hD=anG(hG,hid),aD=anG(aG,aid);if(!hD||!aD){btn.textContent='вқҢ';return}
  const R=pred(hD,aD,$.s[`${lid}_${szn}_${hid}`],$.s[`${lid}_${szn}_${aid}`],$.st[`${lid}_${szn}`]||[],$.o[gid]||[],bElo([...new Map([...hG,...aG].map(x=>[x.id,x])).values()]),g);
  const data={gameId:gid,match:`${g.teams.home.name} vs ${g.teams.away.name}`,league:g.league.name,date:g.date,pick:R.pick,fav:R.fav,hP:R.hP,aP:R.aP,score:`${R.fH}-${R.fA}`,hcap:`${R.hcT} -${R.hcL}`,ou:`${R.ouPick} ${R.mL}`,conf:R.conf,ts:new Date().toISOString()};
  try{
    const r=await fetch(FB+'/basketpro_picks.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    if(!r.ok)throw Error(r.status);
    btn.textContent='вң… Salvato!';btn.classList.add('done');
  }catch(e){btn.textContent='вқҢ '+e.message;setTimeout(()=>{btn.disabled=false;btn.textContent='вӯҗ Salva pronostico';btn.classList.remove('done')},3000)}
}
function goD(o,e){off=o;document.querySelectorAll('.pill').forEach(b=>b.classList.remove('on'));e.classList.add('on');go('leagues');load()}
document.addEventListener('DOMContentLoaded',load);
</script>
</body>
