<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BasketPro v4 — Basketball Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--bg2:#11141c;--bg3:#171b27;--bg4:#1d2233;--brd:rgba(255,255,255,0.06);--t:#f0f2f7;--tg:#8b90a5;--td:#555a72;--fire:#ff6b2c;--ora:#ff8c42;--gold:#fbbf24;--grn:#10b981;--red:#ef4444;--cyan:#06b6d4;--pur:#a78bfa;--blu:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:350px;background:radial-gradient(ellipse at 50% -20%,rgba(255,107,44,.07),transparent 70%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--fire);border-radius:4px}
.mono{font-family:'JetBrains Mono',monospace}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(10,12,16,.85);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd)}
.logo{font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,var(--fire),var(--ora),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo sup{font-size:.55rem;font-weight:600;-webkit-text-fill-color:var(--gold)}
.hdr-r{display:flex;gap:6px;align-items:center}
.hbtn{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:6px 10px;font-size:.68rem;font-weight:600;color:var(--tg);cursor:pointer;font-family:inherit;transition:.2s}
.hbtn:hover{border-color:var(--fire);color:var(--fire)}

/* DATE TABS */
.dtabs{display:flex;gap:5px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.dtabs::-webkit-scrollbar{display:none}
.dt{flex-shrink:0;padding:8px 14px;border-radius:10px;font-size:.75rem;font-weight:700;background:var(--bg2);border:1px solid var(--brd);color:var(--tg);cursor:pointer;transition:.2s}
.dt.a{background:linear-gradient(135deg,var(--fire),var(--ora));color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(255,107,44,.25)}

.wrap{max-width:540px;margin:0 auto;padding:0 10px 100px;position:relative;z-index:1}

/* LEAGUE LIST */
.lg{margin-bottom:6px}
.lh{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--bg2);border:1px solid var(--brd);border-radius:12px;cursor:pointer;transition:.2s}
.lh:hover{border-color:var(--fire)}
.lh.open{border-color:var(--fire);background:rgba(255,107,44,.03);border-radius:12px 12px 0 0}
.lh img{width:26px;height:26px;border-radius:5px;object-fit:contain;flex-shrink:0}
.lh .ln{flex:1;min-width:0;font-size:.84rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lh .lc{font-size:.65rem;color:var(--td);display:block}
.lh .cnt{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:800;color:var(--fire);background:rgba(255,107,44,.08);padding:3px 9px;border-radius:7px;flex-shrink:0}
.lh .arr{font-size:.65rem;color:var(--td);transition:transform .3s;flex-shrink:0}
.lh.open .arr{transform:rotate(90deg);color:var(--fire)}
.mc{border:1px solid var(--brd);border-top:none;border-radius:0 0 12px 12px;overflow:hidden;margin-bottom:4px}
.mi{display:flex;align-items:center;padding:9px 11px;background:var(--bg3);border-bottom:1px solid var(--brd);cursor:pointer;transition:.15s;gap:7px}
.mi:last-child{border-bottom:none}
.mi:hover{background:rgba(255,107,44,.03)}
.mi-t{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700;color:var(--td);min-width:38px;text-align:center;flex-shrink:0}
.mi-t.live{color:var(--red);animation:pulse 1.5s infinite}
.mi-t.ft{color:var(--grn)}
.mi-teams{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.mi-tm{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:600}
.mi-tm img{width:16px;height:16px;border-radius:2px;flex-shrink:0;object-fit:contain}
.mi-tm .n{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mi-tm .s{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:800;min-width:20px;text-align:right}
.mi-tm .s.w{color:var(--grn)}
.mi-pl{font-size:.58rem;color:var(--td);padding-left:22px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-arr{font-size:.55rem;color:var(--td);flex-shrink:0}

/* ANALYSIS PAGE — SINGLE SCROLL (like BettingPro) */
.back{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;font-size:.8rem;font-weight:700;color:var(--fire);cursor:pointer;margin-bottom:10px;border-radius:10px;transition:.2s}
.back:hover{background:rgba(255,107,44,.06)}

/* HERO */
.hero{background:linear-gradient(135deg,rgba(255,107,44,.06),rgba(255,140,66,.03));border:1px solid rgba(255,107,44,.12);border-radius:18px;padding:22px 14px;text-align:center;position:relative;overflow:hidden;margin-bottom:14px}
.hero-teams{display:flex;justify-content:center;align-items:center;gap:18px;margin-bottom:14px}
.hero-team{display:flex;flex-direction:column;align-items:center;gap:6px}
.hero-team img{width:50px;height:50px;border-radius:10px;object-fit:contain;filter:drop-shadow(0 3px 6px rgba(0,0,0,.3))}
.hero-team-name{font-size:.78rem;font-weight:700;max-width:100px;text-align:center;line-height:1.2}
.hero-vs{font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:800;color:var(--td);padding:7px;border-radius:10px;background:var(--bg2)}
.hero-score{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--fire),var(--ora));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:.68rem;color:var(--td);margin-top:8px}

/* SECTION PANELS (like BettingPro) */
.sec{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.sec::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sec.fire::before{background:linear-gradient(90deg,var(--fire),var(--ora))}
.sec.green::before{background:linear-gradient(90deg,var(--grn),var(--cyan))}
.sec.cyan::before{background:linear-gradient(90deg,var(--cyan),var(--blu))}
.sec.purple::before{background:linear-gradient(90deg,var(--pur),var(--blu))}
.sec.gold::before{background:linear-gradient(90deg,var(--gold),var(--ora))}
.stitle{font-size:.88rem;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* AI VERDICT (like Consiglio AI in BettingPro) */
.verdict{background:linear-gradient(135deg,rgba(255,107,44,.05),rgba(16,185,129,.03));border:2px solid rgba(255,107,44,.18);border-radius:18px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.verdict::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--fire),var(--ora),var(--grn))}
.v-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.v-badge.alta{background:rgba(16,185,129,.12);color:var(--grn)}
.v-badge.media{background:rgba(251,191,36,.12);color:var(--gold)}
.v-badge.bassa{background:rgba(239,68,68,.12);color:var(--red)}
.v-pick{font-size:1.4rem;font-weight:900;margin:10px 0 4px}
.v-prob{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:800;color:var(--grn)}
.v-why{margin-top:12px;padding:10px 12px;background:rgba(255,255,255,.02);border:1px solid var(--brd);border-radius:10px}
.v-why-title{font-size:.65rem;font-weight:700;color:var(--td);text-transform:uppercase;margin-bottom:6px}
.v-reason{font-size:.72rem;color:var(--tg);line-height:1.5}
.v-alt{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.v-alt-item{padding:5px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--brd);font-size:.68rem;font-weight:600;cursor:pointer;transition:.2s}
.v-alt-item:hover{border-color:var(--fire)}

/* PROBABILITY BARS (like BettingPro 1X2) */
.pbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pbar-lbl{width:80px;font-size:.72rem;font-weight:600;color:var(--tg);flex-shrink:0}
.pbar-wrap{flex:1;height:26px;background:var(--bg4);border-radius:7px;overflow:hidden;position:relative}
.pbar{height:100%;border-radius:7px;transition:width .6s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:800;color:#fff;min-width:35px}
.pbar.home{background:linear-gradient(90deg,var(--fire),var(--ora))}
.pbar.away{background:linear-gradient(90deg,var(--blu),var(--cyan))}
.pbar.draw{background:linear-gradient(90deg,var(--gold),var(--ora))}
.pbar.over{background:linear-gradient(90deg,var(--grn),var(--cyan))}
.pbar.under{background:linear-gradient(90deg,var(--pur),var(--blu))}

/* STAT GRID */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.sbox{background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:10px;text-align:center}
.sbox .l{font-size:.6rem;color:var(--td);text-transform:uppercase;font-weight:600;margin-bottom:3px}
.sbox .v{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:800}
.sbox .sub{font-size:.58rem;color:var(--td);margin-top:2px}

/* TABLE */
.tbl{width:100%;border-collapse:separate;border-spacing:0 2px}
.tbl th{font-size:.6rem;font-weight:700;text-transform:uppercase;color:var(--td);padding:4px 5px;text-align:center}
.tbl td{padding:7px 5px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700;background:var(--bg3)}
.tbl tr td:first-child{border-radius:6px 0 0 6px;color:var(--fire);font-weight:800}
.tbl tr td:last-child{border-radius:0 6px 6px 0}
.tbl .hi{background:rgba(16,185,129,.08);color:var(--grn);font-weight:800}
.tbl .best{background:rgba(255,107,44,.08);color:var(--fire)}

/* PREDICTION CARDS (like BettingPro grid) */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px}
.pc{background:var(--bg3);border:2px solid var(--brd);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.pc:hover{border-color:var(--fire);transform:translateY(-1px)}
.pc.sel{border-color:var(--grn);background:rgba(16,185,129,.06)}
.pc .rank{position:absolute;top:5px;left:5px;width:16px;height:16px;border-radius:50%;font-size:.5rem;font-weight:900;display:flex;align-items:center;justify-content:center}
.pc .rank.r1{background:rgba(255,107,44,.15);color:var(--fire)}
.pc .rank.r2{background:rgba(6,182,212,.12);color:var(--cyan)}
.pc .rank.r3{background:rgba(167,139,250,.12);color:var(--pur)}
.pc .mkt{font-size:.58rem;color:var(--td);text-transform:uppercase;font-weight:600;margin-bottom:3px}
.pc .val{font-size:.92rem;font-weight:800;margin-bottom:5px}
.pc .prob{display:inline-flex;padding:2px 7px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700}
.pc .prob.hi{background:rgba(16,185,129,.12);color:var(--grn)}
.pc .prob.md{background:rgba(251,191,36,.12);color:var(--gold)}
.pc .prob.lo{background:rgba(239,68,68,.12);color:var(--red)}
.pc .odds{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--td);margin-top:2px}
.pc .sigs{display:flex;gap:2px;justify-content:center;margin-top:3px}
.sig{width:5px;height:5px;border-radius:50%}
.sig.on{background:var(--grn)}
.sig.off{background:var(--brd)}

/* PLAYER CARDS */
.plc{background:var(--bg3);border:1px solid var(--brd);border-radius:12px;padding:12px;margin-bottom:7px}
.plc-h{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pos{font-size:.55rem;font-weight:800;padding:2px 6px;border-radius:5px;text-transform:uppercase}
.pos.G{background:rgba(59,130,246,.12);color:var(--blu)}
.pos.F{background:rgba(167,139,250,.12);color:var(--pur)}
.pos.C{background:rgba(255,107,44,.12);color:var(--fire)}
.plc .nm{font-size:.8rem;font-weight:700}
.plc .meta{font-size:.6rem;color:var(--td)}
.plc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.plc-st{text-align:center;padding:4px 2px;background:var(--bg4);border-radius:5px}
.plc-st .sl{font-size:.52rem;color:var(--td);font-weight:600;text-transform:uppercase}
.plc-st .sv{font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:800}
.plc-props{margin-top:8px;padding-top:8px;border-top:1px solid var(--brd)}
.plc-props-t{font-size:.6rem;font-weight:700;color:var(--fire);margin-bottom:5px}
.pp-row{display:flex;flex-wrap:wrap;gap:3px}
.pp{background:var(--bg4);border:1px solid var(--brd);border-radius:6px;padding:4px 7px;font-size:.62rem;display:flex;gap:3px;align-items:center;cursor:pointer;transition:.15s}
.pp:hover{border-color:var(--fire)}
.pp .pt{font-weight:700}.pp .pl{color:var(--td)}.pp .pv{font-family:'JetBrains Mono',monospace;font-weight:800}

/* FORM DOTS */
.form-d{display:flex;gap:2px}
.fd{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:800;color:#fff}
.fd.W{background:var(--grn)}.fd.L{background:var(--red)}

/* HANDICAP BARS */
.hrow{display:grid;grid-template-columns:55px 1fr 1fr;gap:2px;margin-bottom:2px}
.hline{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:800;color:var(--fire);text-align:center;display:flex;align-items:center;justify-content:center}
.hbar{height:28px;border-radius:5px;display:flex;align-items:center;padding:0 7px;font-family:'JetBrains Mono',monospace;font-size:.67rem;font-weight:700;color:#fff;transition:width .5s}

/* MISC */
.empty{text-align:center;padding:35px 18px;color:var(--td);font-size:.82rem}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:7px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.bsbar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:linear-gradient(135deg,var(--fire),var(--ora));padding:12px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -4px 18px rgba(255,107,44,.25);transform:translateY(100%);transition:transform .3s}
.bsbar.vis{transform:translateY(0)}
.dq-bar{height:4px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-top:4px}
.dq-fill{height:100%;border-radius:4px;transition:width .6s}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">🏀 BasketPro <sup>v4</sup></div>
  <div class="hdr-r">
    <button class="hbtn" id="apiC">API: 0</button>
  </div>
</div>
<div id="app" class="wrap"></div>
<div class="bsbar" id="bsBar">
  <div style="color:#fff;font-weight:800;font-size:.85rem" id="bsCnt">0 sel.</div>
  <div class="mono" style="color:#fff;font-weight:900;font-size:1.05rem" id="bsOdds">@1.00</div>
</div>

<script>
const C={KEY:'aeb2864a3d4dbb8395fa53c83a876a93',BASE:'https://v1.basketball.api-sports.io',
  FB:'https://basketpro-1a28b-default-rtdb.europe-west1.firebasedatabase.app',
  TTL:25*60000,HA:3.2,TOP:[12,116,117,120,194,13,15,16,17,18,20,79,93,104,105,106,110,161,162,163,202,206,211,270]};

const S={view:'lg',date:0,leagues:[],matches:[],exp:new Set(),sel:null,an:null,
  bs:[],ld:false,apiN:0,uid:localStorage.getItem('bp_uid')||('bp_'+Math.random().toString(36).slice(2,10)),
  pc:new Map(),tc:new Map(),nc:new Map()};
localStorage.setItem('bp_uid',S.uid);

// === API ===
const cc=new Map();
async function api(ep,p={}){
  const qs=new URLSearchParams(p).toString(),url=`${C.BASE}${ep}${qs?'?'+qs:''}`;
  if(cc.has(url)){const c=cc.get(url);if(Date.now()-c.t<C.TTL)return c.d}
  S.apiN++;document.getElementById('apiC').textContent=`API: ${S.apiN}`;
  const r=await fetch(url,{headers:{'x-apisports-key':C.KEY}});
  if(!r.ok)throw new Error(`${r.status}`);
  const d=await r.json();cc.set(url,{d,t:Date.now()});
  if(cc.size>80){const k=cc.keys().next().value;cc.delete(k)}
  return d;
}
async function apiR(ep,p={},n=2){for(let i=0;i<=n;i++){try{return await api(ep,p)}catch(e){if(i===n)throw e;await new Promise(r=>setTimeout(r,800*(i+1)))}}}
async function fbS(p,d){try{await fetch(`${C.FB}/users/${S.uid}/${p}.json`,{method:'PUT',body:JSON.stringify(d)})}catch{}}
async function fbL(p){try{const r=await fetch(`${C.FB}/users/${S.uid}/${p}.json`);return await r.json()}catch{return null}}

// === UTILS ===
const sf=(v,d=1)=>{const n=parseFloat(v);return isNaN(n)?'0':n.toFixed(d)};
const sp=v=>Math.max(0,Math.min(100,isNaN(v)?50:v));
const cl=(a,v,b)=>Math.max(a,Math.min(b,v));
const esc=s=>s?String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
function ds(o=0){const d=new Date();d.setDate(d.getDate()+o);return d.toISOString().split('T')[0]}
function ftime(d){try{return new Date(d).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}catch{return'--:--'}}
function dlabel(o){if(o===-1)return'Ieri';if(o===0)return'Oggi';if(o===1)return'Domani';const d=new Date();d.setDate(d.getDate()+o);return d.toLocaleDateString('it-IT',{weekday:'short',day:'numeric'})}
function ncdf(x,m,s){const z=(x-m)/s,t=1/(1+.2316419*Math.abs(z)),d=.3989422804,p=d*Math.exp(-z*z/2)*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.3302744))));return z>0?1-p:p}

// === DATA FETCHING ===
async function fetchGames(date){try{const r=await apiR('/games',{date});return r?.response||[]}catch{return[]}}
async function fetchStats(tid,lid,szn){try{const r=await apiR('/statistics',{team:tid,league:lid,season:szn});return r?.response}catch{return null}}
async function fetchH2H(a,b){try{const r=await apiR('/games/h2h',{h2h:`${a}-${b}`,last:10});return r?.response||[]}catch{return[]}}
async function fetchStandings(lid,szn){try{const r=await apiR('/standings',{league:lid,season:szn});return r?.response?.[0]||[]}catch{return[]}}
// FIX: Players — try multiple season formats
async function fetchPlayers(tid,szn){
  const k=`p_${tid}_${szn}`;if(S.pc.has(k))return S.pc.get(k);
  // Try the season as-is first, then try alternative formats
  const formats=[szn];
  if(typeof szn==='string'&&szn.includes('-')){formats.push(szn.split('-')[0])}
  else if(typeof szn==='number'||/^\d{4}$/.test(szn)){formats.push(`${szn}-${parseInt(szn)+1}`)}
  for(const s of formats){
    try{
      const r=await apiR('/players',{team:tid,season:s});
      const d=r?.response||[];
      if(d.length>0){S.pc.set(k,d);return d}
    }catch{}
  }
  S.pc.set(k,[]);return[];
}
async function fetchFinishedGames(tid,lid,szn){
  try{const r=await apiR('/games',{team:tid,league:lid,season:szn});
    return(r?.response||[]).filter(g=>['FT','AOT','AP'].includes(g.status?.short)&&g.scores?.home?.total!=null)
      .sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)).slice(0,12);
  }catch{return[]}
}
async function fetchFinishedAny(tid,szn){
  try{const r=await apiR('/games',{team:tid,season:szn});
    return(r?.response||[]).filter(g=>['FT','AOT','AP'].includes(g.status?.short)&&g.scores?.home?.total!=null)
      .sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)).slice(0,12);
  }catch{return[]}
}

// === DATA PROCESSING ===
function organizeByLeague(games){
  const m=new Map();
  games.forEach(g=>{const id=g.league?.id;if(!id)return;
    if(!m.has(id))m.set(id,{id,name:g.league.name||'?',country:g.country?.name||'',logo:g.league.logo,season:g.league.season,matches:[]});
    m.get(id).matches.push(g)});
  return[...m.values()].sort((a,b)=>{
    const ai=C.TOP.indexOf(a.id),bi=C.TOP.indexOf(b.id);
    if(ai>=0&&bi>=0)return ai-bi;if(ai>=0)return-1;if(bi>=0)return 1;return b.matches.length-a.matches.length});
}

function buildProfile(tid,games,stats){
  const p={ppg:0,opp:0,wp:50,wins:0,played:0,form:'',rpg:null,lavg:0,pace:1,hasData:false,src:'none',gn:0,hRec:'',aRec:''};
  // 1) From actual game results
  if(games?.length>=2){
    let tf=0,ta=0,w=0,n=0,rf=0,rn=0,f='';
    games.forEach((g,i)=>{
      const hs=g.scores?.home?.total,as=g.scores?.away?.total;
      if(hs==null||as==null||(hs===0&&as===0))return;
      const ih=g.teams?.home?.id===tid,my=ih?hs:as,op=ih?as:hs;
      tf+=my;ta+=op;n++;if(my>op)w++;f+=(my>op)?'W':'L';if(i<5){rf+=my;rn++}
    });
    if(n>=2){p.ppg=tf/n;p.opp=ta/n;p.wp=(w/n)*100;p.wins=w;p.played=n;p.form=f;
      p.rpg=rn>0?rf/rn:null;p.hasData=true;p.src='games';p.gn=n}
  }
  // 2) Supplement from season stats
  if(!p.hasData&&stats?.games?.played?.all){
    const g=stats.games,pt=stats.points,pl=g.played.all||1,w2=g.wins?.all?.total||0;
    const ppg=pt?.for?.average?.all?parseFloat(pt.for.average.all):0;
    const opp=pt?.against?.average?.all?parseFloat(pt.against.average.all):0;
    if(ppg>0){p.ppg=ppg;p.opp=opp;p.wp=(w2/pl)*100;p.wins=w2;p.played=pl;p.hasData=true;p.src='season';
      p.hRec=`${g.wins?.home?.total||0}-${g.loses?.home?.total||0}`;
      p.aRec=`${g.wins?.away?.total||0}-${g.loses?.away?.total||0}`}
  }
  return p;
}

function processH2H(games,hid){
  if(!games?.length)return null;
  let ht=0,at=0,tp=0,hw=0;
  games.forEach(g=>{const h=g.scores?.home?.total||0,a=g.scores?.away?.total||0,ih=g.teams?.home?.id===hid;
    ht+=ih?h:a;at+=ih?a:h;tp+=h+a;if((ih&&h>a)||(!ih&&a>h))hw++});
  const n=games.length;
  return{games:n,hw,aw:n-hw,ha:ht/n,aa:at/n,avg:tp/n};
}

function processPlayers(data){
  if(!data?.length)return[];
  return data.filter(p=>p.player&&p.statistics?.length).map(p=>{
    const s=p.statistics[0];
    return{id:p.player.id,name:p.player.name||'?',pos:s.pos||'G',
      pts:parseFloat(s.points)||0,reb:parseFloat(s.totReb)||0,ast:parseFloat(s.assists)||0,
      stl:parseFloat(s.steals)||0,blk:parseFloat(s.blocks)||0,tpm:parseFloat(s.tpm)||0,
      min:parseFloat(s.min)||0,gp:parseInt(s.games?.appearences)||0}
  }).filter(p=>p.min>8&&p.gp>2).sort((a,b)=>b.pts-a.pts);
}

function findStanding(arr,tid){
  if(!arr)return null;
  for(const item of(Array.isArray(arr)?arr:[])){
    if(item?.team?.id===tid)return item;
    if(Array.isArray(item)){const f=findStanding(item,tid);if(f)return f}
    if(item?.group){const f=findStanding(item.group,tid);if(f)return f}
  }return null;
}

// === PREDICTION ENGINE ===
function formMult(f){if(!f?.length)return 1;let s=0,tw=0;
  for(let i=0;i<Math.min(f.length,8);i++){const w=Math.pow(.82,i);tw+=w;if(f[i]==='W')s+=w}
  return tw>0?.88+(s/tw)*.24:1}

function calcExp(hd,ad,h2h,st){
  let hp=hd.ppg,ap=ad.ppg,ho=hd.opp,ao=ad.opp;
  if(!hp&&h2h){hp=h2h.ha||82;ho=h2h.aa||80}
  if(!ap&&h2h){ap=h2h.aa||80;ao=h2h.ha||82}
  if(!hp)hp=82;if(!ap)ap=80;if(!ho)ho=80;if(!ao)ao=82;
  const la=(hp+ap+ho+ao)/4;hd.lavg=la;ad.lavg=la;
  hd.pace=(hp+ho)/(la*2);ad.pace=(ap+ao)/(la*2);
  const hA=hp/la,aA=ap/la,hDW=ho/la,aDW=ao/la;
  let hE=la*hA*aDW,aE=la*aA*hDW;
  const ha=la/112*C.HA;hE+=ha*.6;aE-=ha*.4;
  if(hd.form.length>=3)hE=hE*.8+hE*formMult(hd.form)*.2;
  if(ad.form.length>=3)aE=aE*.8+aE*formMult(ad.form)*.2;
  if(hd.hasData){if(hd.wp>65)hE*=1.04;else if(hd.wp<35)hE*=.96}
  if(ad.hasData){if(ad.wp>65)aE*=1.04;else if(ad.wp<35)aE*=.96}
  const cp=(hd.pace+ad.pace)/2;hE*=cp;aE*=cp;
  if(h2h&&h2h.games>2){const w=Math.min(.15,h2h.games*.015),a2=(h2h.ha+h2h.aa)/2;
    if(a2>0){hE=hE*(1-w)+hE*cl(.9,h2h.ha/a2,1.1)*w;aE=aE*(1-w)+aE*cl(.9,h2h.aa/a2,1.1)*w}}
  if(st?.hp>0&&st?.ap>0){const adj=cl(-3,(st.ap-st.hp)*.25,3);hE+=adj*.5;aE-=adj*.5}
  if(hd.rpg&&hp){hE*=cl(.95,.85+hd.rpg/hp*.15,1.05)}
  if(ad.rpg&&ap){aE*=cl(.95,.85+ad.rpg/ap*.15,1.05)}
  const lo2=la*.65,hi2=la*1.4;
  return{h:cl(lo2,hE,hi2),a:cl(lo2,aE,hi2),t:cl(lo2*2,hE+aE,hi2*2)};
}

function ml(h,a){const s=h-a,p=1/(1+Math.exp(-s/5.5));return{h:sp(p*100),a:sp((1-p)*100)}}
function ouC(tot,lines){const sd=tot*.085,r={};for(const l of lines){const o=1-ncdf(l,tot,sd);r[l]={o:sp(o*100),u:sp((1-o)*100)}}return r}
function ttC(e,lines){const sd=e*.1,r={};for(const l of lines){const o=1-ncdf(l,e,sd);r[l]={o:sp(o*100),u:sp((1-o)*100)}}return r}
function hcC(h,a,lines){const s=h-a,sd=11,r={};for(const l of lines){const c=1-ncdf(-l,s,sd);r[l]={h:sp(c*100),a:sp((1-c)*100)}}return r}

// === SUPER ALGORITHM v3 — RELATIVE SIGNALS ===
function superAlgo(exp,mln,ou,hc,hd,ad,h2h,st,ouL,hcL,match){
  const sp2=exp.h-exp.a,abs2=Math.abs(sp2);
  const hF=(hd.form||'').slice(0,5),aF=(ad.form||'').slice(0,5);
  const hW=hF.split('').filter(c=>c==='W').length,aW=aF.split('').filter(c=>c==='W').length;
  const hasH=h2h&&h2h.games>=3,hasSt=st?.hp>0&&st?.ap>0;
  let dq=0;if(hd.hasData&&ad.hasData)dq+=.4;if(hF.length>=3&&aF.length>=3)dq+=.2;if(hasH)dq+=.2;if(hasSt)dq+=.2;
  const hN=match?.teams?.home?.name||'Casa',aN=match?.teams?.away?.name||'Ospite';
  
  function bld(mkt,val,icon,prob,sigs,ctx,hT,mT){
    const v=Object.values(sigs),on=v.filter(Boolean).length,tot=v.length,conv=tot?on/tot:0;
    const ss=(prob/100)*conv*(ctx||1)*(.5+dq*.5)*100;
    let conf='bassa';
    if(prob>=(hT?.p||70)&&conv>=(hT?.c||.65)&&dq>=.4)conf='alta';
    else if(prob>=(mT?.p||55)&&conv>=(mT?.c||.5)&&dq>=.2)conf='media';
    return{mkt,val,icon,prob:Math.round(prob*10)/10,sigs,on,tot,conv,ss,conf,odds:prob>5?(100/prob).toFixed(2):'—'}
  }
  
  const cs=[];
  // MONEYLINE
  cs.push(bld('Moneyline',`1 ${hN}`,'🏠',mln.h,{
    prob_forte:mln.h>mln.a+5,spread_pos:sp2>1.5,ppg_sup:hd.ppg>ad.ppg,
    dif_migliore:hd.opp<ad.opp,forma_sup:hW>aW,wp_sup:hd.wp>ad.wp+5,
    h2h_fav:hasH&&h2h.hw>h2h.aw,class_sopra:hasSt&&st.hp<st.ap,casa_edge:sp2>0
  },sp2>8?1.15:sp2>4?1.05:sp2<0?.85:1,{p:60,c:.6},{p:52,c:.45}));
  
  cs.push(bld('Moneyline',`2 ${aN}`,'✈️',mln.a,{
    prob_forte:mln.a>mln.h+5,spread_neg:sp2<-1.5,ppg_sup:ad.ppg>hd.ppg,
    dif_migliore:ad.opp<hd.opp,forma_sup:aW>hW,wp_sup:ad.wp>hd.wp+5,
    h2h_fav:hasH&&h2h.aw>h2h.hw,class_sopra:hasSt&&st.ap<st.hp,trasferta_forte:sp2<-3
  },sp2<-8?1.15:sp2<-4?1.05:sp2>0?.85:1,{p:56,c:.6},{p:48,c:.45}));
  
  // O/U — 3 lines
  const bestOU=ouL.reduce((b,l)=>{const d=Math.abs(exp.t-l);return d<b.d?{l,d}:b},{l:ouL[0],d:Infinity}).l;
  [bestOU-5,bestOU,bestOU+5].filter(l=>ou[l]).forEach(l=>{
    const d=ou[l],diff=exp.t-l;
    cs.push(bld('Over/Under',`Over ${l}`,diff>5?'🔥':'📈',d.o,{
      tot_sopra:exp.t>l,entrambi_attaccano:hd.ppg>hd.lavg&&ad.ppg>ad.lavg,
      dif_deboli:hd.opp>hd.lavg&&ad.opp>ad.lavg,pace_alto:hd.pace+ad.pace>2.02,
      h2h_alto:hasH&&h2h.avg>l,forme_ok:hW+aW>=5,trend:hd.rpg>hd.ppg||ad.rpg>ad.ppg
    },diff>8?1.12:diff>3?1.05:diff<-5?.82:1,{p:62,c:.6},{p:52,c:.45}));
    cs.push(bld('Over/Under',`Under ${l}`,diff<-5?'🛡️':'📉',d.u,{
      tot_sotto:exp.t<l,entrambi_difendono:hd.opp<hd.lavg&&ad.opp<ad.lavg,
      dif_forte:hd.opp<hd.lavg||ad.opp<ad.lavg,pace_basso:hd.pace+ad.pace<1.98,
      h2h_basso:hasH&&h2h.avg<l,forme_dif:hW+aW<=3
    },diff<-8?1.12:diff<-3?1.05:diff>5?.82:1,{p:62,c:.6},{p:52,c:.45}));
  });
  
  // TEAM TOTALS
  if(hd.hasData&&ad.hasData){
    const hL=Math.round(exp.h-.5)+.5,aL=Math.round(exp.a-.5)+.5;
    cs.push(bld('Team Total',`${hN} O${hL}`,'🏠📈',sp((1-ncdf(hL,exp.h,exp.h*.1))*100),{
      ppg_alto:hd.ppg>hd.lavg,opp_deb:ad.opp>ad.lavg,forma:hW>=3,trend:hd.rpg>hd.ppg,h2h:hasH&&h2h.ha>hL
    },1,{p:60,c:.6},{p:50,c:.4}));
    cs.push(bld('Team Total',`${aN} O${aL}`,'✈️📈',sp((1-ncdf(aL,exp.a,exp.a*.1))*100),{
      ppg_alto:ad.ppg>ad.lavg,opp_deb:hd.opp>hd.lavg,forma:aW>=3,trend:ad.rpg>ad.ppg,h2h:hasH&&h2h.aa>aL
    },1,{p:60,c:.6},{p:50,c:.4}));
  }
  
  // HANDICAP
  const bestHC=hcL.reduce((b,l)=>{const d=Math.abs(sp2-(-l));return d<b.d?{l,d}:b},{l:0,d:Infinity}).l;
  [bestHC].forEach(l=>{if(!hc[l])return;
    const fS=sp2>=0?'h':'a',fP=hc[l][fS],fN=sp2>=0?hN:aN,dL=fS==='h'?l:-l;
    cs.push(bld('Handicap',`${fN} ${dL>0?'+':''}${dL}`,'📐',fP,{
      prob_ok:fP>52,spread_ok:fS==='h'?sp2>-l:sp2<l,forma:(fS==='h'?hW:aW)>=(fS==='h'?aW:hW),
      ppg:(fS==='h'?hd:ad).ppg>(fS==='h'?ad:hd).ppg,class:hasSt&&(fS==='h'?st.hp<st.ap:st.ap<st.hp),
      h2h:hasH&&(fS==='h'?h2h.hw>h2h.aw:h2h.aw>h2h.hw)
    },1,{p:62,c:.6},{p:52,c:.5}));
    // Underdog
    const uS=sp2>=0?'a':'h',uP=hc[l][uS],uN=sp2>=0?aN:hN,uL=uS==='h'?l:-l;
    if(uP>45)cs.push(bld('Handicap',`${uN} ${uL>0?'+':''}${uL}`,'📐',uP,{
      prob_ok:uP>48,vicina:abs2<6,forma:(uS==='h'?hW:aW)>=2,h2h:hasH&&Math.abs(h2h.hw-h2h.aw)<=2
    },abs2<3?1.08:1,{p:58,c:.6},{p:48,c:.45}));
  });
  
  // 1° Tempo O/U
  if(hd.hasData){
    const h1=(exp.h+exp.a)*.495,h1L=Math.round(h1/5)*5+.5,h1O=sp((1-ncdf(h1L,h1,h1*.1))*100);
    cs.push(bld('1° Tempo',`Over ${h1L} 1T`,'⏱️',h1O,{
      tot_alto:h1>h1L,attacco:hd.ppg>hd.lavg&&ad.ppg>ad.lavg,pace:hd.pace+ad.pace>2.02
    },1,{p:58,c:.6},{p:48,c:.4}));
  }
  
  // Deduplicate O/U contradictions
  const filtered=cs.filter(c=>c.prob>=35&&c.prob<=92);
  const seen=new Set(),deduped=[];
  filtered.sort((a,b)=>b.ss-a.ss);
  filtered.forEach(c=>{
    const m=c.val.match(/^(Over|Under) (\d+\.?\d*)/);
    if(m){const k=`${m[1]==='Over'?'Under':'Over'}_${m[2]}`;if(seen.has(k))return;seen.add(`${m[1]}_${m[2]}`)}
    deduped.push(c)});
  
  return{picks:deduped.slice(0,12),top:deduped[0],top3:deduped.slice(0,3),dq,hasData:hd.hasData&&ad.hasData};
}

function genReasons(exp,mln,hd,ad,h2h,st,m){
  const r=[],sp2=exp.h-exp.a,hN=m.teams?.home?.name||'Casa',aN=m.teams?.away?.name||'Ospite';
  if(hd.hasData&&ad.hasData){
    if(Math.abs(hd.ppg-ad.ppg)>8)r.push(`${hd.ppg>ad.ppg?hN:aN} segna molto di più (${sf(Math.max(hd.ppg,ad.ppg),1)} vs ${sf(Math.min(hd.ppg,ad.ppg),1)} PPG)`);
    if(Math.abs(hd.opp-ad.opp)>8)r.push(`${hd.opp<ad.opp?hN:aN} difende meglio (${sf(Math.min(hd.opp,ad.opp),1)} vs ${sf(Math.max(hd.opp,ad.opp),1)} subiti)`);
    if(Math.abs(hd.wp-ad.wp)>20)r.push(`Win%: ${hN} ${sf(hd.wp,0)}% vs ${aN} ${sf(ad.wp,0)}%`)}
  if(Math.abs(sp2)>8)r.push(`${sp2>0?hN:aN} netto favorita (spread ${sp2>0?'+':''}${sf(sp2,1)})`);
  else if(Math.abs(sp2)>3)r.push(`${sp2>0?hN:aN} favorita (spread ${sf(Math.abs(sp2),1)})`);
  else r.push(`Partita equilibrata (spread ${sf(Math.abs(sp2),1)})`);
  const hW=(hd.form||'').slice(0,5).split('').filter(c=>c==='W').length;
  const aW=(ad.form||'').slice(0,5).split('').filter(c=>c==='W').length;
  if(hd.form.length>=3&&ad.form.length>=3){
    if(hW>aW+2)r.push(`${hN} in forma migliore (${hW}W vs ${aW}W ultime 5)`);
    if(aW>hW+2)r.push(`${aN} in forma migliore (${aW}W vs ${hW}W ultime 5)`);}
  if(h2h&&h2h.games>=3)r.push(`H2H: ${h2h.hw}-${h2h.aw} su ${h2h.games}g, media ${sf(h2h.avg,1)} pts`);
  if(st?.hp>0&&st?.ap>0&&Math.abs(st.hp-st.ap)>=3)r.push(`Classifica: #${st.hp} vs #${st.ap}`);
  if(!hd.hasData||!ad.hasData)r.push('⚠️ Dati parziali — previsioni basate su partite recenti');
  return r;
}

function calcPProps(p,oppD){
  const props=[],od=oppD?(oppD.opp||110)/110:1;
  const add=(t,avg,sd,adj)=>{if(avg>0){const a2=avg*(adj||1),line=Math.round(a2-.5)+.5;props.push({t,line,avg:a2,o:sp((1-ncdf(line,a2,Math.max(sd,1.5)))*100)})}};
  add('PTS',p.pts,Math.max(p.pts*.3,4),od);
  if(p.reb>2)add('REB',p.reb,Math.max(p.reb*.35,2));
  if(p.ast>1.5)add('AST',p.ast,Math.max(p.ast*.35,1.5));
  if(p.tpm>.8)add('3PT',p.tpm,Math.max(p.tpm*.4,.8));
  const pra=p.pts+p.reb+p.ast;if(pra>12)add('P+R+A',pra,Math.max(pra*.22,5));
  return props;
}

}

function renderDates(){
  return`<div class="dtabs">${[-1,0,1,2,3,4,5].map(d=>`<div class="dt ${S.date===d?'a':''}" onclick="loadGames(${d})">${dlabel(d)}</div>`).join('')}</div>`;
}
function renderLg(){
  if(!S.leagues.length)return'<div class="empty">🏀<br>Nessuna partita</div>';
  return`<div class="sec" style="padding:10px 12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between"><span style="font-size:.78rem;font-weight:700;color:var(--fire)">🏀 ${S.matches.length} partite</span><span style="font-size:.65rem;color:var(--td)">${S.leagues.length} campionati</span></div></div>${S.leagues.map(l=>renderLgG(l)).join('')}`;
}
function renderLgG(lg){
  const ex=S.exp.has(lg.id),ms=lg.matches.sort((a,b)=>new Date(a.date||0)-new Date(b.date||0));
  return`<div class="lg"><div class="lh ${ex?'open':''}" onclick="togLg(${lg.id})">
    ${lg.logo?`<img src="${lg.logo}" onerror="this.style.display='none'">`:'<div style="width:26px;height:26px;border-radius:5px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:.6rem">🏀</div>'}
    <div style="flex:1;min-width:0"><div class="ln">${esc(lg.name)}</div><div class="lc">${esc(lg.country)}</div></div>
    <div class="cnt">${ms.length}</div><div class="arr">▶</div>
  </div>${ex?`<div class="mc">${ms.map(m=>renderMI(m)).join('')}</div>`:''}</div>`;
}
function renderMI(g){
  const st=g.status?.short||'',live=['Q1','Q2','Q3','Q4','OT','BT','HT'].includes(st),done=['FT','AOT','AP'].includes(st);
  const hs=g.scores?.home?.total,as=g.scores?.away?.total,has=hs!=null&&as!=null;
  const hw=has&&hs>as,aw=has&&as>hs;
  const hN=S.nc.get(g.teams?.home?.id)||'',aN=S.nc.get(g.teams?.away?.id)||'';
  return`<div class="mi" onclick="doAn(${g.id})">
    <div class="mi-t ${live?'live':done?'ft':''}">${live?(g.status?.timer||st):done?'FT':ftime(g.date)}</div>
    <div class="mi-teams">
      <div class="mi-tm">${g.teams?.home?.logo?`<img src="${g.teams.home.logo}" onerror="this.style.display='none'">`:''}
        <span class="n" ${hw?'style="color:var(--grn)"':''}>${esc(g.teams?.home?.name||'?')}</span>
        ${has?`<span class="s mono ${hw?'w':''}">${hs}</span>`:''}</div>
      ${hN?`<div class="mi-pl">⭐ ${esc(hN)}</div>`:''}
      <div class="mi-tm">${g.teams?.away?.logo?`<img src="${g.teams.away.logo}" onerror="this.style.display='none'">`:''}
        <span class="n" ${aw?'style="color:var(--grn)"':''}>${esc(g.teams?.away?.name||'?')}</span>
        ${has?`<span class="s mono ${aw?'w':''}">${as}</span>`:''}</div>
      ${aN?`<div class="mi-pl">⭐ ${esc(aN)}</div>`:''}</div>
    <div class="mi-arr">▶</div></div>`;
}
function doAn(id){const g=S.matches.find(m=>m.id===id);if(g)analyze(g)}

// === ANALYSIS PAGE (single scroll like BettingPro) ===
function renderAn(){
  if(!S.an)return'';
  if(S.an.err)return`<div class="back" onclick="backLg()">← Campionati</div><div class="empty">⚠️ ${S.an.err}</div>`;
  const a=S.an,m=a.m,sa=a.sa,hN=m.teams?.home?.name||'Casa',aN=m.teams?.away?.name||'Ospite';
  if(!sa?.top)return`<div class="back" onclick="backLg()">← Campionati</div><div class="empty">Dati insufficienti</div>`;
  
  const top=sa.top,dq=sa.dq,dqPct=Math.round(dq*100);
  const risk=top.prob>=65&&dq>=.4?'BASSO':top.prob>=52?'MEDIO':'ALTO';
  const rC=risk==='BASSO'?'var(--grn)':risk==='MEDIO'?'var(--gold)':'var(--red)';
  const cC=top.conf==='alta'?'var(--grn)':top.conf==='media'?'var(--gold)':'var(--red)';
  const sp2=a.exp.h-a.exp.a;
  
  let html=`<div class="back" onclick="backLg()">← Campionati</div>`;
  
  // HERO
  html+=`<div class="hero">
    <div class="hero-teams">
      <div class="hero-team">${m.teams?.home?.logo?`<img src="${m.teams.home.logo}">`:''}
        <div class="hero-team-name">${esc(hN)}</div></div>
      <div class="hero-vs">VS</div>
      <div class="hero-team">${m.teams?.away?.logo?`<img src="${m.teams.away.logo}">`:''}
        <div class="hero-team-name">${esc(aN)}</div></div></div>
    <div class="hero-score">${Math.round(a.exp.h)} - ${Math.round(a.exp.a)}</div>
    <div class="hero-sub">${esc(m.league?.name)} • ${ftime(m.date)} • Totale: ${sf(a.exp.t,1)}</div></div>`;
  
  // === PRONOSTICO CONSIGLIATO (like BettingPro Consiglio AI) ===
  html+=`<div class="verdict">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:6px"><span style="font-size:1.2rem">🧠</span>
        <div><div style="font-size:.82rem;font-weight:800;color:var(--fire)">PRONOSTICO CONSIGLIATO</div>
          <div style="font-size:.6rem;color:var(--td)">Analisi basata su statistiche e probabilità</div></div></div>
      <span class="v-badge ${top.conf}">${top.conf==='alta'?'💎':'🔮'} ${top.conf}</span></div>
    <div class="v-pick">${esc(top.val)}</div>
    <div class="v-prob">${sf(top.prob,1)}% probabilità <span style="color:var(--td);font-size:.75rem">@${top.odds}</span></div>
    <div style="display:flex;gap:6px;margin:10px 0;flex-wrap:wrap">
      <span style="font-size:.62rem;padding:3px 8px;border-radius:6px;background:rgba(255,107,44,.08);color:var(--fire);font-weight:700">${top.mkt}</span>
      <span style="font-size:.62rem;padding:3px 8px;border-radius:6px;background:${risk==='BASSO'?'rgba(16,185,129,.08)':'rgba(251,191,36,.08)'};color:${rC};font-weight:700">Rischio: ${risk}</span>
      <span style="font-size:.62rem;padding:3px 8px;border-radius:6px;background:rgba(6,182,212,.08);color:var(--cyan);font-weight:700">Segnali: ${top.on}/${top.tot}</span>
      <span style="font-size:.62rem;padding:3px 8px;border-radius:6px;background:rgba(167,139,250,.08);color:var(--pur);font-weight:700">Dati: ${dqPct}%</span></div>
    ${a.reasons.length?`<div class="v-why"><div class="v-why-title">💡 Perché questo pronostico</div>
      <div class="v-reason">${a.reasons.join(' • ')}</div></div>`:''}
    ${sa.top3.length>1?`<div style="margin-top:10px"><div style="font-size:.62rem;color:var(--td);margin-bottom:5px;font-weight:600">Alternative valide:</div>
      <div class="v-alt">${sa.top3.slice(1).map(p=>`<div class="v-alt-item" onclick="addPickBS('${p.val.replace(/'/g,"\\'")}',${p.prob},'${p.odds}','${p.mkt.replace(/'/g,"\\'")}')">${esc(p.val)} <span class="mono" style="color:${p.conf==='alta'?'var(--grn)':'var(--gold)'}"> ${sf(p.prob,0)}%</span></div>`).join('')}</div></div>`:''}
  </div>`;
  
  // === MONEYLINE & SPREAD (like 1X2 & xG) ===
  html+=`<div class="sec fire"><div class="stitle">🎯 Moneyline & Spread <span class="mono" style="font-size:.7rem;color:var(--fire);margin-left:auto">Spread: ${sp2>0?'+':''}${sf(sp2,1)}</span></div>
    <div class="pbar-row"><div class="pbar-lbl">${esc(hN)}</div><div class="pbar-wrap"><div class="pbar home" style="width:${a.mln.h}%">${sf(a.mln.h,1)}%</div></div></div>
    <div class="pbar-row"><div class="pbar-lbl">${esc(aN)}</div><div class="pbar-wrap"><div class="pbar away" style="width:${a.mln.a}%">${sf(a.mln.a,1)}%</div></div></div>
    <div class="sgrid" style="margin-top:10px">
      <div class="sbox"><div class="l">PPG ${esc(hN)}</div><div class="v" style="color:var(--fire)">${sf(a.hd.ppg,1)}</div>${a.hd.src!=='none'?`<div class="sub">${a.hd.gn}g analizzate</div>`:''}</div>
      <div class="sbox"><div class="l">PPG ${esc(aN)}</div><div class="v" style="color:var(--cyan)">${sf(a.ad.ppg,1)}</div>${a.ad.src!=='none'?`<div class="sub">${a.ad.gn}g analizzate</div>`:''}</div>
      <div class="sbox"><div class="l">OPP PPG ${esc(hN)}</div><div class="v" style="color:var(--red)">${sf(a.hd.opp,1)}</div></div>
      <div class="sbox"><div class="l">OPP PPG ${esc(aN)}</div><div class="v" style="color:var(--red)">${sf(a.ad.opp,1)}</div></div>
      <div class="sbox"><div class="l">Win% ${esc(hN)}</div><div class="v" style="color:var(--grn)">${sf(a.hd.wp,0)}%</div></div>
      <div class="sbox"><div class="l">Win% ${esc(aN)}</div><div class="v" style="color:var(--grn)">${sf(a.ad.wp,0)}%</div></div></div>
    ${a.hd.form||a.ad.form?`<div style="display:flex;gap:20px;margin-top:10px">
      ${a.hd.form?`<div><div style="font-size:.65rem;color:var(--td);margin-bottom:4px">${esc(hN)}</div><div class="form-d">${a.hd.form.split('').slice(0,8).map(r=>`<div class="fd ${r}">${r}</div>`).join('')}</div></div>`:''}
      ${a.ad.form?`<div><div style="font-size:.65rem;color:var(--td);margin-bottom:4px">${esc(aN)}</div><div class="form-d">${a.ad.form.split('').slice(0,8).map(r=>`<div class="fd ${r}">${r}</div>`).join('')}</div></div>`:''}</div>`:''}</div>`;
  
  // === OVER/UNDER & TOTALI (like O/U & GG) ===
  const bestOU=a.ouL.reduce((b,l)=>{const d=Math.abs(a.exp.t-l);return d<b.d?{l,d}:b},{l:a.ouL[0],d:Infinity}).l;
  html+=`<div class="sec green"><div class="stitle">📈 Over/Under & Totali <span class="mono" style="font-size:.7rem;color:var(--grn);margin-left:auto">Att. ${sf(a.exp.t,1)}</span></div>
    ${[bestOU-5,bestOU,bestOU+5].filter(l=>a.ou[l]).map(l=>{const d=a.ou[l],ib=l===bestOU;
      return`<div class="pbar-row"><div class="pbar-lbl">O/U ${l}</div><div class="pbar-wrap" style="display:flex">
        <div class="pbar over" style="width:${d.o}%;border-radius:7px 0 0 7px;justify-content:flex-start;padding-left:6px">${sf(d.o,0)}%</div>
        <div class="pbar under" style="width:${d.u}%;border-radius:0 7px 7px 0;justify-content:flex-end">${sf(d.u,0)}%</div></div></div>`}).join('')}
    <div style="margin-top:10px"><div style="font-size:.68rem;font-weight:700;color:var(--td);margin-bottom:6px">TEAM TOTALS</div>
      <div class="sgrid">
        <div class="sbox"><div class="l">${esc(hN)} Att.</div><div class="v" style="color:var(--fire)">${sf(a.exp.h,1)}</div></div>
        <div class="sbox"><div class="l">${esc(aN)} Att.</div><div class="v" style="color:var(--cyan)">${sf(a.exp.a,1)}</div></div></div></div></div>`;
  
  // === H2H ===
  if(a.h2h)html+=`<div class="sec gold"><div class="stitle">⚔️ Head to Head (${a.h2h.games}g)</div>
    <div class="sgrid">
      <div class="sbox"><div class="l">Vitt. ${esc(hN)}</div><div class="v" style="color:var(--grn)">${a.h2h.hw}</div></div>
      <div class="sbox"><div class="l">Vitt. ${esc(aN)}</div><div class="v" style="color:var(--cyan)">${a.h2h.aw}</div></div>
      <div class="sbox"><div class="l">Media ${esc(hN)}</div><div class="v">${sf(a.h2h.ha,1)}</div></div>
      <div class="sbox"><div class="l">Media ${esc(aN)}</div><div class="v">${sf(a.h2h.aa,1)}</div></div></div>
    <div style="text-align:center;margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;color:var(--gold)">Media Totale: ${sf(a.h2h.avg,1)} pts</div></div>`;
  
  // === CLASSIFICA ===
  if(a.st?.hp>0)html+=`<div class="sec purple"><div class="stitle">🏆 Classifica</div>
    <div class="sgrid">
      <div class="sbox"><div class="l">${esc(hN)}</div><div class="v">#${a.st.hp}</div><div class="sub">${a.st.hR}</div></div>
      <div class="sbox"><div class="l">${esc(aN)}</div><div class="v">#${a.st.ap}</div><div class="sub">${a.st.aR}</div></div></div></div>`;
  
  // === RANKING PRONOSTICI (grid cards) ===
  html+=`<div class="sec fire"><div class="stitle">🏆 Ranking Pronostici (${sa.picks.length} mercati)</div>
    <div class="pgrid">${sa.picks.map((p,i)=>{
      const sel=S.bs.find(b=>b.l===p.val);
      const pCls=p.conf==='alta'?'hi':p.conf==='media'?'md':'lo';
      return`<div class="pc ${sel?'sel':''}" onclick="addPickBS('${p.val.replace(/'/g,"\\'")}',${p.prob},'${p.odds}','${p.mkt.replace(/'/g,"\\'")}')">
        ${i<3?`<div class="rank r${i+1}">${i+1}</div>`:''}
        <div class="mkt">${esc(p.mkt)}</div><div class="val">${esc(p.val)}</div>
        <div class="prob ${pCls}">${sf(p.prob,1)}%</div>
        <div class="odds">@${p.odds}</div>
        <div class="sigs">${Object.values(p.sigs).map(s=>`<div class="sig ${s?'on':'off'}"></div>`).join('')}</div></div>`}).join('')}</div></div>`;
  
  // === HANDICAP ===
  html+=`<div class="sec cyan"><div class="stitle">📐 Handicap <span class="mono" style="font-size:.7rem;color:var(--cyan);margin-left:auto">Diff: ${sp2>0?'+':''}${sf(sp2,1)}</span></div>
    ${a.hcL.map(l=>{const d=a.hc[l];if(!d)return'';const hs2=d.h>55,as2=d.a>55;
      return`<div class="hrow"><div class="hline">${l>0?'+':''}${l}</div>
        <div class="hbar" style="background:${hs2?'linear-gradient(90deg,var(--fire),var(--ora))':'var(--bg4)'};width:${d.h}%;color:${hs2?'#fff':'var(--tg)'}">${sf(d.h,1)}%</div>
        <div class="hbar" style="background:${as2?'linear-gradient(90deg,var(--blu),var(--cyan))':'var(--bg4)'};width:${d.a}%;justify-content:flex-end;color:${as2?'#fff':'var(--tg)'}">${sf(d.a,1)}%</div></div>`}).join('')}</div>`;
  
  // === QUARTI ===
  html+=`<div class="sec"><div class="stitle">⏱️ Previsioni Quarti</div>
    <table class="tbl"><thead><tr><th></th><th>${esc(hN)}</th><th>${esc(aN)}</th><th>Tot</th></tr></thead><tbody>
    ${a.qtrs.map(q=>`<tr><td>Q${q.q}</td><td>${sf(q.h,1)}</td><td>${sf(q.a,1)}</td><td style="color:var(--gold);font-weight:800">${sf(q.t,1)}</td></tr>`).join('')}
    <tr><td>1°T</td><td>${sf(a.exp.h*.495,1)}</td><td>${sf(a.exp.a*.495,1)}</td><td style="color:var(--gold);font-weight:800">${sf(a.exp.t*.495,1)}</td></tr>
    <tr><td>2°T</td><td>${sf(a.exp.h*.505,1)}</td><td>${sf(a.exp.a*.505,1)}</td><td style="color:var(--gold);font-weight:800">${sf(a.exp.t*.505,1)}</td></tr>
    </tbody></table></div>`;
  
  // === GIOCATORI ===
  html+=renderPlayers(a.hPl,hN,a.ad)+renderPlayers(a.aPl,aN,a.hd);
  
  return html;
}

function renderPlayers(pls,tName,oppD){
  if(!pls?.length)return`<div class="sec"><div class="stitle">👤 ${esc(tName)}</div><div class="empty" style="padding:15px">Stats giocatori non disponibili per questo campionato</div></div>`;
  return`<div class="sec"><div class="stitle">👤 ${esc(tName)} — Giocatori</div>
    ${pls.slice(0,8).map(p=>{
      const props=calcPProps(p,oppD);
      return`<div class="plc"><div class="plc-h"><div class="pos ${p.pos}">${p.pos}</div>
        <div><div class="nm">${esc(p.name)}</div><div class="meta">${sf(p.min,0)} min/g • ${p.gp} partite</div></div></div>
        <div class="plc-stats">
          <div class="plc-st"><div class="sl">PTS</div><div class="sv">${sf(p.pts,1)}</div></div>
          <div class="plc-st"><div class="sl">REB</div><div class="sv">${sf(p.reb,1)}</div></div>
          <div class="plc-st"><div class="sl">AST</div><div class="sv">${sf(p.ast,1)}</div></div>
          <div class="plc-st"><div class="sl">3PT</div><div class="sv">${sf(p.tpm,1)}</div></div></div>
        ${props.length?`<div class="plc-props"><div class="plc-props-t">PROPS PREVISTE</div><div class="pp-row">
          ${props.map(pr=>`<div class="pp" onclick="addPropBS('${p.name.replace(/'/g,"\\'")}','${pr.t}',${pr.line},${pr.o})">
            <span class="pt">${pr.t}</span><span class="pl">O${pr.line}</span>
            <span class="pv" style="color:${pr.o>55?'var(--grn)':pr.o<45?'var(--red)':'var(--gold)'}">${sf(pr.o,0)}%</span></div>`).join('')}</div></div>`:''}
      </div>`}).join('')}</div>`;
}

// === BET SLIP ===
function addPickBS(l,prob,odds,mkt){addBS({l,prob,odds,mkt})}
function addPropBS(n,t,line,prob){addBS({l:n+' '+t+' O'+line,prob,odds:(100/prob).toFixed(2),mkt:'PROP'})}
function addBS(pick){
  const ex=S.bs.findIndex(b=>b.l===pick.l);
  if(ex>=0)S.bs.splice(ex,1);else S.bs.push(pick);
  updBS();fbS('bs',S.bs);if(S.view==='an')render();
}
function updBS(){
  const bar=document.getElementById('bsBar'),cnt=document.getElementById('bsCnt'),odd=document.getElementById('bsOdds');
  if(S.bs.length){bar.classList.add('vis');cnt.textContent=`${S.bs.length} sel.`;
    odd.textContent=`@${S.bs.reduce((a,b)=>a*parseFloat(b.odds||1),1).toFixed(2)}`}
  else bar.classList.remove('vis');
}

function togLg(id){
  if(S.exp.has(id))S.exp.delete(id);
  else{S.exp.add(id);
    const lg=S.leagues.find(l=>l.id===id);
    if(lg)lg.matches.forEach(m=>{
      const szn=m.league?.season||'2024-2025';
      [m.teams?.home?.id,m.teams?.away?.id].forEach(tid=>{
        if(tid&&!S.nc.has(tid)){
          fetchPlayers(tid,szn).then(d=>{
            const pl=processPlayers(d);
            if(pl.length){S.nc.set(tid,pl.slice(0,5).map(p=>p.name.split(' ').pop()).join(', '));render()}
          }).catch(()=>{})}})});}
  render();
}
function backLg(){S.view='lg';S.an=null;S.sel=null;render()}

async function init(){const sl=await fbL('bs');if(sl&&Array.isArray(sl))S.bs=sl;await loadGames(0)}
init();
</script>
