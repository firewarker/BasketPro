<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>BasketPro AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e14;--bg2:#0f1319;--surface:#151921;--card:#1a1f2b;--card2:#1f2535;
  --border:#252d3a;--border2:#2d3748;
  --amber:#f5a623;--amber-d:#c4841a;--amber-bg:rgba(245,166,35,.08);--amber-br:rgba(245,166,35,.2);
  --green:#22c55e;--green-bg:rgba(34,197,94,.08);--green-br:rgba(34,197,94,.2);
  --red:#ef4444;--red-bg:rgba(239,68,68,.06);--red-br:rgba(239,68,68,.15);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.08);--blue-br:rgba(96,165,250,.2);
  --cyan:#22d3ee;--cyan-bg:rgba(34,211,238,.06);--cyan-br:rgba(34,211,238,.15);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.06);--purple-br:rgba(167,139,250,.15);
  --t1:#f0f2f8;--t2:#b8c0d4;--t3:#7a849e;--t4:#4a5270;
  --r:14px;--rs:10px;--max:660px;
  --f:'Outfit',sans-serif;--m:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:var(--f);min-height:100dvh;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(245,166,35,.03),transparent 60%);pointer-events:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.wrap{max-width:var(--max);margin:0 auto;position:relative;z-index:1}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,14,20,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;justify-content:center;padding:0 16px}
.hdr-in{max-width:var(--max);width:100%;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:7px;font-weight:900;font-size:1.05rem;letter-spacing:-.02em}
.logo-i{width:26px;height:26px;background:linear-gradient(135deg,var(--amber),var(--amber-d));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.8rem;box-shadow:0 2px 8px rgba(245,166,35,.2)}
.logo span{color:var(--amber)}
.vtag{font-size:.44rem;font-weight:700;color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-br);padding:2px 6px;border-radius:20px;letter-spacing:.3px}
.dpills{display:flex;gap:2px;background:var(--surface);padding:3px;border-radius:11px;border:1px solid var(--border)}
.dp{padding:5px 12px;border:none;background:0;color:var(--t3);font-size:.65rem;font-weight:700;cursor:pointer;border-radius:8px;transition:.2s;font-family:var(--f)}.dp:hover{color:var(--t2)}.dp.on{background:var(--amber);color:#000;box-shadow:0 2px 6px rgba(245,166,35,.25)}
.st{display:flex;align-items:center;gap:4px;font-size:.55rem;color:var(--t3);font-family:var(--m);font-weight:600}
.st-dot{width:5px;height:5px;border-radius:50%}.st-dot.ok{background:var(--green);box-shadow:0 0 5px rgba(34,197,94,.4)}.st-dot.load{background:var(--amber);animation:bl .5s infinite}.st-dot.err{background:var(--red)}
@keyframes bl{50%{opacity:.2}}

/* SCREENS */
.scr{display:none;padding:14px 16px 90px;animation:fi .25s ease}.scr.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.sbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sbar h2{font-size:.65rem;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.sbar .cnt{font-size:.6rem;color:var(--t4);font-family:var(--m);font-weight:600}
.bbtn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);color:var(--t2);font-size:.65rem;font-weight:700;cursor:pointer;font-family:var(--f);transition:.15s}.bbtn:hover{border-color:var(--amber);color:var(--amber)}
.bbtn svg{width:13px;height:13px}

/* LEAGUES */
.cg{margin-bottom:16px}
.cl{display:flex;align-items:center;gap:5px;font-size:.55rem;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;padding-left:2px}
.lg{display:grid;grid-template-columns:1fr;gap:5px}
@media(min-width:480px){.lg{grid-template-columns:1fr 1fr}}
.lc{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:.15s}
.lc:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.25)}.lc:active{transform:scale(.985)}
.lc .n{font-weight:700;font-size:.8rem;flex:1}.lc .c{background:var(--card);color:var(--t3);font-size:.55rem;font-weight:700;padding:2px 9px;border-radius:20px;font-family:var(--m)}

/* MATCHES */
.mh{margin-bottom:12px}.mh-t{font-size:1rem;font-weight:900;letter-spacing:-.02em;margin-top:3px}
.ml{display:flex;flex-direction:column;gap:6px}
@media(min-width:600px){.ml{display:grid;grid-template-columns:1fr 1fr;gap:6px}}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:.15s}
.mc:hover{border-color:var(--border2);box-shadow:0 3px 14px rgba(0,0,0,.25)}.mc:active{transform:scale(.99)}
.mc-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mc-tm{font-size:.6rem;font-weight:600;color:var(--t3);font-family:var(--m)}
.mc-b{font-size:.45rem;font-weight:800;padding:3px 7px;border-radius:5px;letter-spacing:.2px}
.mc-b.live{background:var(--red);color:#fff;animation:bl .7s infinite}.mc-b.ft{background:var(--card);color:var(--t3);border:1px solid var(--border)}.mc-b.ns{background:var(--card);color:var(--t3);border:1px solid var(--border)}
.mc-r{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.mc-tn{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.84rem}.mc-tn img{width:20px;height:20px;object-fit:contain;border-radius:3px}
.mc-sc{font-size:1.1rem;font-weight:900;font-family:var(--m);min-width:34px;text-align:right;color:var(--t3)}.mc-sc.w{color:var(--amber)}

/* ═══ ANALYSIS PAGE — BettingPro Style ═══ */

/* Hero */
.a-hero{text-align:center;padding:20px 0 16px;position:relative}
.a-info{font-size:.6rem;color:var(--t3);font-weight:600;margin-bottom:14px}
.a-vs{display:flex;align-items:center;justify-content:center;gap:16px}
.a-team{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:90px}
.a-team img{width:44px;height:44px;object-fit:contain}
.a-team .tn{font-size:.78rem;font-weight:800;max-width:120px;text-align:center;line-height:1.2}
.a-score-box{display:flex;align-items:center;gap:4px}
.a-sc{width:38px;height:44px;background:var(--card);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;font-family:var(--m)}
.a-sc.w{border-color:var(--amber-br);color:var(--amber);background:var(--amber-bg)}
.a-vslbl{font-size:.55rem;font-weight:800;color:var(--t4);padding:0 2px}

/* Verify bar */
.vbar{padding:10px 14px;border-radius:var(--rs);text-align:center;font-weight:800;font-size:.72rem;margin:12px 0;border:1px solid}
.vbar.ok{background:var(--green-bg);border-color:var(--green-br);color:var(--green)}
.vbar.ko{background:var(--red-bg);border-color:var(--red-br);color:var(--red)}
.vbar .vd{font-size:.58rem;font-weight:600;margin-top:2px;opacity:.8}

/* ══ BET CARDS ══ */
.bet-section{margin:10px 0}
.bet-label{font-size:.5rem;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.bet-label::before{content:'';width:14px;height:2px;border-radius:1px}

/* Main Pick — big hero card */
.pick-hero{background:linear-gradient(135deg,var(--cyan-bg),rgba(34,211,238,.02));border:1.5px solid var(--cyan-br);border-radius:var(--r);padding:20px;margin:12px 0;text-align:center;position:relative;overflow:hidden}
.pick-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:120px;height:120px;background:radial-gradient(circle,rgba(34,211,238,.08),transparent 70%);pointer-events:none}
.ph-tag{font-size:.46rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--cyan);margin-bottom:8px}
.ph-pick{font-size:2rem;font-weight:900;margin-bottom:2px;letter-spacing:-.02em}
.ph-pct{font-size:1rem;font-weight:700;color:var(--cyan);margin-bottom:10px}
.ph-conf{display:inline-block;font-size:.5rem;font-weight:700;color:var(--t3);background:var(--card);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}

/* Reasons box */
.reasons{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin:10px 0}
.reasons-title{font-size:.5rem;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.reason{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:.72rem;line-height:1.5}
.reason:last-child{margin-bottom:0}
.r-icon{flex-shrink:0;margin-top:2px}

/* Bet cards grid */
.bets-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
@media(min-width:500px){.bets-grid.x3{grid-template-columns:1fr 1fr 1fr}}
.bet-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;position:relative}
.bet-card.rec{border-color:var(--green-br);background:var(--green-bg)}
.bet-card.rec::after{content:'CONSIGLIATO';position:absolute;top:6px;right:6px;font-size:.35rem;font-weight:800;color:var(--green);background:rgba(34,197,94,.12);padding:2px 5px;border-radius:4px;letter-spacing:.5px}
.bc-market{font-size:.42rem;font-weight:800;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.bc-pick{font-size:1.2rem;font-weight:900;margin-bottom:2px}
.bc-pct{font-size:.7rem;font-weight:700;color:var(--t2)}
.bc-line{font-size:.55rem;color:var(--t3);margin-top:4px;font-family:var(--m);font-weight:600}

/* O/U detail */
.ou-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0}
.ou-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px;text-align:center}
.ou-card.rec{border-color:var(--amber-br)}
.ou-val{font-size:.85rem;font-weight:900;font-family:var(--m)}.ou-lbl{font-size:.5rem;color:var(--t3);font-weight:700;margin-top:2px}

/* AI card */
.ai-box{background:linear-gradient(135deg,var(--purple-bg),var(--blue-bg));border:1px solid var(--purple-br);border-radius:var(--r);padding:14px;margin:12px 0}
.ai-tag{display:flex;align-items:center;gap:5px;font-size:.46rem;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--purple);animation:bl 1.5s infinite}
.ai-txt{font-size:.74rem;line-height:1.7;color:var(--t2)}

/* Collapsible */
.sec{margin:8px 0}
.sec-t{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;font-size:.62rem;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;font-family:var(--f);transition:.15s}.sec-t:hover{border-color:var(--border2)}
.sec-a{font-size:.5rem;color:var(--t4);transition:transform .2s}.sec-a.open{transform:rotate(180deg)}
.sec-c{overflow:hidden;max-height:0;transition:max-height .3s}.sec-c.open{max-height:3000px}.sec-i{padding:10px 0}

/* Stats */
.s-row{display:grid;grid-template-columns:1fr 65px 1fr;gap:2px;margin-bottom:2px}
.s-v{font-size:.7rem;font-weight:700;padding:6px 8px;border-radius:5px;background:var(--bg2)}.s-v.l{text-align:right}.s-v.r{text-align:left}.s-v.win{color:var(--green);background:var(--green-bg)}
.s-lab{font-size:.4rem;font-weight:800;color:var(--t4);text-transform:uppercase;display:flex;align-items:center;justify-content:center;text-align:center}
.form-r{display:flex;align-items:center;gap:6px;padding:6px 0}
.form-n{font-size:.65rem;font-weight:700;min-width:65px}
.fd{width:20px;height:20px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:.42rem;font-weight:900;color:#fff}.fd.W{background:var(--green)}.fd.L{background:var(--red)}
.form-p{font-size:.58rem;color:var(--t3);margin-left:auto;font-family:var(--m);font-weight:600}

/* Save */
.save-btn{display:block;width:100%;padding:13px;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--amber),var(--amber-d));color:#000;font-weight:800;font-size:.8rem;cursor:pointer;font-family:var(--f);box-shadow:0 3px 14px rgba(245,166,35,.2);transition:.15s;margin-top:14px}
.save-btn:hover{box-shadow:0 5px 20px rgba(245,166,35,.3)}.save-btn:active{transform:scale(.98)}
.save-btn.done{background:var(--surface);color:var(--green);border:1px solid var(--green-br);box-shadow:none}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;color:var(--t3);text-align:center;gap:6px}
.empty .ei{font-size:2.2rem;margin-bottom:4px}.empty p{font-size:.78rem}
.spin{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:sp .5s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.warn{padding:12px;background:var(--amber-bg);border:1px solid var(--amber-br);border-radius:var(--r);font-size:.72rem;color:var(--amber);text-align:center;font-weight:700;margin:12px 0}
.rbtn{margin-top:8px;padding:9px 20px;background:var(--amber);color:#000;border:0;border-radius:var(--rs);cursor:pointer;font-weight:700;font-family:var(--f);font-size:.72rem}

@media(max-width:480px){
  .hdr{height:48px;padding:0 10px}.logo{font-size:.92rem}.logo-i{width:22px;height:22px;font-size:.7rem}
  .dp{padding:4px 9px;font-size:.58rem}.scr{padding:10px 10px 90px}
  .a-team img{width:36px;height:36px}.a-sc{width:32px;height:38px;font-size:1rem}
  .ph-pick{font-size:1.6rem}.bets-grid{gap:5px}
}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div class="logo"><div class="logo-i">🏀</div>Basket<span>Pro</span><span class="vtag">AI</span></div>
  <div class="dpills"><button class="dp" onclick="goD(-1,this)">Ieri</button><button class="dp on" onclick="goD(0,this)">Oggi</button><button class="dp" onclick="goD(1,this)">Dom</button><button class="dp" onclick="goD(2,this)">+2</button></div>
  <div class="st"><span id="rC">0</span><span class="st-dot load" id="sD"></span><span id="sT">…</span></div>
</div></div>

<div class="scr active" id="s-leagues"><div class="wrap">
  <div class="sbar"><h2>Campionati</h2><span class="cnt" id="lCnt"></span></div>
  <div id="lList"><div class="empty"><div class="spin"></div></div></div>
</div></div>

<div class="scr" id="s-matches"><div class="wrap">
  <div class="sbar"><button class="bbtn" onclick="showS('leagues')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>Indietro</button><span class="cnt" id="mCnt"></span></div>
  <div class="mh"><div class="mh-t" id="mTitle"></div></div>
  <div class="ml" id="mList"></div>
</div></div>

<div class="scr" id="s-analysis"><div class="wrap">
  <div class="sbar"><button class="bbtn" onclick="showS('matches')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>Partite</button></div>
  <div id="anBox"><div class="empty"><div class="spin"></div></div></div>
</div></div>

<script>
const W='https://basketproai.lucalagan.workers.dev';
const FL={'USA':'🇺🇸','Italy':'🇮🇹','Spain':'🇪🇸','France':'🇫🇷','Germany':'🇩🇪','Greece':'🇬🇷','Turkey':'🇹🇷','Australia':'🇦🇺','China':'🇨🇳','Japan':'🇯🇵','Korea':'🇰🇷','South Korea':'🇰🇷','Israel':'🇮🇱','Argentina':'🇦🇷','Brazil':'🇧🇷','Serbia':'🇷🇸','Lithuania':'🇱🇹','Philippines':'🇵🇭','Russia':'🇷🇺','Croatia':'🇭🇷','Slovenia':'🇸🇮','Poland':'🇵🇱','Czech Republic':'🇨🇿','Belgium':'🇧🇪','Netherlands':'🇳🇱','Portugal':'🇵🇹','Finland':'🇫🇮','Sweden':'🇸🇪','Denmark':'🇩🇰','Romania':'🇷🇴','Hungary':'🇭🇺','Bulgaria':'🇧🇬','Latvia':'🇱🇻','Estonia':'🇪🇪','Georgia':'🇬🇪','Mexico':'🇲🇽','Canada':'🇨🇦','Chile':'🇨🇱','Uruguay':'🇺🇾','Venezuela':'🇻🇪','Colombia':'🇨🇴','United Kingdom':'🇬🇧','Iran':'🇮🇷','Lebanon':'🇱🇧','New Zealand':'🇳🇿','Kazakhstan':'🇰🇿','Belarus':'🇧🇾','Europe':'🇪🇺','Euroleague':'🌍','World':'🌍','International':'🌐'};
let ALL=[],off=0,reqs=0;
const $={g:{},s:{},st:{},o:{}};
const ds=o=>{const d=new Date;d.setDate(d.getDate()+o);return d.toISOString().split('T')[0]};
const cl=(a,v,b)=>Math.max(a,Math.min(b,v));
const fm=(v,d=1)=>v!=null&&!isNaN(v)?Number(v).toFixed(d):'—';
const fg=c=>FL[c]||'🏀';
function setS(s,m){document.getElementById('sD').className='st-dot '+s;document.getElementById('sT').textContent=m}

// ═══ API VIA WORKER ═══
async function api(ep,p={}){
  const u=new URL(W+'/api/basketball'+ep);Object.entries(p).forEach(([k,v])=>u.searchParams.append(k,v));
  const ac=new AbortController,t=setTimeout(()=>ac.abort(),18000);
  try{const r=await fetch(u,{signal:ac.signal});clearTimeout(t);reqs++;document.getElementById('rC').textContent=reqs;if(!r.ok)throw Error('HTTP '+r.status);const d=await r.json();if(d.errors&&Object.keys(d.errors).length)throw Error(JSON.stringify(d.errors));return d.response||[]}catch(e){clearTimeout(t);throw e}
}
async function getG(l,s,t){const k=`${l}_${s}_${t}`;if($.g[k])return $.g[k];try{const r=await api('/games',{league:l,season:s,team:t});$.g[k]=r;return r}catch{$.g[k]=[];return[]}}
async function getSt(l,s,t){const k=`${l}_${s}_${t}`;if($.s[k]!==undefined)return $.s[k];try{const r=await api('/statistics',{league:l,season:s,team:t});$.s[k]=r[0]||null;return $.s[k]}catch{$.s[k]=null;return null}}
async function getStd(l,s){const k=`${l}_${s}`;if($.st[k])return $.st[k];try{const r=await api('/standings',{league:l,season:s});$.st[k]=r?.[0]||r||[];return $.st[k]}catch{$.st[k]=[];return[]}}
async function getOd(g){if($.o[g]!==undefined)return $.o[g];try{const r=await api('/odds',{game:g});$.o[g]=r||[];return $.o[g]}catch{$.o[g]=[];return[]}}
async function askAI(p){try{const r=await fetch(W+'/api/groq',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p})});const d=await r.json();return d.text||null}catch{return null}}

function showS(n){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('active'));document.getElementById('s-'+n).classList.add('active');window.scrollTo({top:0,behavior:'instant'})}

// ═══ LEAGUES ═══
async function load(){
  setS('load','…');document.getElementById('lList').innerHTML='<div class="empty"><div class="spin"></div></div>';
  try{ALL=await api('/games',{date:ds(off),timezone:'Europe/Rome'});setS('ok','OK');
    if(!ALL.length){document.getElementById('lList').innerHTML='<div class="empty"><div class="ei">📭</div><p>Nessuna partita</p></div>';document.getElementById('lCnt').textContent='';return}
    renderL();
  }catch(e){setS('err','Errore');document.getElementById('lList').innerHTML=`<div class="empty"><div class="ei">⚠️</div><p>${e.message}</p><button class="rbtn" onclick="load()">Riprova</button></div>`}
}
function renderL(){

  try{[hG,aG,hS,aS,stand,odds]=await Promise.all([getG(lid,szn,hid),getG(lid,szn,aid),getSt(lid,szn,hid),getSt(lid,szn,aid),getStd(lid,szn),getOd(gid)])}catch{}
  if(!hG.length&&!aG.length){const alts=[];if(typeof szn==='string'&&szn.includes('-'))alts.push(szn.split('-')[0]);else{const y=parseInt(szn);alts.push(y+'-'+(y+1),(y-1)+'-'+y)}
    for(const a of alts){const[h2,a2]=await Promise.all([getG(lid,a,hid),getG(lid,a,aid)]);if(h2.length||a2.length){hG=h2;aG=a2;szn=a;[hS,aS,stand]=await Promise.all([getSt(lid,a,hid),getSt(lid,a,aid),getStd(lid,a)]);break}}}

  const allG=[...new Map([...hG,...aG].map(x=>[x.id,x])).values()];

  askAI(pr).then(t=>{const e=document.getElementById(aiId);if(e)e.innerHTML=t||'AI non disponibile.'});

// ═══ STABLE ENGINE v2 ═══
function anG(games,tid){
  const fin=games.filter(g=>['FT','AOT'].includes(g.status?.short)&&g.scores?.home?.total!=null)
    .sort((a,b)=>new Date(a.date)-new Date(b.date)||(a.id-b.id));
  if(!fin.length)return null;
  let tP=0,tO=0,w=0,hW=0,hG=0,aW=0,aG=0;const mg=[],tt=[];
  fin.forEach(g=>{const isH=g.teams.home.id===tid,my=isH?g.scores.home.total:g.scores.away.total,op=isH?g.scores.away.total:g.scores.home.total;
    tP+=my;tO+=op;mg.push(my-op);tt.push(my+op);if(my>op)w++;if(isH){hG++;if(my>op)hW++}else{aG++;if(my>op)aW++}});
  const f6=fin.slice(-6).reverse().map(g=>{const isH=g.teams.home.id===tid;const my=isH?g.scores.home.total:g.scores.away.total;const op=isH?g.scores.away.total:g.scores.home.total;return my>op?'W':'L'});
  const last10=fin.slice(-10);let r10p=0,r10o=0;
  last10.forEach(g=>{const isH=g.teams.home.id===tid;r10p+=(isH?g.scores.home.total:g.scores.away.total);r10o+=(isH?g.scores.away.total:g.scores.home.total)});
  const N=fin.length,ppg=tP/N,opg=tO/N,mm=mg.reduce((s,x)=>s+x,0)/N;
  let str=0;if(f6.length){const f=f6[0];for(const r of f6){if(r===f)str++;else break}if(f==='L')str=-str}
  return{ppg,opg,rPpg:r10p/last10.length,rOpg:r10o/last10.length,wp:w/N,hWP:hG>=3?hW/hG:w/N,aWP:aG>=3?aW/aG:w/N,net:ppg-opg,avgT:tt.reduce((s,x)=>s+x,0)/N,std:Math.sqrt(mg.reduce((s,x)=>s+(x-mm)*(x-mm),0)/N),form:f6,streak:str,N,w}
}
function getH2H(t,o){const all=Object.values($.g).flat();const m=all.filter(g=>['FT','AOT'].includes(g.status?.short)&&((g.teams.home.id===t&&g.teams.away.id===o)||(g.teams.home.id===o&&g.teams.away.id===t)));let w=0;m.forEach(g=>{const h=g.teams.home.id===t,my=h?g.scores.home.total:g.scores.away.total,op=h?g.scores.away.total:g.scores.home.total;if(my>op)w++});return{w,n:m.length}}
function bElo(games){const elo={},K=20;games.filter(g=>['FT','AOT'].includes(g.status?.short)&&g.scores?.home?.total!=null).sort((a,b)=>new Date(a.date)-new Date(b.date)||(a.id-b.id)).forEach(g=>{const h=g.teams.home.id,a=g.teams.away.id;if(!elo[h])elo[h]=1500;if(!elo[a])elo[a]=1500;const hs=g.scores.home.total,as=g.scores.away.total,exp=1/(1+Math.pow(10,-(elo[h]+75-elo[a])/400)),res=hs>as?1:hs<as?0:.5,mov=Math.log(Math.abs(hs-as)+1)*2.2/(Math.abs(elo[h]+75-elo[a])*.001+2.2),adj=K*mov*(res-exp);elo[h]+=adj;elo[a]-=adj});return elo}

function pred(hD,aD,hS,aS,stand,odds,elo,game){
  const hid=game.teams.home.id,aid=game.teams.away.id;
  // M1: ELO 35%
  const hE=elo[hid]||1500,aE=elo[aid]||1500;
  const m1=1/(1+Math.pow(10,-(hE-aE+75)/400))*100;
  // M2: LOG5 25%
  const hwp=cl(.15,hD.hWP,.90),awp=cl(.10,aD.aWP,.85);
  const m2=(hwp*(1-awp))/(hwp*(1-awp)+(1-hwp)*awp)*100;
  // M3: EFFICIENCY 25%
  const m3=100/(1+Math.pow(10,-(hD.net-aD.net+3)/12));
  // M4: FORMA 15%
  const hFW=hD.form.length?hD.form.filter(x=>x==='W').length/hD.form.length:.5;
  const aFW=aD.form.length?aD.form.filter(x=>x==='W').length/aD.form.length:.5;
  let m4=50+(hFW-aFW)*25+cl(-3,(hD.streak-aD.streak)*.8,3);m4=cl(25,m4,75);

  let hProb=m1*.35+m2*.25+m3*.25+m4*.15;
  const h2=getH2H(hid,aid);if(h2.n>=3)hProb+=(h2.w/h2.n-.5)*5;
  const flat=Array.isArray(stand)?stand.flat?.(2)??stand:[];
  const hSt=flat.find(s=>s?.team?.id===hid),aSt=flat.find(s=>s?.team?.id===aid);
  if(hSt?.position&&aSt?.position)hProb+=cl(-2,(aSt.position-hSt.position)*.12,2);
  hProb=Math.round(cl(30,hProb,70));const aProb=100-hProb;

  // Score prediction
  const hPts=Math.round((hD.rPpg*.6+hD.ppg*.4)*.55+(aD.rOpg*.6+aD.opg*.4)*.45+1.5);
  const aPts=Math.round((aD.rPpg*.6+aD.ppg*.4)*.55+(hD.rOpg*.6+hD.opg*.4)*.45-1.5);
  const pTot=hPts+aPts,spread=hPts-aPts;

  // O/U
  const avgT=(hD.avgT+aD.avgT)/2;
  const mLine=Math.round(avgT/5)*5;
  const overP=Math.round(cl(15,100/(1+Math.pow(10,-(pTot-mLine)/15))*100,85));
  const ouList=[];for(let x=-10;x<=10;x+=5){const l=mLine+x;if(l<80||l>400)continue;ouList.push({l,o:Math.round(cl(10,100/(1+Math.pow(10,-(pTot-l)/15))*100,90)),m:x===0})}

  // Handicap: spread arrotondato a .5
  const hcap=spread>0?Math.round(spread*2)/2:Math.round(spread*2)/2;
  const hcapTeam=spread>=0?game.teams.home.name:game.teams.away.name;
  const hcapLine=Math.abs(hcap)||1.5;
  const hcapConf=cl(40,50+Math.abs(spread)*2,75);

  // Concordance
  const s=p=>p>55?'H':p<45?'A':'X',sides=[s(m1),s(m2),s(m3),s(m4)];
  const conc=Math.max(sides.filter(x=>x==='H').length,sides.filter(x=>x==='A').length);
  const dq=Math.min(100,Math.round((Math.min(hD.N,30)/30*50)+(Math.min(aD.N,30)/30*50)));
  const conf=cl(25,Math.round(80-((Math.max(m1,m2,m3,m4)-Math.min(m1,m2,m3,m4))*.5)+(conc>=3?10:0)),85);

  // Odds
  let bkH=null,bkA=null,value=null;
  if(odds?.length){odds.forEach(o=>{(o.bookmakers||[]).forEach(b=>{(b.bets||[]).forEach(bt=>{if(bt.name==='Home/Away'||bt.name==='Match Winner'){(bt.values||[]).forEach(v=>{if(v.value==='Home'&&!bkH)bkH=parseFloat(v.odd);if(v.value==='Away'&&!bkA)bkA=parseFloat(v.odd)})}})})});
    if(bkH&&bkA){const iH=1/bkH*100,iA=1/bkA*100,eH=hProb-iH,eA=aProb-iA;
    if(eH>5)value={s:'Casa',e:eH,p:hProb,bp:iH,o:bkH,t:game.teams.home.name};
    else if(eA>5)value={s:'Ospite',e:eA,p:aProb,bp:iA,o:bkA,t:game.teams.away.name}}}

  const fav=hProb>=50?game.teams.home.name:game.teams.away.name,favP=Math.max(hProb,aProb);
  const pick=hProb>=50?'1 (Casa)':'2 (Ospite)';
  const ouPick=overP>55?'OVER':'UNDER';

  // Build reasons
  const reasons=[];
  if(Math.abs(hE-aE)>80)reasons.push({icon:'📊',text:`Elo ${Math.round(hE)} vs ${Math.round(aE)} — ${hE>aE?game.teams.home.name:game.teams.away.name} nettamente superiore`});
  else reasons.push({icon:'📊',text:`Elo simile (${Math.round(hE)} vs ${Math.round(aE)}) — partita equilibrata`});
  if(Math.abs(hD.net-aD.net)>4)reasons.push({icon:'💪',text:`Net rating ${fav} superiore di ${fm(Math.abs(hD.net-aD.net),1)} punti per partita`});
  if(hFW!==aFW)reasons.push({icon:'🔥',text:`Forma recente: ${game.teams.home.name} ${(hFW*100).toFixed(0)}%W vs ${game.teams.away.name} ${(aFW*100).toFixed(0)}%W`});
  reasons.push({icon:'🏠',text:'Fattore campo: +3 punti vantaggio per la squadra di casa'});
  if(h2.n>=2)reasons.push({icon:'⚔️',text:`H2H: ${h2.n} scontri, ${game.teams.home.name} ${h2.w}W`});

  return{hProb,aProb,fH:hPts,fA:aPts,pTot,spread,m1:Math.round(m1*10)/10,m2:Math.round(m2*10)/10,m3:Math.round(m3*10)/10,m4:Math.round(m4*10)/10,conc,conf,dq,mLine,overP,ouList,ouPick,hD,aD,hE,aE,fav,favP,bkH,bkA,value,pick,hcapTeam,hcapLine,hcapConf,reasons,h2,hFW,aFW}
}

    <div class="sec"><button class="sec-t" onclick="tS(this)"><span>🔬 4 Modelli</span><span class="sec-a">▼</span></button><div class="sec-c"><div class="sec-i">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px;text-align:center"><div style="font-size:.4rem;font-weight:800;color:var(--t4);text-transform:uppercase">Elo 35%</div><div style="font-size:1rem;font-weight:900;color:${R.m1>55?'var(--green)':R.m1<45?'var(--blue)':'var(--t3)'}">${fm(R.m1,1)}%</div></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px;text-align:center"><div style="font-size:.4rem;font-weight:800;color:var(--t4);text-transform:uppercase">Log5 25%</div><div style="font-size:1rem;font-weight:900;color:${R.m2>55?'var(--green)':R.m2<45?'var(--blue)':'var(--t3)'}">${fm(R.m2,1)}%</div></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px;text-align:center"><div style="font-size:.4rem;font-weight:800;color:var(--t4);text-transform:uppercase">Efficiency 25%</div><div style="font-size:1rem;font-weight:900;color:${R.m3>55?'var(--green)':R.m3<45?'var(--blue)':'var(--t3)'}">${fm(R.m3,1)}%</div></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px;text-align:center"><div style="font-size:.4rem;font-weight:800;color:var(--t4);text-transform:uppercase">Forma 15%</div><div style="font-size:1rem;font-weight:900;color:${R.m4>55?'var(--green)':R.m4<45?'var(--blue)':'var(--t3)'}">${fm(R.m4,1)}%</div></div>
      </div>
    </div></div></div>

    <!-- STATS -->
    <div class="sec"><button class="sec-t" onclick="tS(this)"><span>📊 Statistiche</span><span class="sec-a">▼</span></button><div class="sec-c"><div class="sec-i"><div style="display:flex;justify-content:space-between;font-size:.5rem;font-weight:800;padding:0 8px;margin-bottom:4px"><span style="color:var(--green)">${sn(hn)}</span><span style="color:var(--blue)">${sn(an)}</span></div>${stH}</div></div></div>

    <!-- FORMA -->
    <div class="sec"><button class="sec-t" onclick="tS(this)"><span>🔥 Forma</span><span class="sec-a">▼</span></button><div class="sec-c"><div class="sec-i">
      <div class="form-r"><span class="form-n" style="color:var(--green)">${sn(hn)}</span><div style="display:flex;gap:3px">${fD(R.hD.form)}</div><span class="form-p">${(R.hFW*100).toFixed(0)}%</span></div>
      <div class="form-r"><span class="form-n" style="color:var(--blue)">${sn(an)}</span><div style="display:flex;gap:3px">${fD(R.aD.form)}</div><span class="form-p">${(R.aFW*100).toFixed(0)}%</span></div>
      ${R.h2.n?`<div style="font-size:.6rem;color:var(--t3);margin-top:4px;font-weight:600">H2H: ${R.h2.n}g · ${sn(hn)} ${R.h2.w}W</div>`:''}</div></div></div>

    <button class="save-btn" id="saveBtn" onclick="saveP(${g.id})">⭐ Salva pronostico</button>`;

  requestAnimationFrame(()=>{const h=document.getElementById('pbH'),a=document.getElementById('pbA');if(h)h.style.width=R.hProb+'%';if(a)a.style.width=R.aProb+'%'});
}
function tS(b){b.nextElementSibling.classList.toggle('open');b.querySelector('.sec-a').classList.toggle('open')}

async function saveP(gid){
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='Salvataggio…';
  const g=ALL.find(x=>x.id===gid);if(!g){btn.textContent='❌';return}
  const lid=g.league.id,szn=g.league?.season||g.season||'2024-2025',hid=g.teams.home.id,aid=g.teams.away.id;
  const hG=$.g[`${lid}_${szn}_${hid}`]||[],aG=$.g[`${lid}_${szn}_${aid}`]||[];
  const hD=anG(hG,hid),aD=anG(aG,aid);if(!hD||!aD){btn.textContent='❌';return}
  const allG=[...new Map([...hG,...aG].map(x=>[x.id,x])).values()];
  const R=pred(hD,aD,$.s[`${lid}_${szn}_${hid}`],$.s[`${lid}_${szn}_${aid}`],$.st[`${lid}_${szn}`]||[],$.o[gid]||[],bElo(allG),g);
  const ft=['FT','AOT'].includes(g.status.short);
  const data={gameId:gid,match:`${g.teams.home.name} vs ${g.teams.away.name}`,league:g.league.name,date:g.date,pick:R.pick,pickTeam:R.fav,homeProb:R.hProb,awayProb:R.aProb,predScore:`${R.fH}-${R.fA}`,handicap:`${R.hcapTeam} -${R.hcapLine}`,ouLine:R.mLine,ouPick:R.ouPick,confidence:R.conf,savedAt:new Date().toISOString(),result:ft&&g.scores?.home?.total!=null?{h:g.scores.home.total,a:g.scores.away.total}:'pending'};
  try{const r=await fetch(W+'/api/firebase/picks.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});if(!r.ok)throw Error(r.status);btn.textContent='✅ Salvato!';btn.classList.add('done')}catch(e){btn.textContent='❌ '+e.message;btn.disabled=false}
}
function goD(o,e){off=o;document.querySelectorAll('.dp').forEach(b=>b.classList.remove('on'));e.classList.add('on');showS('leagues');load()}
document.addEventListener('DOMContentLoaded',load);
</script>
</body>
</html>
