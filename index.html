<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BasketPro AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c18;--bg2:#0c1222;--card:#111a2e;--card2:#152036;--elev:#1a2844;--hover:#1f3050;--brd:#162040;--brd2:#1e3055;--w:#f0f4ff;--s:#94a3c8;--m:#5e7094;--d:#3a4e70;--cyan:#00d4ff;--cyand:rgba(0,212,255,.1);--green:#00e57a;--greend:rgba(0,229,122,.1);--orange:#ff9f1a;--oranged:rgba(255,159,26,.1);--red:#ff475a;--redd:rgba(255,71,90,.1);--yellow:#ffc800;--yellowd:rgba(255,200,0,.1);--r:12px;--r2:16px;--font:'Outfit',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--w);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--m);border-radius:2px}
.hdr{background:rgba(12,18,34,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd);padding:12px 20px;position:sticky;top:0;z-index:100}
.hdr-in{max-width:780px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#00d4ff,#00e57a);display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 4px 20px rgba(0,212,255,.3)}
.logo-text{font-size:1.25rem;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,#00d4ff,#00e57a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-badge{font-size:.5rem;font-weight:800;background:var(--cyand);color:var(--cyan);padding:3px 8px;border-radius:5px;letter-spacing:1px}
.api-info{display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--m)}
.api-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(0,229,122,.5);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.datebar{background:var(--bg2);border-bottom:1px solid var(--brd);padding:10px 20px}
.datebar-in{max-width:780px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:8px}
.dbtn{width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--brd);color:var(--s);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:.2s;font-family:var(--font)}
.dbtn:hover{background:var(--elev);color:var(--w)}
.dlbl{min-width:170px;text-align:center;font-size:.85rem;font-weight:700;padding:8px 18px;border-radius:10px;background:var(--card);border:1px solid var(--brd)}
.bread{max-width:780px;margin:0 auto;padding:12px 20px 4px;display:flex;align-items:center;gap:6px;font-size:.75rem;flex-wrap:wrap}
.bl{color:var(--cyan);cursor:pointer;font-weight:600}.bl:hover{opacity:.7}.bsep{color:var(--d)}.bcur{color:var(--s);font-weight:600}
.main{max-width:780px;margin:0 auto;padding:8px 20px 30px}
.stitle{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1.8px;color:var(--m);padding:14px 0 8px}
.list{display:flex;flex-direction:column;gap:6px}
.item{display:flex;align-items:center;gap:14px;padding:15px 18px;background:var(--card);border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;transition:.2s}
.item:hover{background:var(--hover);border-color:var(--brd2)}.item:active{transform:scale(.985)}
.l-flag{font-size:1.5rem;width:36px;text-align:center}
.l-info{flex:1}.l-name{font-size:.92rem;font-weight:700}.l-country{font-size:.72rem;color:var(--m)}
.l-count{font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:6px;font-family:var(--mono)}
.l-arr{color:var(--m);font-size:.9rem;transition:.2s}.item:hover .l-arr{transform:translateX(3px);color:var(--cyan)}
.g-teams{flex:1;min-width:0}.g-team{display:flex;align-items:center;gap:8px;padding:3px 0}
.g-logo{width:22px;height:22px;border-radius:4px;object-fit:contain}
.g-name{font-size:.84rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-scores{display:flex;flex-direction:column;align-items:center;min-width:30px}
.g-sc{font-family:var(--mono);font-size:1rem;font-weight:800}
.g-meta{display:flex;flex-direction:column;align-items:flex-end;min-width:52px}
.g-st{font-size:.64rem;font-weight:700;padding:3px 7px;border-radius:5px}
.g-st.live{background:var(--greend);color:var(--green)}.g-st.ft{background:var(--elev);color:var(--m)}.g-st.ns{background:var(--cyand);color:var(--cyan)}
.hero{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--brd);border-radius:var(--r2);padding:24px 20px;text-align:center;margin-bottom:14px}
.hero-league{font-size:.72rem;color:var(--m);font-weight:600;margin-bottom:16px;letter-spacing:.5px}
.hero-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px}
.hero-team{display:flex;flex-direction:column;align-items:center;gap:8px}
.hero-logo{width:64px;height:64px;border-radius:16px;background:var(--elev);padding:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.hero-logo img{width:100%;height:100%;object-fit:contain}
.hero-name{font-size:.9rem;font-weight:800;max-width:120px;text-align:center;line-height:1.15}
.hero-rec{font-size:.68rem;color:var(--m);font-family:var(--mono)}
.hero-form{display:flex;gap:3px;justify-content:center;margin-top:4px}
.fd{width:20px;height:20px;border-radius:5px;font-size:.55rem;font-weight:900;display:flex;align-items:center;justify-content:center}
.fd.W{background:var(--greend);color:var(--green)}.fd.L{background:var(--redd);color:var(--red)}
.hero-center{display:flex;flex-direction:column;align-items:center;gap:6px}
.hero-score{font-family:var(--mono);display:flex;align-items:center;gap:8px}
.hero-score .s{width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:1.3rem;font-weight:900}
.hero-score .s.h{background:var(--cyan);color:var(--bg)}.hero-score .s.a{background:var(--elev)}
.hero-vs{font-size:.75rem;font-weight:900;color:var(--orange)}
.pred-hero{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:20px;margin-bottom:14px}
.pred-title{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--m);text-align:center;margin-bottom:14px}
.pred-main{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:16px}
.pred-team{text-align:center}
.pred-pts{font-size:2.5rem;font-weight:900;font-family:var(--mono);line-height:1}
.pred-pts.hc{color:var(--cyan)}.pred-pts.ac{color:var(--orange)}
.pred-pct{font-size:.9rem;font-weight:700;margin-top:4px}.pred-pct.hc{color:var(--cyan)}.pred-pct.ac{color:var(--orange)}
.pred-tn{font-size:.72rem;font-weight:700;color:var(--s);margin-top:4px}
.pred-vs{font-size:.9rem;font-weight:900;color:var(--d)}
.ou-section{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ou-box{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:14px;text-align:center}
.ou-label{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.ou-label.over{color:var(--green)}.ou-label.under{color:var(--red)}
.ou-val{font-size:1.6rem;font-weight:900;font-family:var(--mono)}
.ou-odds{font-size:.82rem;font-weight:700;font-family:var(--mono);margin-top:4px;color:var(--cyan)}
.ou-bar{height:8px;border-radius:4px;background:var(--bg);margin-top:8px;overflow:hidden;display:flex}
.ou-fill-o{height:100%;background:var(--green);transition:width 1s}.ou-fill-u{height:100%;background:var(--red);transition:width 1s}
.advice{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:20px;margin-bottom:14px}
.advice-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.advice-left{display:flex;align-items:center;gap:10px}.advice-icon{font-size:1.5rem}
.advice-meta{display:flex;flex-direction:column}.advice-label{font-size:.72rem;font-weight:800;color:var(--cyan)}.advice-sub{font-size:.62rem;color:var(--m)}
.advice-conf{font-size:.68rem;font-weight:700;padding:4px 10px;border-radius:6px}
.advice-conf.high{background:var(--greend);color:var(--green)}.advice-conf.med{background:var(--oranged);color:var(--orange)}.advice-conf.low{background:var(--redd);color:var(--red)}
.advice-pick{text-align:center;padding:16px;background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--r);margin-bottom:14px}
.advice-pick-lbl{font-size:.62rem;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.advice-pick-val{font-size:1.4rem;font-weight:900;margin-bottom:4px}
.advice-pick-prob{font-size:.9rem;font-weight:700;color:var(--cyan)}
.conc{padding:10px 16px;border-radius:8px;font-size:.78rem;font-weight:700;text-align:center;margin-bottom:14px}
.conc.agree{background:var(--greend);color:var(--green);border:1px solid rgba(0,229,122,.25)}
.conc.partial{background:var(--yellowd);color:var(--yellow);border:1px solid rgba(255,200,0,.2)}
.conc.disagree{background:var(--redd);color:var(--red);border:1px solid rgba(255,71,90,.2)}
.reasons{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.reason{display:flex;align-items:flex-start;gap:8px;font-size:.75rem;padding:8px 12px;border-radius:8px;background:var(--bg2);border:1px solid var(--brd)}
.reason-ico{flex-shrink:0}
.probbar{margin-bottom:14px}
.probbar-l{display:flex;justify-content:space-between;font-size:.75rem;font-weight:700;margin-bottom:5px}
.probbar-t{height:10px;border-radius:5px;background:var(--bg);overflow:hidden;display:flex}
.probbar-h{height:100%;background:var(--cyan);transition:width 1s}.probbar-a{height:100%;background:var(--orange);transition:width 1s}
.stats{margin-bottom:14px}
.stat-row{display:grid;grid-template-columns:1fr 120px 1fr;gap:4px;margin-bottom:2px;align-items:center}
.stat-v{font-family:var(--mono);font-size:.82rem;font-weight:700;padding:9px 12px;border-radius:6px;background:var(--bg2)}
.stat-v.l{text-align:right}.stat-v.r{text-align:left}.stat-v.win{color:var(--green);background:var(--greend);font-weight:800}
.stat-lbl{text-align:center;font-size:.55rem;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.3px;line-height:1.2}
.exact-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.exact-box{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:10px 6px;text-align:center}
.exact-sc{font-size:1rem;font-weight:900;font-family:var(--mono)}
.exact-od{font-size:.75rem;font-weight:700;color:var(--cyan);font-family:var(--mono);margin-top:2px}
.exact-pc{font-size:.6rem;color:var(--m);font-weight:600;margin-top:1px}
.ld{display:none;position:fixed;inset:0;background:rgba(8,12,24,.93);backdrop-filter:blur(16px);z-index:200;flex-direction:column;justify-content:center;align-items:center;gap:16px}
.ld.show{display:flex}
.ld-spin{width:44px;height:44px;border:3px solid var(--brd);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text{font-size:.85rem;color:var(--s);text-align:center;max-width:260px}
.ld-bar{width:200px;height:3px;background:var(--elev);border-radius:2px;overflow:hidden}.ld-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));width:0;transition:width .3s}
.empty{text-align:center;padding:50px 20px}.empty-icon{font-size:2.5rem;opacity:.25;margin-bottom:12px}.empty-title{font-size:1rem;font-weight:700;margin-bottom:6px}.empty-desc{font-size:.82rem;color:var(--m);max-width:300px;margin:0 auto}
.foot{text-align:center;padding:20px;font-size:.65rem;color:var(--d);border-top:1px solid var(--brd);margin-top:20px}
@media(min-width:900px){.hero{padding:30px}.hero-logo{width:72px;height:72px}.hero-name{font-size:1rem;max-width:140px}.pred-pts{font-size:3rem}}
@media(max-width:480px){html{font-size:15px}.main{padding:6px 14px 24px}.hero{padding:18px 14px}.hero-logo{width:50px;height:50px;border-radius:12px}.hero-name{font-size:.8rem;max-width:90px}.hero-score .s{width:38px;height:38px;font-size:1.1rem}.pred-pts{font-size:2rem}.pred-hero{padding:16px 14px}.exact-grid{grid-template-columns:repeat(2,1fr)}.stat-row{grid-template-columns:1fr 90px 1fr}}
@media(max-width:360px){.main{padding:5px 10px 20px}.hero-name{font-size:.72rem;max-width:70px}.pred-pts{font-size:1.8rem}.stat-row{grid-template-columns:1fr 70px 1fr}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .35s ease both}
.anim:nth-child(2){animation-delay:.04s}.anim:nth-child(3){animation-delay:.08s}.anim:nth-child(4){animation-delay:.12s}.anim:nth-child(5){animation-delay:.16s}.anim:nth-child(6){animation-delay:.2s}.anim:nth-child(7){animation-delay:.24s}.anim:nth-child(8){animation-delay:.28s}
</style>
</head>
<body>
<header class="hdr"><div class="hdr-in"><div class="logo"><div class="logo-icon">🏀</div><span class="logo-text">BasketPro</span><span class="logo-badge">AI v5</span></div><div class="api-info"><span class="api-dot"></span>API Pro</div></div></header>
<div class="datebar"><div class="datebar-in"><button class="dbtn" onclick="chgDate(-1)">‹</button><div class="dlbl" id="dlbl"></div><button class="dbtn" onclick="chgDate(1)">›</button></div></div>
<div id="bread" class="bread" style="display:none"></div>
<div class="main" id="app"><div class="empty"><div class="empty-icon">🏀</div><div class="empty-title">Caricamento...</div></div></div>
<div class="ld" id="ld"><div class="ld-spin"></div><div class="ld-text" id="ldT">Caricamento...</div><div class="ld-bar"><div class="ld-fill" id="ldF"></div></div></div>
<footer class="foot">BasketPro AI v5 — Normal Distribution + Log5 + Efficiency Ratings<br>Le previsioni non garantiscono risultati. Gioca responsabilmente.</footer>
<script>
const K='aeb2864a3d4dbb8395fa53c83a876a93',B='https://v1.basketball.api-sports.io';
const LEAGUES=[{id:4,n:'BBL',c:'Germania',f:'🇩🇪',s:'2025-2026'},{id:80,n:'CBA',c:'Cina',f:'🇨🇳',s:'2025-2026'},{id:13,n:'Euroleague',c:'Europa',f:'🇪🇺',s:'2025-2026'},{id:2,n:'Greek Basket League',c:'Grecia',f:'🇬🇷',s:'2025-2026'},{id:117,n:'Liga ACB',c:'Spagna',f:'🇪🇸',s:'2025-2026'},{id:12,n:'NBA',c:'USA',f:'🇺🇸',s:'2025-2026'},{id:116,n:'NCAA',c:'USA College',f:'🇺🇸',s:'2025-2026'},{id:5,n:'Pro A',c:'Francia',f:'🇫🇷',s:'2025-2026'},{id:120,n:'Serie A',c:'Italia',f:'🇮🇹',s:'2025-2026'}].sort((a,b)=>a.n.localeCompare(b.n));
let D=new Date(),V='leagues',CL=null,GC={},SC={};
function normCDF(x){if(x<-8)return 0;if(x>8)return 1;const s=x<0?-1:1;x=Math.abs(x)/Math.SQRT2;const t=1/(1+.3275911*x);return .5*(1+s*(1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-.284496736)*t+.254829592)*t*Math.exp(-x*x)))}
function log5(a,b){a=Math.max(.01,Math.min(.99,a));b=Math.max(.01,Math.min(.99,b));return(a*(1-b))/(a*(1-b)+(1-a)*b)}
function clamp(lo,v,hi){return Math.max(lo,Math.min(hi,v))}
function pf(v){return v!=null?parseFloat(v):null}
function getSD(l){return{12:12,116:11,13:10,120:10,117:10,5:10,2:10,4:10,80:11}[l]||11}
function getHCA(l){return{12:3.2,116:3.5,13:4,120:4.5,117:3.8,5:3.5,2:4,4:3.5,80:4}[l]||3.5}
async function api(ep,p={}){const u=new URL(B+ep);Object.entries(p).forEach(([k,v])=>{if(v!=null)u.searchParams.set(k,v)});try{const r=await fetch(u,{headers:{'x-apisports-key':K}});const d=await r.json();return d.response||[]}catch(e){return[]}}
function showL(t,p){document.getElementById('ld').classList.add('show');document.getElementById('ldT').textContent=t;document.getElementById('ldF').style.width=p+'%'}
function hideL(){document.getElementById('ld').classList.remove('show')}
function fd(d){return d.toISOString().split('T')[0]}
function updD(){document.getElementById('dlbl').textContent=D.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'})}
function chgDate(n){D.setDate(D.getDate()+n);updD();V==='games'&&CL?showGames(CL):showLeagues()}
function setBread(items){const e=document.getElementById('bread');if(!items){e.style.display='none';return}e.style.display='flex';e.innerHTML=items.map((x,i)=>i<items.length-1?`<span class="bl" onclick="${x.a}">${x.l}</span><span class="bsep">›</span>`:`<span class="bcur">${x.l}</span>`).join('')}

async function showLeagues(){V='leagues';CL=null;setBread(null);showL('Caricamento partite...',20);
const all=await api('/games',{date:fd(D)});hideL();
const lc={};all.forEach(g=>{const id=g.league?.id;if(id){if(!lc[id])lc[id]={n:0,s:g.league.season};lc[id].n++}});
const dl=LEAGUES.map(l=>({...l,g:lc[l.id]?.n||0,sa:lc[l.id]?.s||l.s}));
const ki=new Set(LEAGUES.map(x=>x.id));
Object.entries(lc).forEach(([id,v])=>{if(!ki.has(+id))dl.push({id:+id,n:all.find(g=>g.league?.id==id)?.league?.name||'League '+id,c:'',f:'🏀',s:v.s,g:v.n,sa:v.s})});
const wg=dl.filter(x=>x.g>0).sort((a,b)=>a.n.localeCompare(b.n));
const ng=dl.filter(x=>x.g===0&&ki.has(x.id)).sort((a,b)=>a.n.localeCompare(b.n));
const app=document.getElementById('app');
if(!wg.length){app.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Nessuna partita oggi</div><div class="empty-desc">Cambia data per trovare partite.</div></div><div class="stitle">Tutti i campionati (A-Z)</div><div class="list">${LEAGUES.map(l=>liH(l,0,1)).join('')}</div>`;return}
app.innerHTML=`<div class="stitle">Campionati con partite (A-Z)</div><div class="list">${wg.map(l=>liH(l,l.g)).join('')}</div>${ng.length?`<div class="stitle" style="margin-top:16px">Altri campionati</div><div class="list">${ng.map(l=>liH(l,0,1)).join('')}</div>`:''}`}

function liH(l,g,dim){const col=g>=5?'var(--cyan)':g>=3?'var(--green)':g>0?'var(--orange)':'var(--m)';const d=JSON.stringify({id:l.id,n:l.n,c:l.c||'',f:l.f||'🏀',s:l.sa||l.s}).replace(/'/g,"\\'");return`<div class="item anim" onclick='showGames(${d})' ${dim?'style="opacity:.35"':''}><div class="l-flag">${l.f||'🏀'}</div><div class="l-info"><div class="l-name">${l.n}</div><div class="l-country">${l.c||''}</div></div><span class="l-count" style="color:${col}">${g}</span><div class="l-arr">›</div></div>`}

async function showGames(lg){if(typeof lg==='string')lg=JSON.parse(lg);V='games';CL=lg;setBread([{l:'🏠 Campionati',a:'showLeagues()'},{l:`${lg.f} ${lg.n}`}]);showL(`${lg.n}...`,30);const games=await api('/games',{date:fd(D),league:lg.id,season:lg.s});hideL();GC[lg.id]=games;
if(!games.length){document.getElementById('app').innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Nessuna partita</div></div>`;return}
games.sort((a,b)=>{const o=s=>['Q1','Q2','Q3','Q4','HT','OT','BT'].includes(s)?0:['NS','PST','TBD'].includes(s)?1:2;return o(a.status?.short)-o(b.status?.short)});
let h=`<div class="stitle">${lg.n} — ${games.length} partite</div><div class="list">`;

function predict(game,hs,as,standings,hG,aG,lid){
const hn=game.teams.home.name,an=game.teams.away.name,hid=game.teams.home.id,aid=game.teams.away.id,reasons=[];
const hGP=hs?.games?.played?.all||0,aGP=as?.games?.played?.all||0,ok=hGP>=3&&aGP>=3;
const hPPG=pf(hs?.points?.for?.average?.all),aPPG=pf(as?.points?.for?.average?.all);
const hDef=pf(hs?.points?.against?.average?.all),aDef=pf(as?.points?.against?.average?.all);
const hHP=pf(hs?.points?.for?.average?.home)||hPPG,aAP=pf(as?.points?.for?.average?.away)||aPPG;
const hHD=pf(hs?.points?.against?.average?.home)||hDef,aAD=pf(as?.points?.against?.average?.away)||aDef;
const hWP=pf(hs?.games?.wins?.all?.percentage),aWP=pf(as?.games?.wins?.all?.percentage);
const hHW=pf(hs?.games?.wins?.home?.percentage),aAW=pf(as?.games?.wins?.away?.percentage);
// Fallback: calc PPG from recent games if API stats are null
function calcFromGames(games,tid){if(!games||!games.length)return{ppg:null,def:null};const fg=games.filter(x=>(x.status?.short==='FT'||x.status?.short==='AOT')&&x.scores?.home?.total!=null).slice(0,10);if(!fg.length)return{ppg:null,def:null};let pts=0,opp=0;fg.forEach(g=>{const isH=g.teams.home.id===tid;pts+=isH?g.scores.home.total:g.scores.away.total;opp+=isH?g.scores.away.total:g.scores.home.total});return{ppg:pts/fg.length,def:opp/fg.length,n:fg.length}}
const hCalc=calcFromGames(hG,hid),aCalc=calcFromGames(aG,aid);
const fhPPG=hPPG!=null?hPPG:hCalc.ppg!=null?hCalc.ppg:78;
const faPPG=aPPG!=null?aPPG:aCalc.ppg!=null?aCalc.ppg:76;
const fhDef=hDef!=null?hDef:hCalc.def!=null?hCalc.def:78;
const faDef=aDef!=null?aDef:aCalc.def!=null?aCalc.def:76;
const fhHP=hHP!=null?hHP:fhPPG;const faAP=aAP!=null?aAP:faPPG;
const fhHD=hHD!=null?hHD:fhDef;const faAD=aAD!=null?aAD:faDef;
const hNet=fhPPG-fhDef,aNet=faPPG-faDef;
const hSt=standings.find(s=>s.team?.id===hid),aSt=standings.find(s=>s.team?.id===aid);
// PREDICTED SCORE: offense/defense crossover with H/A splits
let predH=fhHP*.55+faAD*.45;
let predA=faAP*.55+fhHD*.45;
const hForm=getForm(hG,hid),aForm=getForm(aG,aid);
const hFW=hForm.slice(0,5).filter(r=>r==='W').length,aFW=aForm.slice(0,5).filter(r=>r==='W').length;
if(hForm.length>=3){predH*=hFW>=4?1.04:hFW>=3?1.02:hFW<=1?.96:1;predA*=aFW>=4?1.04:aFW>=3?1.02:aFW<=1?.96:1;reasons.push({t:`Forma L5: ${hn} ${hFW}W — ${an} ${aFW}W`,type:hFW>aFW?'pos':hFW<aFW?'neg':'neu'})}
const h2h=getH2H(hG,hid,aid);if(h2h.t>=2){const d=(h2h.h-h2h.a)/h2h.t;predH*=1+d*.03;predA*=1-d*.03;reasons.push({t:`H2H: ${h2h.h}-${h2h.a} (${h2h.t}g)`,type:h2h.h>h2h.a?'pos':h2h.h<h2h.a?'neg':'neu'})}
const hca=getHCA(lid);predH+=hca*.3;predA-=hca*.2;reasons.push({t:`Fattore campo: +${hca.toFixed(1)} pts`,type:'neu'});
if(hSt&&aSt){const pd=aSt.position-hSt.position;if(Math.abs(pd)>3){predH+=clamp(-2,pd*.15,2);predA-=clamp(-2,pd*.15,2);reasons.push({t:`Classifica: ${hn} #${hSt.position} vs ${an} #${aSt.position}`,type:pd>0?'pos':'neg'})}}
if(Math.abs(hNet-aNet)>3)reasons.push({t:`Net Rating: ${hn} ${hNet>0?'+':''}${hNet.toFixed(1)} | ${an} ${aNet>0?'+':''}${aNet.toFixed(1)}`,type:hNet>aNet?'pos':'neg'});
if(hPPG&&aPPG&&Math.abs(hPPG-aPPG)>4)reasons.push({t:`Attacco: ${hPPG.toFixed(1)} vs ${aPPG.toFixed(1)} PPG`,type:hPPG>aPPG?'pos':'neg'});
if(hDef&&aDef&&Math.abs(hDef-aDef)>3)reasons.push({t:`Difesa: ${hDef.toFixed(1)} vs ${aDef.toFixed(1)} subiti`,type:hDef<aDef?'pos':'neg'});
if(hHW!=null&&hHW>.65)reasons.push({t:`${hn} forte in casa (${(hHW*100).toFixed(0)}%)`,type:'pos'});
if(aAW!=null&&aAW>.55)reasons.push({t:`${an} forte fuori (${(aAW*100).toFixed(0)}%)`,type:'neg'});
if(aAW!=null&&aAW<.3)reasons.push({t:`${an} debole fuori (${(aAW*100).toFixed(0)}%)`,type:'pos'});
predH=Math.round(clamp(50,predH,150));predA=Math.round(clamp(45,predA,145));
const predTot=predH+predA,spread=predH-predA,SD=getSD(lid);
const normP=normCDF(spread/SD)*100;let log5P=50;
if(hWP&&aWP)log5P=log5(hHW||hWP,aAW||aWP)*100;
let hProb=ok&&hWP&&aWP?normP*.6+log5P*.4:normP;hProb=clamp(5,hProb,95);const aProb=100-hProb;
const SDt=SD*1.3,mainLine=Math.round(predTot/5)*5;
const overP=clamp(12,(1-normCDF((mainLine-predTot)/SDt))*100,88),underP=100-overP;
const ouLines=[];for(let off=-10;off<=10;off+=5){const l=mainLine+off;if(l<100||l>300)continue;ouLines.push({line:l,oP:Math.round(clamp(8,(1-normCDF((l-predTot)/SDt))*100,92))})}
const probDiff=Math.abs(hProb-aProb),dq=[hs,as,hSt,aSt].filter(Boolean).length/4;
const conf=clamp(20,Math.round(probDiff*.45+dq*30+(hForm.length>=3?15:9)+reasons.length*1.5),95);
const aiSide=hProb>55?'1':aProb>55?'2':'X',statSide=normP>55?'1':normP<45?'2':'X';
const conc=aiSide===statSide?'agree':(aiSide==='X'||statSide==='X')?'partial':'disagree';
const mainPred=hProb>55?'1 Casa':aProb>55?'2 Ospite':'X Equilibrata';
const exact=[];for(let dh=-6;dh<=6;dh+=3)for(let da=-6;da<=6;da+=3){const h=predH+dh,a=predA+da;if(h<50||a<45)continue;exact.push({h,a,p:Math.max(2,Math.round(20*Math.exp(-(dh*dh+da*da)/(SD*SD/3))))})}
exact.sort((a,b)=>b.p-a.p);const topE=exact.slice(0,4);const tp=topE.reduce((s,x)=>s+x.p,0);topE.forEach(x=>x.p=Math.round(x.p/tp*40));
return{hProb:hProb.toFixed(1),aProb:aProb.toFixed(1),normP:normP.toFixed(1),log5P:log5P.toFixed(1),predH,predA,predTot,spread,conf,mainPred,conc,aiSide,statSide,reasons,hForm:hForm.slice(0,5),aForm:aForm.slice(0,5),hPPG:fhPPG,aPPG:faPPG,hDef:fhDef,aDef:faDef,hHP:fhHP,aAP:faAP,hHD:fhHD,aAD:faAD,hNet,aNet,hWP:hWP!=null?(hWP*100).toFixed(0):'—',aWP:aWP!=null?(aWP*100).toFixed(0):'—',hHW:hHW!=null?(hHW*100).toFixed(0):'—',aAW:aAW!=null?(aAW*100).toFixed(0):'—',hGP,aGP,hPos:hSt?.position||'—',aPos:aSt?.position||'—',mainLine,overP:Math.round(overP),underP:Math.round(underP),ouLines,exact:topE,SD}}

function getForm(g,id){if(!g?.length)return[];return g.filter(x=>x.status?.short==='FT'||x.status?.short==='AOT').sort((a,b)=>new Date(b.date)-new Date(a.date)).map(x=>{const h=x.teams.home.id===id;const m=h?x.scores?.home?.total:x.scores?.away?.total;const o=h?x.scores?.away?.total:x.scores?.home?.total;return m!=null&&o!=null?(m>o?'W':'L'):'L'})}
function getH2H(g,hid,aid){if(!g)return{h:0,a:0,t:0};const m=g.filter(x=>(x.teams.home.id===hid&&x.teams.away.id===aid)||(x.teams.home.id===aid&&x.teams.away.id===hid)).filter(x=>x.status?.short==='FT'||x.status?.short==='AOT');let hw=0,aw=0;m.forEach(x=>{const hs=x.scores?.home?.total,as=x.scores?.away?.total;if(hs==null||as==null)return;x.teams.home.id===hid?(hs>as?hw++:aw++):(as>hs?hw++:aw++)});return{h:hw,a:aw,t:m.length}}

${P.ouLines.length>1?`<div style="background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin-bottom:14px" class="anim"><div style="font-size:.65rem;font-weight:800;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">📊 Tutte le linee O/U</div><div style="display:grid;grid-template-columns:repeat(${Math.min(P.ouLines.length,5)},1fr);gap:6px">${P.ouLines.map(x=>`<div style="text-align:center;padding:8px;background:var(--bg2);border-radius:8px;border:1px solid ${x.line===P.mainLine?'var(--cyan)':'var(--brd)'}"><div style="font-size:.65rem;color:var(--m);font-weight:700">O/U ${x.line}</div><div style="font-size:.85rem;font-weight:800;color:${x.oP>55?'var(--green)':x.oP<45?'var(--red)':'var(--s)'};font-family:var(--mono)">${x.oP>50?'O '+x.oP:'U '+(100-x.oP)}%</div></div>`).join('')}</div></div>`:``}
<div style="background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between" class="anim"><div><div style="font-size:.65rem;font-weight:800;color:var(--m);text-transform:uppercase;letter-spacing:1px">📐 Handicap</div><div style="font-size:1.3rem;font-weight:900;font-family:var(--mono);color:var(--yellow)">${P.spread>0?h.name:a.name} -${Math.abs(P.spread).toFixed(1)}</div></div><div style="text-align:right"><div style="font-size:1rem;font-weight:800;font-family:var(--mono);color:var(--cyan)">@1.90</div><div style="font-size:.62rem;font-weight:700;display:flex;align-items:center;gap:4px;justify-content:flex-end"><div style="width:6px;height:6px;border-radius:50%;background:${Math.abs(P.spread)>6?'var(--green)':'var(--orange)'}"></div>${Math.abs(P.spread)>6?'FORTE':'MODERATO'}</div></div></div>
<div class="advice anim"><div class="advice-hdr"><div class="advice-left"><div class="advice-icon">🤖</div><div class="advice-meta"><div class="advice-label">Consiglio AI</div><div class="advice-sub">Normal CDF + Log5 + Efficiency</div></div></div><div class="advice-conf ${cCls}">${P.conf}% ${cLbl}</div></div><div class="advice-pick"><div class="advice-pick-lbl">Pronostico Consigliato</div><div class="advice-pick-val">${P.mainPred}</div><div class="advice-pick-prob">${Math.max(parseFloat(P.hProb),parseFloat(P.aProb)).toFixed(1)}% probabilità</div></div><div class="conc ${P.conc}">${concTxt}</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px"><div style="background:var(--bg2);border:1px solid rgba(0,212,255,.2);border-radius:8px;padding:10px;text-align:center"><div style="font-size:.6rem;font-weight:700;color:var(--cyan);letter-spacing:.5px;margin-bottom:4px">NORMAL CDF</div><div style="font-size:1rem;font-weight:800">${P.normP}%</div><div style="font-size:.62rem;color:var(--m)">σ = ${P.SD}</div></div><div style="background:var(--bg2);border:1px solid rgba(255,159,26,.2);border-radius:8px;padding:10px;text-align:center"><div style="font-size:.6rem;font-weight:700;color:var(--orange);letter-spacing:.5px;margin-bottom:4px">LOG5</div><div style="font-size:1rem;font-weight:800">${P.log5P}%</div><div style="font-size:.62rem;color:var(--m)">Win% based</div></div></div>
<div class="probbar"><div class="probbar-l"><span style="color:var(--cyan)"><strong>${P.hProb}%</strong> ${h.name}</span><span style="color:var(--orange)">${a.name} <strong>${P.aProb}%</strong></span></div><div class="probbar-t"><div class="probbar-h" style="width:${P.hProb}%"></div><div class="probbar-a" style="width:${P.aProb}%"></div></div></div>
<div class="reasons">${P.reasons.map(r=>`<div class="reason ${r.type}"><span class="reason-ico">${r.type==='pos'?'✅':r.type==='neg'?'⚠️':'📊'}</span><span>${r.t}</span></div>`).join('')}</div></div>
<div style="background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;margin-bottom:14px" class="anim"><div style="font-size:.72rem;font-weight:800;color:var(--m);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px">📊 Confronto Statistiche</div><div style="display:flex;justify-content:space-between;font-size:.7rem;font-weight:700;margin-bottom:8px;padding:0 10px"><span style="color:var(--cyan)">${h.name}</span><span style="color:var(--orange)">${a.name}</span></div><div class="stats">${sHTML}</div></div>
<div style="background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;margin-bottom:14px" class="anim"><div style="font-size:.72rem;font-weight:800;color:var(--m);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px">🎯 Risultati Esatti</div><div class="exact-grid">${P.exact.map(x=>`<div class="exact-box"><div class="exact-sc">${x.h} - ${x.a}</div><div class="exact-od">@${(100/x.p).toFixed(2)}</div><div class="exact-pc">${x.p}%</div></div>`).join('')}</div></div>
<div style="background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px" class="anim"><div style="font-size:.72rem;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px">💰 Exchange Strategy</div><div style="background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div><div style="font-size:.88rem;font-weight:800">Back ${favName}</div><div style="font-size:.68rem;color:var(--m)">Prob: ${Math.round(favP*100)}%</div></div><div style="text-align:right"><div style="font-size:1.1rem;font-weight:800;color:var(--cyan);font-family:var(--mono)">@${favOdds}</div><div style="font-size:.62rem;font-weight:700;display:flex;align-items:center;gap:4px;justify-content:flex-end"><div style="width:6px;height:6px;border-radius:50%;background:${favStr.c}"></div>${favStr.t}</div></div></div><div style="font-size:.7rem;color:var(--m);line-height:1.4">💡 Back pre-match. Se prende vantaggio nel 1° quarto, LAY per green-up.</div></div></div>`}

updD();showLeagues();
</script>
</body>
