<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BasketPro AI — Super Algorithm v7</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b12;--card:#0f1520;--card2:#161d2b;--border:#1e2a3a;
  --accent:#ff6b2b;--glow:rgba(255,107,43,.25);
  --blue:#4d9fff;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--purple:#a855f7;
  --text:#e2e8f0;--muted:#64748b;--r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
code,.mono{font-family:'JetBrains Mono',monospace}
header{background:linear-gradient(180deg,#0f1520 0%,#0b1018 100%);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;flex-wrap:wrap}
.logo{font-weight:900;font-size:1.15rem;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
.logo span{color:var(--accent)}
.logo .ver{font-size:.52rem;font-weight:700;color:var(--accent);background:rgba(255,107,43,.12);border:1px solid rgba(255,107,43,.3);padding:2px 7px;border-radius:20px;letter-spacing:.5px}
.date-nav{display:flex;background:var(--bg);padding:3px;border-radius:20px;border:1px solid var(--border);gap:2px}
.date-btn{padding:5px 12px;border:none;background:transparent;color:var(--muted);font-size:.7rem;font-weight:700;cursor:pointer;border-radius:14px;transition:.2s;white-space:nowrap;font-family:inherit}
.date-btn.active{background:var(--accent);color:#fff;box-shadow:0 0 12px var(--glow)}
.hdr-r{display:flex;align-items:center;gap:10px;font-size:.62rem;color:var(--muted)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot.ok{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.5);animation:blink 2s infinite}
.dot.err{background:var(--red)}.dot.loading{background:var(--yellow);animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.layout{display:grid;grid-template-columns:230px 1fr 440px;flex:1;overflow:hidden;min-height:0}
.panel{display:flex;flex-direction:column;border-right:1px solid var(--border);min-height:0}
.panel:last-child{border-right:none}
.ph{padding:9px 13px;font-size:.6rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.scroll{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.scroll::-webkit-scrollbar{width:3px}.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.li{padding:8px 10px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:.78rem;font-weight:600;transition:.15s;margin-bottom:2px}
.li:hover{background:var(--card2)}
.li.active{background:rgba(255,107,43,.1);color:var(--accent);border-left:3px solid var(--accent);padding-left:7px}
.li .cnt{margin-left:auto;background:var(--card2);padding:1px 6px;border-radius:8px;font-size:.6rem;color:var(--muted)}
.gc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:.2s;position:relative}
.gc:hover{border-color:var(--accent);box-shadow:0 2px 15px var(--glow);transform:translateY(-1px)}
.gc.sel{border-color:var(--green);background:rgba(34,197,94,.03)}
.gc-meta{display:flex;justify-content:space-between;align-items:center;font-size:.62rem;color:var(--muted);margin-bottom:7px}
.gc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.gc-name{font-weight:700;font-size:.82rem;display:flex;align-items:center;gap:6px}
.gc-score{font-size:1.05rem;font-weight:900;min-width:32px;text-align:center}
.gc-score.win{color:var(--accent)}
.badge{font-size:.52rem;font-weight:800;padding:2px 5px;border-radius:3px}
.badge-live{background:var(--red);color:#fff;animation:blink .6s infinite}
.badge-ft{background:var(--card2);color:var(--muted)}
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.7rem;font-weight:700;cursor:pointer;margin-bottom:10px;transition:.2s;font-family:inherit}
.back-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.sec{font-size:.58rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px;display:flex;align-items:center;gap:5px}
.prob-track{height:10px;background:var(--card2);border-radius:5px;overflow:hidden;display:flex;margin:4px 0}
.pb-h{background:linear-gradient(90deg,var(--green),#15803d);transition:width 1s ease}
.pb-a{background:linear-gradient(90deg,var(--blue),#1d4ed8);transition:width 1s ease}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.mbox{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center}
.mbox.hot{border-color:var(--accent);background:rgba(255,107,43,.06);box-shadow:0 0 10px var(--glow)}
.mbox.value{border-color:var(--green);background:rgba(34,197,94,.06);box-shadow:0 0 10px rgba(34,197,94,.2)}
.mbox-lbl{font-size:.5rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.mbox-val{font-size:1rem;font-weight:900}
.mbox-sub{font-size:.55rem;color:var(--muted);margin-top:2px;font-weight:600}
.stat-row{display:grid;grid-template-columns:1fr 80px 1fr;gap:3px;margin-bottom:2px;align-items:center}
.stat-v{font-size:.72rem;font-weight:700;padding:5px 6px;border-radius:4px;background:var(--card)}
.stat-v.l{text-align:right}.stat-v.r{text-align:left}.stat-v.w{color:var(--green);background:rgba(34,197,94,.08)}
.stat-lbl{text-align:center;font-size:.48rem;font-weight:700;color:var(--muted);text-transform:uppercase}
.fd{width:16px;height:16px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:900;color:#fff}
.fd.W{background:var(--green)}.fd.L{background:var(--red)}
.verify{padding:10px;border-radius:var(--r);text-align:center;font-weight:800;font-size:.78rem;margin-bottom:10px;border:1px solid}
.v-ok{background:rgba(34,197,94,.08);color:var(--green);border-color:rgba(34,197,94,.3)}
.v-ko{background:rgba(239,68,68,.08);color:var(--red);border-color:rgba(239,68,68,.3)}
.v-sub{font-size:.65rem;font-weight:600;margin-top:4px;opacity:.85}
.ai-box{background:rgba(77,159,255,.05);border:1px solid rgba(77,159,255,.2);border-radius:var(--r);padding:10px;margin-bottom:10px;position:relative}
.ai-tag{position:absolute;top:-8px;left:10px;background:var(--blue);color:#fff;font-size:.5rem;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.6px}
.ai-text{font-size:.75rem;line-height:1.5;margin-top:2px}
.value-alert{background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(34,197,94,.02));border:1px solid rgba(34,197,94,.3);border-radius:var(--r);padding:12px;margin-bottom:10px;text-align:center}
.value-alert.no{background:linear-gradient(135deg,rgba(239,68,68,.06),rgba(239,68,68,.02));border-color:rgba(239,68,68,.2)}
.value-lbl{font-size:.55rem;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.value-lbl.no{color:var(--red)}
.value-msg{font-size:.82rem;font-weight:900}
.reason{display:flex;align-items:center;gap:5px;padding:3px 0;font-size:.68rem;border-bottom:1px solid rgba(30,42,58,.5)}
.save-btn{width:100%;padding:10px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-weight:800;font-size:.8rem;cursor:pointer;margin-top:10px;box-shadow:0 3px 12px var(--glow);transition:.2s;font-family:inherit}
.save-btn:hover{filter:brightness(1.1)}.save-btn.saved{background:var(--card2);color:var(--green);border:1px solid rgba(34,197,94,.3);box-shadow:none}
.center-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:6px;text-align:center;padding:16px}
.center-msg .icon{font-size:2rem}.center-msg p{font-size:.78rem;line-height:1.4}
.spinner{width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ou-row{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:var(--card);border-radius:5px;margin-bottom:3px;font-size:.72rem}
.ou-row.main{border:1px solid var(--accent)}
@media(max-width:1200px){.layout{grid-template-columns:200px 1fr 380px}}
@media(max-width:960px){.layout{grid-template-columns:1fr}body{overflow:auto}.panel{height:auto;border-right:none;border-bottom:1px solid var(--border)}.scroll{max-height:380px}}
</style>
</head>
<body>
<header>
  <div class="logo">🏀 Basket<span>Pro</span> <span class="ver">SUPER v7</span></div>
  <div class="date-nav">
    <button class="date-btn" onclick="setDate(-1,this)">IERI</button>
    <button class="date-btn active" onclick="setDate(0,this)">OGGI</button>
    <button class="date-btn" onclick="setDate(1,this)">DOMANI</button>
    <button class="date-btn" onclick="setDate(2,this)">+2</button>
  </div>
  <div class="hdr-r">
    <span class="mono" id="reqCnt">0 req</span>
    <span><span class="dot loading" id="sDot"></span> <span id="sTxt">…</span></span>
  </div>
</header>
<div class="layout">
  <div class="panel">
    <div class="ph"><span>Campionati</span><span id="lCnt"></span></div>
    <div class="scroll" id="lPanel"><div class="center-msg"><div class="spinner"></div></div></div>
  </div>
  <div class="panel">
    <div class="ph"><span id="gTitle">Partite</span><span id="gCnt"></span></div>
    <div class="scroll" id="gPanel"><div class="center-msg"><div class="icon">📋</div><p>Seleziona un campionato</p></div></div>
  </div>
  <div class="panel">
    <div class="ph">🧠 Super Algorithm · 4 Modelli + Odds</div>
    <div class="scroll" id="aPanel"><div class="center-msg"><div class="icon">🧠</div><p>Clicca una partita</p></div></div>
  </div>
</div>
<script>
const KEY='aeb2864a3d4dbb8395fa53c83a876a93',BASE='https://v1.basketball.api-sports.io',DB='https://basketpro-1a28b-default-rtdb.europe-west1.firebasedatabase.app',NBAAPI='https://api.server.nbaapi.com';
let allGames=[],statsCache={},gamesCache={},standCache={},oddsCache={},nbaAdvCache={},nbaTotCache={};
let currentOffset=0,selGameId=null,selLeagueId=null,reqCount=0;

const ds=o=>{const d=new Date();d.setDate(d.getDate()+o);return d.toISOString().split('T')[0]};
const pf=v=>{const n=parseFloat(v);return isNaN(n)?null:n};
const cl=(lo,v,hi)=>Math.max(lo,Math.min(hi,v));
const sf=(v,d=1)=>v!=null&&!isNaN(v)?Number(v).toFixed(d):'—';
const flag=c=>({'USA':'🇺🇸','Italy':'🇮🇹','Spain':'🇪🇸','France':'🇫🇷','Germany':'🇩🇪','Greece':'🇬🇷','Turkey':'🇹🇷','Australia':'🇦🇺','China':'🇨🇳','Japan':'🇯🇵','Israel':'🇮🇱','Argentina':'🇦🇷','Brazil':'🇧🇷','Serbia':'🇷🇸','Lithuania':'🇱🇹','Euroleague':'🌍','World':'🌍','Europe':'🇪🇺','Russia':'🇷🇺','Philippines':'🇵🇭'}[c]||'🏀');
const starsStr=n=>'★'.repeat(n)+'☆'.repeat(5-n);
const normCDF=x=>{const t=1/(1+.2316419*Math.abs(x)),d=.3989423*Math.exp(-x*x/2),p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return x>0?1-p:p};
function setS(s,m){document.getElementById('sDot').className='dot '+s;document.getElementById('sTxt').textContent=m}
function updR(){document.getElementById('reqCnt').textContent=reqCount+' req'}

async function api(ep,params={}){
  const url=new URL(BASE+ep);Object.entries(params).forEach(([k,v])=>url.searchParams.append(k,v));
  const c=new AbortController(),t=setTimeout(()=>c.abort(),15000);
  try{const r=await fetch(url,{headers:{'x-apisports-key':KEY},signal:c.signal});clearTimeout(t);reqCount++;updR();if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();if(d.errors&&Object.keys(d.errors).length)throw new Error(Object.values(d.errors).join(', '));return d.response||[]}catch(e){clearTimeout(t);throw e}
}
async function getStats(lid,season,tid){const k=`s_${lid}_${season}_${tid}`;if(statsCache[k]!==undefined)return statsCache[k];try{const r=await api('/statistics',{league:lid,season,team:tid});statsCache[k]=r[0]||null;return statsCache[k]}catch(e){statsCache[k]=null;return null}}
async function getGames(lid,season,tid){const k=`g_${lid}_${season}_${tid}`;if(gamesCache[k]!==undefined)return gamesCache[k];try{const r=await api('/games',{league:lid,season,team:tid});gamesCache[k]=r||[];return gamesCache[k]}catch(e){gamesCache[k]=[];return[]}}
async function getStand(lid,season){const k=`st_${lid}_${season}`;if(standCache[k]!==undefined)return standCache[k];try{const r=await api('/standings',{league:lid,season});standCache[k]=r&&r[0]?r[0]:(r||[]);return standCache[k]}catch(e){standCache[k]=[];return[]}}
async function getOdds(gid){if(oddsCache[gid]!==undefined)return oddsCache[gid];try{const r=await api('/odds',{game:gid});oddsCache[gid]=r||[];return oddsCache[gid]}catch(e){oddsCache[gid]=[];return[]}}

async function getNBAAdv(team,season=2025){const k=`nba_${team}_${season}`;if(nbaAdvCache[k]!==undefined)return nbaAdvCache[k];try{const r=await fetch(`${NBAAPI}/api/playeradvancedstats?team=${team}&season=${season}&pageSize=50&sortBy=win_shares&ascending=false`);const d=await r.json();nbaAdvCache[k]=d.data||[];return nbaAdvCache[k]}catch(e){nbaAdvCache[k]=[];return[]}}
async function getNBATot(team,season=2025){const k=`nbt_${team}_${season}`;if(nbaTotCache[k]!==undefined)return nbaTotCache[k];try{const r=await fetch(`${NBAAPI}/api/playertotals?team=${team}&season=${season}&pageSize=50&sortBy=points&ascending=false`);const d=await r.json();nbaTotCache[k]=d.data||[];return nbaTotCache[k]}catch(e){nbaTotCache[k]=[];return[]}}

const NBA_ABBR={'Atlanta Hawks':'ATL','Boston Celtics':'BOS','Brooklyn Nets':'BKN','Charlotte Hornets':'CHA','Chicago Bulls':'CHI','Cleveland Cavaliers':'CLE','Dallas Mavericks':'DAL','Denver Nuggets':'DEN','Detroit Pistons':'DET','Golden State Warriors':'GSW','Houston Rockets':'HOU','Indiana Pacers':'IND','Los Angeles Clippers':'LAC','Los Angeles Lakers':'LAL','Memphis Grizzlies':'MEM','Miami Heat':'MIA','Milwaukee Bucks':'MIL','Minnesota Timberwolves':'MIN','New Orleans Pelicans':'NOP','New York Knicks':'NYK','Oklahoma City Thunder':'OKC','Orlando Magic':'ORL','Philadelphia 76ers':'PHI','Phoenix Suns':'PHX','Portland Trail Blazers':'POR','Sacramento Kings':'SAC','San Antonio Spurs':'SAS','Toronto Raptors':'TOR','Utah Jazz':'UTA','Washington Wizards':'WAS'};

// TRUE ELO BUILDER — FiveThirtyEight style
function buildElo(games){
  const elo={},K=20;
  games.filter(g=>['FT','AOT'].includes(g.status?.short)&&g.scores?.home?.total!=null)
    .sort((a,b)=>new Date(a.date)-new Date(b.date))
    .forEach(g=>{
      const hid=g.teams.home.id,aid=g.teams.away.id;
      if(!elo[hid])elo[hid]=1500;if(!elo[aid])elo[aid]=1500;
      const hs=g.scores.home.total,as=g.scores.away.total,hca=75;
      const expH=1/(1+Math.pow(10,-(elo[hid]+hca-elo[aid])/400));
      const res=hs>as?1:hs<as?0:0.5;
      const mov=Math.abs(hs-as),eDiff=Math.abs(elo[hid]+hca-elo[aid]);
      const movM=Math.log(mov+1)*2.2/(eDiff*0.001+2.2);
      const adj=K*movM*(res-expH);
      elo[hid]+=adj;elo[aid]-=adj;
    });
  return elo;
}

async function loadGames(){
  setS('loading','Caricamento…');
  ['lPanel','gPanel','aPanel'].forEach((id,i)=>{document.getElementById(id).innerHTML=i<2?'<div class="center-msg"><div class="spinner"></div></div>':'<div class="center-msg"><div class="icon">🧠</div><p>Clicca una partita</p></div>'});
  try{allGames=await api('/games',{date:ds(currentOffset),timezone:'Europe/Rome'});setS('ok','API OK');if(!allGames.length){document.getElementById('lPanel').innerHTML='<div class="center-msg"><div class="icon">📭</div><p>Nessuna partita</p></div>';document.getElementById('gPanel').innerHTML=document.getElementById('lPanel').innerHTML;document.getElementById('lCnt').textContent='';return}buildLeagues()}
  catch(e){setS('err','Errore');document.getElementById('lPanel').innerHTML=`<div class="center-msg"><div class="icon">⚠️</div><p>${e.message}</p><button onclick="loadGames()" style="margin-top:6px;padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-family:inherit">Riprova</button></div>`}
}
function buildLeagues(){const map=new Map();allGames.forEach(g=>{const id=g.league.id;if(!map.has(id))map.set(id,{id,name:g.league.name,country:g.league.country,count:0});map.get(id).count++});const ls=[...map.values()].sort((a,b)=>b.count-a.count);document.getElementById('lCnt').textContent=ls.length;document.getElementById('lPanel').innerHTML=ls.map(l=>`<div class="li" data-id="${l.id}" onclick="selectLeague(${l.id})">${flag(l.country)} ${l.name}<span class="cnt">${l.count}</span></div>`).join('')}
function selectLeague(id){selLeagueId=id;document.querySelectorAll('.li').forEach(el=>el.classList.toggle('active',+el.dataset.id===id));const games=allGames.filter(g=>g.league.id===id);const ord={'Q1':0,'Q2':0,'Q3':0,'Q4':0,'OT':0,'HT':0,'BT':0,'NS':1,'FT':2,'AOT':2};games.sort((a,b)=>(ord[a.status.short]??1)-(ord[b.status.short]??1));document.getElementById('gTitle').textContent=games[0]?.league?.name||'Partite';document.getElementById('gCnt').textContent=games.length;renderGames(games)}
function renderGames(games){if(!games.length){document.getElementById('gPanel').innerHTML='<div class="center-msg"><div class="icon">📭</div><p>Nessuna partita</p></div>';return}document.getElementById('gPanel').innerHTML=games.map(g=>{const live=['Q1','Q2','Q3','Q4','OT','HT','BT'].includes(g.status.short),ft=['FT','AOT'].includes(g.status.short),hs=g.scores?.home?.total,as=g.scores?.away?.total,time=new Date(g.date).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}),hw=hs!=null&&as!=null&&hs>as,badge=live?'<span class="badge badge-live">LIVE</span>':ft?'<span class="badge badge-ft">FT</span>':`<span>${time}</span>`;return`<div class="gc${g.id===selGameId?' sel':''}" onclick="analyzeGame(${g.id})"><div class="gc-meta"><span>${g.league.name}</span>${badge}</div><div class="gc-row"><div class="gc-name"><img src="${g.teams.home.logo}" style="width:16px;height:16px;object-fit:contain" onerror="this.style.display='none'">${g.teams.home.name}</div><div class="gc-score${hw?' win':''}">${hs??''}</div></div><div class="gc-row"><div class="gc-name"><img src="${g.teams.away.logo}" style="width:16px;height:16px;object-fit:contain" onerror="this.style.display='none'">${g.teams.away.name}</div><div class="gc-score${!hw&&hs!=null?' win':''}">${as??''}</div></div></div>`}).join('')}

async function analyzeGame(gameId){
  selGameId=gameId;document.querySelectorAll('.gc').forEach(el=>el.classList.remove('sel'));event?.target?.closest?.('.gc')?.classList.add('sel');
  const panel=document.getElementById('aPanel');panel.innerHTML='<div class="center-msg"><div class="spinner"></div><p>Analisi completa…</p></div>';
  const g=allGames.find(x=>x.id===gameId);if(!g)return;
  const lid=g.league.id,season=g.season,hid=g.teams.home.id,aid=g.teams.away.id;
  let hS=null,aS=null,hG=[],aG=[],stand=[],odds=[];
  let nbaAdvH=[],nbaAdvA=[],nbaTotH=[],nbaTotA=[];
  try{[hS,aS,hG,aG,stand,odds]=await Promise.all([getStats(lid,season,hid),getStats(lid,season,aid),getGames(lid,season,hid),getGames(lid,season,aid),getStand(lid,season),getOdds(gameId)])}catch(e){}
  const hn=g.teams.home.name,an=g.teams.away.name,hAbbr=NBA_ABBR[hn],aAbbr=NBA_ABBR[an];
  if(hAbbr&&aAbbr){try{[nbaAdvH,nbaAdvA,nbaTotH,nbaTotA]=await Promise.all([getNBAAdv(hAbbr),getNBAAdv(aAbbr),getNBATot(hAbbr),getNBATot(aAbbr)])}catch(e){}}
  const allTG=[...hG,...aG],uniq=[...new Map(allTG.map(g=>[g.id,g])).values()];
  const eloR=buildElo(uniq);
  const P=superAlgo(hS,aS,hG,aG,stand,odds,eloR,nbaAdvH,nbaAdvA,nbaTotH,nbaTotA,g);
  renderAnalysis(g,P,panel);
}

function superAlgo(hS,aS,hG,aG,stand,odds,elo,nbaAdvH,nbaAdvA,nbaTotH,nbaTotA,game){
  const hid=game.teams.home.id,aid=game.teams.away.id,hn=game.teams.home.name,an=game.teams.away.name;
  const reasons=[];
  const hGP=hS?.games?.played?.all||0,aGP=aS?.games?.played?.all||0;

  const hHP=pf(hS?.points?.for?.average?.home)||hPPG,aAP=pf(aS?.points?.for?.average?.away)||aPPG;
  const hHD=pf(hS?.points?.against?.average?.home)||hDef,aAD=pf(aS?.points?.against?.average?.away)||aDef;
  const hWP=pf(hS?.games?.wins?.all?.percentage),aWP=pf(aS?.games?.wins?.all?.percentage);

  function calcRecent(games,tid,n=15){const fg=games.filter(x=>['FT','AOT'].includes(x.status?.short)&&x.scores?.home?.total!=null).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,n);if(!fg.length)return{ppg:null,def:null,totals:[],margins:[],wins:0,n:0};let pts=0,opp=0,wins=0,wSum=0;const totals=[],margins=[];fg.forEach((g,i)=>{const w=Math.pow(.92,i);wSum+=w;const isH=g.teams.home.id===tid;const my=isH?g.scores.home.total:g.scores.away.total;const op=isH?g.scores.away.total:g.scores.home.total;pts+=my*w;opp+=op*w;totals.push(my+op);margins.push(my-op);if(my>op)wins++});return{ppg:pts/wSum,def:opp/wSum,totals,margins,wins,n:fg.length}}

    const aggTot=arr=>{const t=arr.filter(p=>p.games>=15).slice(0,8);if(!t.length)return null;const a=f=>t.reduce((s,p)=>s+(p[f]||0),0)/t.length;return{efg:a('effectFgPercent'),ftp:a('ftPercent'),tov:a('turnovers'),orb:a('offensiveRb'),drb:a('defensiveRb')}};

      reasons.push({t:`NBA Win Shares: ${sf(hA.ws,1)} vs ${sf(aA.ws,1)}`,y:hA.ws>aA.ws?'pos':'neg'});

    }
  }

  function getForm(games,tid){return games.filter(x=>['FT','AOT'].includes(x.status?.short)&&x.scores?.home?.total!=null).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6).map(x=>{const h=x.teams.home.id===tid;return(h?x.scores.home.total:x.scores.away.total)>(h?x.scores.away.total:x.scores.home.total)?'W':'L'})}

  const hFP=hForm.length?hForm.filter(x=>x==='W').length/hForm.length:.5,aFP=aForm.length?aForm.filter(x=>x==='W').length/aForm.length:.5;

  function getH2H(games,tid,opp){const m=games.filter(x=>['FT','AOT'].includes(x.status?.short)&&((x.teams.home.id===tid&&x.teams.away.id===opp)||(x.teams.home.id===opp&&x.teams.away.id===tid)));let w=0;m.forEach(x=>{const isH=x.teams.home.id===tid;const my=isH?x.scores.home.total:x.scores.away.total;const op=isH?x.scores.away.total:x.scores.home.total;if(my>op)w++});return{wins:w,total:m.length}}
  const h2h=getH2H(hG,hid,aid);
  const flat=Array.isArray(stand)?stand.flat?.(2)??stand:[];
  const hSt=flat.find(s=>s?.team?.id===hid),aSt=flat.find(s=>s?.team?.id===aid);
  const hPos=hSt?.position||hSt?.stage?.ranking||null,aPos=aSt?.position||aSt?.stage?.ranking||null;
  const hTotals=hC.totals,aTotals=aC.totals;
  const hAvgTot=hTotals.length?hTotals.reduce((s,x)=>s+x,0)/hTotals.length:fhPPG+fhDef;

  const pseudoPace=(hAvgTot+aAvgTot)/2;

  function getTrend(games,tid){const fg=games.filter(x=>['FT','AOT'].includes(x.status?.short)&&x.scores?.home?.total!=null).sort((a,b)=>new Date(b.date)-new Date(a.date));const l5=fg.slice(0,5),all=fg;if(l5.length<3||all.length<5)return 0;const avg=arr=>{let s=0;arr.forEach(g=>{const h=g.teams.home.id===tid;s+=(h?g.scores.home.total:g.scores.away.total)});return s/arr.length};return(avg(l5)-avg(all))/Math.max(avg(all),1)}
  const hTrend=getTrend(hG,hid),aTrend=getTrend(aG,aid);
  const stddev=arr=>{if(arr.length<2)return 15;const m=arr.reduce((s,x)=>s+x,0)/arr.length;return Math.sqrt(arr.reduce((s,x)=>s+(x-m)*(x-m),0)/arr.length)};
  const hStd=stddev(hC.margins),aStd=stddev(aC.margins);

  // MODEL A: Efficiency Crossover (30%)
  const HCA=3.2;
  let predH=fhHP*.55+faAD*.45+HCA*.6,predA=faAP*.55+fhHD*.45-HCA*.4;
  predH*=(1+hTrend*.4);predA*=(1+aTrend*.4);
  if(h2h.total>=2){const r=h2h.wins/h2h.total;predH+=(r-.5)*3;predA-=(r-.5)*3}
  if(hPos&&aPos){const adj=cl(-2.5,(aPos-hPos)*.25,2.5);predH+=adj;predA-=adj}
  predH+=nbaBonus*.3;predA-=nbaBonus*.3;
  predH=Math.round(cl(50,predH,170));predA=Math.round(cl(45,predA,165));
  const SD=12,mA_prob=normCDF((predH-predA)/SD)*100;

  // MODEL B: TRUE Elo (25%)
  const hElo=elo[hid]||1500,aElo=elo[aid]||1500;
  const mB_prob=1/(1+Math.pow(10,-(hElo-aElo+75)/400))*100;
  if(Math.abs(hElo-aElo)>40)reasons.push({t:`Elo: ${hn} ${Math.round(hElo)} vs ${an} ${Math.round(aElo)}`,y:hElo>aElo?'pos':'neg'});

  // MODEL C: Log5 (25%)
  const log5=(a,b)=>(a*(1-b))/(a*(1-b)+(1-a)*b);
  const mC_prob=log5(cl(.08,fhHW??fhWP,.95),cl(.05,faAW??faWP,.92))*100;

  // MODEL D: Momentum (20%)

  if(hStd<aStd)mD_prob+=2;else if(aStd<hStd)mD_prob-=2;
  const hStrk=hForm.length&&hForm[0]==='W'?(hForm.findIndex(x=>x!=='W')===-1?hForm.length:hForm.findIndex(x=>x!=='W')):0;
  const aStrk=aForm.length&&aForm[0]==='W'?(aForm.findIndex(x=>x!=='W')===-1?aForm.length:aForm.findIndex(x=>x!=='W')):0;
  mD_prob+=(hStrk-aStrk)*1.5;mD_prob+=nbaBonus*.15;mD_prob=cl(12,mD_prob,88);

  // ENSEMBLE
  const hasData=hGP>=3&&aGP>=3;
  const wA=hasData?.30:.15,wB=.25,wC=.25,wD=hasData?.20:.35;

  hProb=cl(8,Math.round(hProb),92);const aProb=100-hProb;
  const finalH=Math.round(predH*.55+(fhPPG+faAD)/2*.45);
  const finalA=Math.round(predA*.55+(faPPG+fhHD)/2*.45);
  const predTotal=finalH+finalA,spread=finalH-finalA;
  const mainLine=Math.round(pseudoPace/5)*5||Math.round(predTotal/5)*5;
  const SDt=SD*1.4,overP=cl(8,(1-normCDF((mainLine-predTotal)/SDt))*100,92);
  const ouLines=[];for(let off=-10;off<=10;off+=5){const l=mainLine+off;if(l<80||l>400)continue;ouLines.push({line:l,overP:Math.round(cl(5,(1-normCDF((l-predTotal)/SDt))*100,95)),main:l===mainLine})}
  const side=p=>p>55?'H':p<45?'A':'X';
  const sides=[side(mA_prob),side(mB_prob),side(mC_prob),side(mD_prob)];
  const concordance=Math.max(sides.filter(s=>s==='H').length,sides.filter(s=>s==='A').length)>=3?'high':Math.max(sides.filter(s=>s==='H').length,sides.filter(s=>s==='A').length)>=2?'mid':'low';

  // ODDS & VALUE
  let bookMLH=null,bookMLA=null,valueWinner=null;
  if(odds&&odds.length){odds.forEach(o=>{(o.bookmakers||[]).forEach(bk=>{(bk.bets||[]).forEach(bet=>{if(bet.name==='Home/Away'||bet.name==='Match Winner'){(bet.values||[]).forEach(v=>{if(v.value==='Home')bookMLH=pf(v.odd);if(v.value==='Away')bookMLA=pf(v.odd)})}})})});
    if(bookMLH&&bookMLA){const iH=1/bookMLH*100,iA=1/bookMLA*100,eH=hProb-iH,eA=aProb-iA;

}

    </div>
    <div class="sec">🎯 Score Previsto</div>
    <div style="display:flex;justify-content:center;gap:16px;padding:12px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin-bottom:10px">
      <div style="text-align:center"><div style="font-size:.5rem;color:var(--muted);font-weight:700">${g.teams.home.name.split(' ').slice(-1)[0]}</div><div style="font-size:1.8rem;font-weight:900;color:var(--green)">${P.predH}</div></div>
      <div style="font-size:1rem;color:var(--muted);align-self:center;font-weight:900">–</div>
      <div style="text-align:center"><div style="font-size:.5rem;color:var(--muted);font-weight:700">${g.teams.away.name.split(' ').slice(-1)[0]}</div><div style="font-size:1.8rem;font-weight:900;color:var(--blue)">${P.predA}</div></div>
      <div style="text-align:center;align-self:center;margin-left:8px"><div style="font-size:.45rem;color:var(--muted)">TOT</div><div style="font-size:1rem;font-weight:900;color:var(--yellow)">${P.predTotal}</div></div>
    </div>
    <div class="sec">📈 O/U</div>${ouHTML}
    <div class="sec" style="margin-top:10px">✨ AI Insight</div>
    <div class="ai-box"><div class="ai-tag">SUPER AI v7</div><div class="ai-text">${insight}</div></div>
    <div class="sec">📊 Stats</div>
    <div style="display:flex;justify-content:space-between;font-size:.58rem;font-weight:700;padding:0 6px;margin-bottom:3px"><span style="color:var(--green)">${g.teams.home.name.split(' ').slice(-1)[0]}</span><span style="color:var(--blue)">${g.teams.away.name.split(' ').slice(-1)[0]}</span></div>
    ${statsHTML}
    <div class="sec" style="margin-top:10px">🔥 Forma</div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--card);border-radius:var(--r);margin-bottom:8px">
      <div><div style="font-size:.62rem;font-weight:700;margin-bottom:2px">${g.teams.home.name.split(' ').slice(-1)[0]}</div>${fDots(P.hForm)||'N/A'}</div>
      <div style="text-align:right"><div style="font-size:.62rem;font-weight:700;margin-bottom:2px">${g.teams.away.name.split(' ').slice(-1)[0]}</div>${fDots(P.aForm)||'N/A'}</div>
    </div>
    <div class="sec">🧠 Ragionamento</div>
    <div style="background:var(--card);border-radius:var(--r);padding:8px;margin-bottom:8px">${P.reasons.map(r=>`<div class="reason"><span>${r.y==='pos'?'✅':r.y==='neg'?'⚠️':'📊'}</span><span>${r.t}</span></div>`).join('')}</div>
    <button class="save-btn" id="savebtn" onclick="saveFB(${g.id})">⭐ Salva su Firebase</button>`;
  requestAnimationFrame(()=>{const ph=document.getElementById('ph'),pa=document.getElementById('pa');if(ph)ph.style.width=P.hProb+'%';if(pa)pa.style.width=P.aProb+'%'});
}

async function saveFB(gid){const g=allGames.find(x=>x.id===gid);if(!g)return;const btn=document.getElementById('savebtn');btn.disabled=true;btn.textContent='Salvataggio…';
  const lid=g.league.id,season=g.season,hn=g.teams.home.name,an=g.teams.away.name;
  const hS=statsCache[`s_${lid}_${season}_${g.teams.home.id}`],aS=statsCache[`s_${lid}_${season}_${g.teams.away.id}`];
  const hG=gamesCache[`g_${lid}_${season}_${g.teams.home.id}`]||[],aG=gamesCache[`g_${lid}_${season}_${g.teams.away.id}`]||[];
  const st=standCache[`st_${lid}_${season}`]||[],od=oddsCache[gid]||[];
  const uniq=[...new Map([...hG,...aG].map(g=>[g.id,g])).values()];
  const eloR=buildElo(uniq);const hAbbr=NBA_ABBR[hn],aAbbr=NBA_ABBR[an];
  const P=superAlgo(hS,aS,hG,aG,st,od,eloR,nbaAdvCache[`nba_${hAbbr}_2025`]||[],nbaAdvCache[`nba_${aAbbr}_2025`]||[],nbaTotCache[`nbt_${hAbbr}_2025`]||[],nbaTotCache[`nbt_${aAbbr}_2025`]||[],g);
  const ft=['FT','AOT'].includes(g.status.short);
  const data={gameId:g.id,match:`${hn} vs ${an}`,league:g.league.name,leagueId:lid,date:g.date,pick:P.hProb>=50?'1':'2',pickTeam:P.favTeam,homeProb:P.hProb,awayProb:P.aProb,predScore:`${P.predH}-${P.predA}`,predTotal:P.predTotal,ouLine:P.mainLine,ouPick:P.overP>50?'OVER':'UNDER',spread:P.spread,confidence:P.confidence,concordance:P.concordance,kelly:P.kelly,models:{A:sf(P.mA.p),B:sf(P.mB.p),C:sf(P.mC.p),D:sf(P.mD.p)},hasNBA:P.hasNBA,bookOdds:P.bookMLH?{home:P.bookMLH,away:P.bookMLA}:null,valueBet:P.valueWinner?{side:P.valueWinner.side,edge:sf(P.valueWinner.edge),odd:P.valueWinner.odd}:null,savedAt:new Date().toISOString(),result:ft&&g.scores?.home?.total!=null?{homeScore:g.scores.home.total,awayScore:g.scores.away.total,total:g.scores.home.total+g.scores.away.total,pickOK:(P.hProb>=50&&g.scores.home.total>g.scores.away.total)||(P.aProb>50&&g.scores.away.total>g.scores.home.total),ouOK:(P.overP>50&&(g.scores.home.total+g.scores.away.total)>P.mainLine)||(P.overP<=50&&(g.scores.home.total+g.scores.away.total)<=P.mainLine)}:'pending'};
  try{const r=await fetch(DB+'/picks.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});if(!r.ok)throw new Error('HTTP '+r.status);btn.textContent='✅ Salvato!';btn.classList.add('saved')}catch(e){btn.textContent='❌ '+e.message;btn.disabled=false}}

function setDate(o,el){currentOffset=o;selGameId=null;selLeagueId=null;document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');loadGames()}
document.addEventListener('DOMContentLoaded',loadGames);
</script>
</body>
</html>
